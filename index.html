function invPHP(iv){
  if(!iv.currency||iv.currency==='PHP') return num(iv.amount);
  var r=(iv.fxRate&&iv.fxRate>0)?iv.fxRate:fxRateFor(iv.currency);
  return Math.round(num(iv.amount)*r*100)/100;
}
function fmtInvAmt(iv){
  var sym=FX_SYMBOLS[iv.currency||'PHP']||'';
  return sym+num(iv.amount).toLocaleString(undefined,{maximumFractionDigits:2});
}
function invIncomeNote(iv){
  return 'Invoice '+iv.number+(iv.desc?' — '+iv.desc:'')+(iv.currency&&iv.currency!=='PHP'?' ('+fmtInvAmt(iv)+' via '+(iv.payMethod||'—')+')':(iv.payMethod?' via '+iv.payMethod:''));
}
function recordInvoiceIncome(iv){
  if(iv.currency&&iv.currency!=='PHP'&&!(iv.fxRate>0)&&!fxRateValid(iv.currency))
    toast('No '+iv.currency+'→PHP rate set — recorded at 1:1. Set the rate in Calculators ▸ FX and edit if needed.','warn');
  var fid=uid();
  state.finance.push({id:fid,type:'income',amount:invPHP(iv),date:iv.paidDate||todayISO(),category:'Sales',
    note:invIncomeNote(iv),client:iv.client,offer:'',account:accountForMethod(iv.payMethod)});
  iv.financeId=fid; // link so an edit-after-paid can reconcile the books
}
// keep the recorded income in sync if a PAID invoice is later edited (amount/currency/desc/method)
function reconcileInvoiceIncome(iv){
  if(!iv.financeId) return;
  var fe=(state.finance||[]).find(function(x){return x.id===iv.financeId;});
  if(!fe) return;
  fe.amount=invPHP(iv); fe.client=iv.client; fe.note=invIncomeNote(iv); fe.account=accountForMethod(iv.payMethod);
}

/* ---------- cloud sync (Firebase Realtime Database via REST) ---------- */
function cloudEndpoint(){
  var s=state.settings.sync||{};
  if(!s.url) return null;
  var path=(s.path||'bizpilot').replace(/^\/+|\/+$/g,'');
  return s.url.replace(/\/+$/,'')+'/'+path+'.json';
}
var cloudTimer=null,cloudBusy=false;
function scheduleCloudPush(){
  var s=state.settings&&state.settings.sync;
  if(!s||!s.enabled||!s.url) return;
  clearTimeout(cloudTimer);
  cloudTimer=setTimeout(function(){ cloudPush(true); },4000);
}
var cloudConflictWarned=false;
function cloudPush(silent){
  var ep=cloudEndpoint();
  if(!ep){ if(!silent) toast('Enter your database URL first, then save sync settings.','warn'); return; }
  if(cloudBusy) return;
  cloudBusy=true;
  // conflict guard: don't silently overwrite newer changes from another device
  fetch(ep.replace(/\.json$/,'/meta.json')).then(function(r){ return r.ok?r.json():null; }).catch(function(){ return null; })
  .then(function(cloudMeta){
    if(cloudMeta&&cloudMeta.updatedAt&&cloudMeta.deviceId&&cloudMeta.deviceId!==DEVICE_ID&&cloudMeta.updatedAt>(state.settings.sync.lastSyncStamp||0)){
      cloudBusy=false;
      if(silent){
        if(!cloudConflictWarned){ cloudConflictWarned=true; toast('Cloud has newer changes from another device — auto-push paused. Go to Settings → Cloud sync to Pull (or Push to overwrite).','warn'); }
        return;
      }
      if(!confirm('The cloud copy has NEWER changes from another device. Overwrite it with THIS device’s data?')){ return; }
    }
    cloudBusy=true;
    doCloudPut(ep,silent);
  });
}
function doCloudPut(ep,silent){
  fetch(ep,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+((r.status===401||r.status===403)?' — your Firebase database rules denied the write. Open Firebase console → Realtime Database → Rules.':''));
      state.settings.sync.lastSync=new Date().toISOString();
      state.settings.sync.lastSyncStamp=state.meta.updatedAt;
      cloudConflictWarned=false;
      try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(_){ toast("Could not save — browser storage may be full.","error"); }
      if(!silent){ toast('Pushed to cloud ✓'); render(); }
    })
    .catch(function(e){ if(!silent) toast('Cloud push failed: '+e.message,'error'); })
    .finally(function(){ cloudBusy=false; });
}
function cloudPull(){
  var ep=cloudEndpoint();
  if(!ep){ toast('Enter your database URL first, then save sync settings.','warn'); return; }
  fetch(ep)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+((r.status===401||r.status===403)?' — your Firebase database rules denied the read.':''));
      return r.json();
    })
    .then(function(data){
      if(!data||typeof data!=='object'||!data.settings){ toast('No Trakora data found in the cloud yet — push first.','warn'); return; }
      if(!confirm('Replace the data on THIS device with the cloud copy? Local changes not yet pushed will be lost.')) return;
      if(state.meta&&state.meta.updatedAt&&data.meta&&data.meta.updatedAt&&state.meta.updatedAt>data.meta.updatedAt){
        if(!confirm('Heads up: THIS device has newer changes than the cloud copy. Pulling will lose them. Continue?')) return;
      }
      var sync=JSON.parse(JSON.stringify(state.settings.sync));
      state=deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)),data);
      state.settings.sync=Object.assign(state.settings.sync||{},sync,{lastSync:new Date().toISOString(),lastSyncStamp:(data.meta&&data.meta.updatedAt)||Date.now()});
      try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(_){ toast("Could not save — browser storage may be full.","error"); }
      applyTheme(); render();
      toast('Pulled from cloud — '+state.finance.length+' finance entries on this device now.');
    })
    .catch(function(e){ toast('Cloud pull failed: '+e.message,'error'); });
}
function cloudSyncCardHTML(){
  var s=state.settings.sync||{};
  var html='<div class="card"><div class="card-head"><h3>'+icon('cloud',16)+' Cloud sync</h3><span class="spacer"></span>'+
    (s.enabled?'<span class="badge good">Auto-sync on</span>':'<span class="badge neutral">Off</span>')+'</div>'+
    '<p style="font-size:.8rem;color:var(--text-2);margin-bottom:12px">Sync your data to your own cloud Database so it survives browser resets and follows you across devices. '+
    (s.lastSync?'Last sync: <b>'+fmtDate(s.lastSync.slice(0,10))+'</b>.':'Never synced.')+'</p>'+
    '<form data-form="sync-settings">'+
    '<div class="field"><label>Realtime Database URL</label><input class="input" name="url" value="'+esc(s.url||'')+'" placeholder="https://your-project-default-rtdb.firebaseio.com"></div>'+
    '<label class="checkrow" style="margin-bottom:12px"><input type="checkbox" name="enabled"'+(s.enabled?' checked':'')+'> Auto-push to cloud after every change</label>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+

/* ---------- auto-backup ---------- */
function autoBackupCheck(){
  var days=state.settings.autoBackupDays||0;
  if(!days) return;
  var last=state.settings.lastAutoBackup||state.settings.lastBackup;
  var since=last?-daysUntil(last):null;
  if(last&&since!==null&&since<days) return;
  setTimeout(function(){
    exportData();
    state.settings.lastAutoBackup=todayISO();
    save();
    toast('Automatic backup downloaded (every '+days+' days).');
  },1500);
}

    '<button class="btn-icon step-btn" data-action="stock-adjust" data-id="'+p.id+'" data-delta="-1" title="−1 stock" aria-label="Decrease stock">−</button>'+
    stockBadge(p)+
    '<button class="btn-icon step-btn" data-action="stock-adjust" data-id="'+p.id+'" data-delta="1" title="+1 stock" aria-label="Increase stock">+</button></div>'+
    ((p.bom||[]).length?'<div style="font-size:.68rem;color:var(--text-3);margin-top:3px">can make '+fmtNum(canMake(p),0)+' more</div>':'');
}
function viewProducts(){
  var prods=(state.products||[]).filter(function(p){return p.active!==false;});
  var archived=(state.products||[]).filter(function(p){return p.active===false;});
  var lowCount=prods.filter(function(p){return p.stock<=(p.lowStock!=null?p.lowStock:5);}).length;
  var stockValue=sum(prods,function(p){return (p.cost||0)*Math.max(0,p.stock);});
  var retailValue=sum(prods,function(p){return (p.price||0)*Math.max(0,p.stock);});
  if((ui.productTab||'catalog')==='materials') return viewMaterials();
  var html=topbar('Products & Stock','Your catalog with live inventory — orders pull from here automatically.',
    '<button class="btn btn-ghost" data-action="print-catalog">'+icon('print')+'<span class="btn-txt">Catalog</span></button>'+
    '<button class="btn btn-ghost" data-action="copy-catalog">'+icon('notes')+'<span class="btn-txt">Copy list</span></button>'+
    '<button class="btn btn-ghost" data-action="export-csv" data-what="products">'+icon('download')+'<span class="btn-txt">CSV</span></button>'+
    '<button class="btn btn-primary" data-action="product-new">'+icon('plus')+'<span class="btn-txt">Add product</span></button>');
  html+=productTabsHTML('catalog');
  html+='<div class="grid grid-4">'+
    statCard('Products',String(prods.length),'','','box')+
    statCard('Low / out of stock',String(lowCount),lowCount?'<span class="stat-delta down">restock soon</span>':'<span class="stat-delta up">all stocked</span>','','alert')+
    statCard('Stock value (cost)',fmtMoney(stockValue),'<span class="stat-delta flat">money sitting in inventory</span>','','cash')+
    statCard('Stock value (retail)',fmtMoney(retailValue),'<span class="stat-delta flat">if everything sells</span>','','arrowur')+
  '</div>';
  // category filter
  var cats=productCats();
  var sel=ui.productCat||'all';
  html+='<div class="chips mt-lg"><button class="chip '+(sel==='all'?'active':'')+'" data-action="product-cat-filter" data-val="all">All</button>'+
    cats.map(function(c){return '<button class="chip '+(sel===c?'active':'')+'" data-action="product-cat-filter" data-val="'+esc(c)+'">'+esc(c)+'</button>';}).join('')+'</div>';
  var list=prods.filter(function(p){ return sel==='all'||p.category===sel; });
  html+='<div class="card mt">';
  if(!list.length){
    html+=emptyState('box',prods.length?'No products in this category':'No products yet','Add your products with price, cost and stock. Custom attributes like Scent and Color are set below in “Customize catalog”.','<button class="btn btn-sm btn-primary" data-action="product-new">'+icon('plus')+' Add first product</button>');
  } else {
    html+='<div class="table-wrap"><table><thead><tr><th>Product</th><th>Category</th>'+productAttrs().map(function(a){return '<th>'+esc(a)+'</th>';}).join('')+'<th style="text-align:right">Price</th><th style="text-align:right">Cost</th><th style="text-align:right">Margin</th><th>Stock</th><th></th></tr></thead><tbody>';
    list.forEach(function(p){
      var margin=p.price>0?(p.price-(p.cost||0))/p.price*100:null;
      html+='<tr><td><div style="display:flex;align-items:center;gap:10px">'+
        (p.photo?'<img class="img-thumb" src="'+esc(p.photo)+'" alt="">':'<span class="img-thumb img-placeholder">'+icon('box',16)+'</span>')+
        '<div><b>'+esc(p.name)+'</b>'+(p.sku?'<div style="font-size:.7rem;color:var(--text-3)" class="mono">'+esc(p.sku)+'</div>':'')+'</div></div></td>'+
        '<td><span class="badge accent">'+esc(p.category||'General')+'</span></td>'+
        productAttrs().map(function(a){return '<td>'+esc((p.attrs||{})[a]||'—')+'</td>';}).join('')+
        '<td class="num" style="text-align:right;font-weight:700">'+fmtMoney(p.price)+'</td>'+
        '<td class="num" style="text-align:right">'+(p.cost?fmtMoney(p.cost):'—')+'</td>'+
        '<td class="num" style="text-align:right">'+(margin!=null?'<span class="badge '+(margin>=50?'good':(margin>=25?'warn':'risk'))+'">'+fmtPct(margin,0)+'</span>':'—')+'</td>'+
        '<td><div class="stock-cell" data-stock-cell="'+p.id+'">'+stockCellInner(p)+'</div></td>'+
        '<td><div class="row-actions">'+
          '<button class="btn-icon" data-action="product-duplicate" data-id="'+p.id+'" title="Duplicate (new scent/color variant)">'+icon('plus')+'</button>'+
          '<button class="btn-icon" data-action="product-restock" data-id="'+p.id+'" title="Restock">'+icon('refresh')+'</button>'+
          '<button class="btn-icon" data-action="product-edit" data-id="'+p.id+'">'+icon('edit')+'</button>'+

    });

  html+='<div class="card mt"><div class="card-head"><h3>Customize catalog</h3><span class="sub">your categories and product attributes — fully yours</span></div>'+
    '<div class="grid grid-2"><div><div class="field"><label>Product categories</label><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'+
    cats.map(function(c){return '<span class="tag" style="background:var(--accent-soft);color:var(--accent)">'+esc(c)+' <button class="btn-icon" style="width:14px;height:14px;display:inline-grid;vertical-align:middle" data-action="product-cat-del" data-name="'+esc(c)+'">'+icon('x')+'</button></span>';}).join('')+
    '</div><form data-form="product-cat-add" style="display:flex;gap:8px"><input class="input" name="name" placeholder="e.g. Soap, Diffuser, Bundle…" style="flex:1"><button class="btn btn-ghost btn-sm" type="submit">'+icon('plus')+' Add</button></form></div></div>'+
    '<div><div class="field"><label>Custom product fields — your form, your business</label><div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px">'+
    (productFields().length?productFields().map(function(f){
      return '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:var(--bg-sunken);border-radius:9px;padding:6px 10px"><b style="font-size:.8rem;flex:1;min-width:0">'+esc(f.label)+'</b>'+
        '<span class="badge neutral" style="font-size:.62rem">'+esc(f.type)+(f.type==='select'&&f.options?': '+esc(f.options.join('/')):'')+'</span>'+
        '<span class="badge accent" style="font-size:.62rem">'+(f.cat?esc(f.cat)+' only':'all categories')+'</span>'+
        '<button class="btn-icon danger" style="width:20px;height:20px" data-action="product-field-del" data-key="'+f.key+'">'+icon('x')+'</button></div>';
    }).join(''):'<p style="font-size:.76rem;color:var(--text-3)">No custom fields yet — add Size, Flavor, Brand, Wax type… anything your products need.</p>')+
    '</div><form data-form="product-field-add" style="display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:6px;align-items:end">'+
      '<div class="field" style="margin-bottom:0"><label>Field name</label><input class="input" name="label" placeholder="e.g. Size"></div>'+
      '<div class="field" style="margin-bottom:0"><label>Type</label><select class="input" name="ftype"><option value="text">Text</option><option value="select">Dropdown</option><option value="number">Number</option></select></div>'+
      '<div class="field" style="margin-bottom:0"><label>Only for category</label><select class="input" name="fcat"><option value="">All categories</option>'+productCats().map(function(c){return '<option>'+esc(c)+'</option>';}).join('')+'</select></div>'+
      '<button class="btn btn-ghost btn-sm" type="submit" style="height:34px">'+icon('plus')+' Add</button>'+
      '<input class="input" name="fopts" placeholder="dropdown options, comma separated (e.g. Small, Medium, Large)" style="grid-column:1/-1;display:none" data-fopts>'+
    '</form></div></div></div></div>';
  if(archived.length){
    html+='<div class="card mt"><div class="card-head"><h3>Archived products</h3></div>'+archived.map(function(p){
      return '<div class="list-row"><span style="flex:1;color:var(--text-3)">'+esc(p.name)+'</span><button class="btn btn-sm btn-ghost" data-action="product-unarchive" data-id="'+p.id+'">'+icon('refresh')+' Restore</button></div>';
    }).join('')+'</div>';
  }
  return html;
}

    '<div class="form-row-3"><div class="field"><label>Selling price ('+esc(state.settings.currency)+') *</label><input class="input" type="number" step="any" min="0" name="price" value="'+(p.price!=null?p.price:'')+'" required></div>'+
    '<div class="field"><label>Cost to make</label><input class="input" type="number" step="any" min="0" name="cost" value="'+(p.cost!=null?p.cost:'')+'"></div>'+
    '<div class="field"><label>Stock on hand</label><input class="input" type="number" step="1" name="stock" value="'+(p.stock!=null?p.stock:0)+'"></div></div>'+
    '<div class="form-row"><div class="field"><label>Low-stock alert at</label><input class="input" type="number" step="1" min="0" name="lowStock" value="'+(p.lowStock!=null?p.lowStock:5)+'"></div>'+
    '<div class="field"><label>Notes</label><input class="input" name="desc" value="'+esc(p.desc||'')+'" placeholder="e.g. 8oz soy wax, 40h burn"></div></div>'+
    ((state.materials||[]).length?'<div class="field"><label>Recipe — raw materials used per unit (optional)</label><div id="bom-rows">'+
      ((p.bom&&p.bom.length)?p.bom.map(bomRowHTML).join(''):'')+
      '</div><button type="button" class="btn btn-ghost btn-sm" data-action="bom-add">'+icon('plus')+' Add material</button>'+
      '<p style="font-size:.72rem;color:var(--text-3);margin-top:4px">Materials deplete when you restock (make) this product — and Trakora tells you how many more you can make.</p></div>'
      :'<p style="font-size:.72rem;color:var(--text-3);margin-bottom:12px">Tip: add raw materials in Products → Materials tab to attach a recipe and track ingredient usage.</p>')+
    '<div class="field"><label>Product photo</label><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">'+
      '<img class="img-thumb-lg img-prev" src="'+esc(p.photo||'')+'" style="'+(p.photo?'':'display:none')+'" alt="">'+
      '<input type="file" accept="image/*,.heic,.heif" class="input img-input" style="flex:1;min-width:150px;padding:8px">'+
      '<input type="hidden" name="photo" value="'+esc(p.photo||'')+'">'+
      (p.photo?'<button type="button" class="btn btn-sm btn-danger" data-action="img-clear">'+icon('x')+' Remove</button>':'')+
    '</div><p style="font-size:.72rem;color:var(--text-3);margin-top:4px">JPG, PNG, WebP, GIF — auto-compressed to stay light. HEIC works in Safari; elsewhere convert to JPG first. Photos sync to your Firebase cloud along with everything else.</p></div>';

    extraFooterHTML:isEdit?'':'<button type="button" class="btn btn-ghost" data-action="product-save-another">'+icon('plus')+' Save & add another</button>',
    onSubmit:function(form){
    var name=fv(form,'name');
    if(!name){ toast('Give the product a name.','error'); return false; }
    var price=num(fv(form,'price'));
    if(price<0){ toast('Price cannot be negative.','error'); return false; }
    var cat=fv(form,'category');
    if(cat==='__new__'){
      cat=fv(form,'newPcat');
      if(!cat){ toast('Type the new category name.','error'); return false; }
      if(productCats().indexOf(cat)<0) state.settings.productCats=productCats().concat([cat]);

    var attrs={};
    fieldsForCategory(cat).forEach(function(f){ var v=fv(form,'attr_'+f.label); if(v) attrs[f.label]=v; });

    });

      var ex=findProduct(id);
      if(ex) Object.assign(ex,data);
      toast('Product updated — price and stock changes apply everywhere instantly.');
    } else {
      data.id=uid();
      state.products.push(data);
      toast('"'+name+'" added to your catalog.');
      if(window.__prodAddAnother){
        window.__prodAddAnother=false;
        setTimeout(function(){ productModal({category:cat,stock:0,lowStock:5,attrs:{}}); },80);
      }
    }
    return true;
  }});
}
function restockModal(p){
  var hasBom=(p.bom||[]).length>0;
  var body='<input type="hidden" name="id" value="'+p.id+'">'+
    '<p style="font-size:.86rem;color:var(--text-2);margin-bottom:12px">"'+esc(p.name)+'" currently has <b>'+p.stock+'</b> in stock.'+(hasBom?' Recipe on file: you can make <b>'+fmtNum(canMake(p),0)+'</b> more with current materials.':'')+'</p>'+
    '<div class="form-row"><div class="field"><label>Quantity to add</label><input class="input" type="number" step="1" min="1" name="qty" value="10" required></div>'+
    '<div class="field"><label>Total cost (optional — logs an expense)</label><input class="input" type="number" step="any" min="0" name="cost" placeholder="e.g. 1400"></div></div>'+
    (hasBom?'<label class="checkrow" style="margin-bottom:10px"><input type="checkbox" name="consume" checked> Consume raw materials per recipe (you made these)</label>':'');
  openModal('Restock — '+p.name,body,{submitLabel:'Add stock',onSubmit:function(form){
    var qty=Math.round(num(fv(form,'qty')));
    if(qty<=0){ toast('Enter a quantity of at least 1.','error'); return false; }
    var prod=findProduct(fv(form,'id'));
    if(!prod) return false;
    prod.stock+=qty;
    if(form.elements['consume']&&form.elements['consume'].checked) consumeMaterials(prod,qty);
    var cost=num(fv(form,'cost'));
    if(cost>0){
      state.finance.push({id:uid(),type:'expense',amount:cost,date:todayISO(),category:'Inventory / Supplies',note:'Restock: '+prod.name+' ×'+qty,client:'',offer:''});
      toast(qty+' added to "'+prod.name+'" and '+fmtMoney(cost)+' expense logged.');
    } else toast(qty+' added to "'+prod.name+'" — now '+prod.stock+' in stock.');
    return true;
  }});
}

/* ---------- orders & delivery ---------- */
var ORDER_STATUSES=['Pending','Preparing','For Delivery','Delivered','Cancelled'];
function statusAnimHTML(status){
  var cls={'Pending':'st-pending','Preparing':'st-preparing','For Delivery':'st-fordelivery','Delivered':'st-delivered','Cancelled':'st-cancelled'}[status];
  if(!cls) return '';
  var ic={'Pending':'clock','Preparing':'box','For Delivery':'truck','Delivered':'truck','Cancelled':'x'}[status];
  return '<span class="st-anim '+cls+'" title="'+esc(status)+'">'+icon(ic)+
    (status==='Delivered'?'<span class="st-box">'+icon('box')+'</span>':'')+'</span>';
}
function orderTotal(o){
  return sum(o.items||[],function(it){return it.qty*it.price;})+(o.shipFee||0)-(o.discount||0);
}
function nextOrderNumber(){
  var max=0;
  (state.orders||[]).forEach(function(o){ var m=/(\d+)\s*$/.exec(o.number||''); if(m) max=Math.max(max,parseInt(m[1],10)); });
  return 'ORD-'+String(max+1).padStart(4,'0');
}
function applyOrderStock(o,sign){
  (o.items||[]).forEach(function(it){
    var p=findProduct(it.productId);
    if(p) p.stock-=sign*it.qty;
  });
}
function accountForMethod(method){
  if(!method) return '';
  var m=method.toLowerCase();
  var hit=(state.accounts||[]).find(function(a){ return (a.name||'').toLowerCase().indexOf(m)>=0; });
  if(!hit&&m==='cash') hit=(state.accounts||[]).find(function(a){ return a.type==='Cash'; });
  if(!hit&&(m==='bank transfer'||m==='card')) hit=(state.accounts||[]).find(function(a){ return a.type==='Bank'; });
  if(!hit&&m==='gcash') hit=(state.accounts||[]).find(function(a){ return a.type==='E-wallet'; });
  return hit?hit.id:'';
}
function recordOrderIncome(o){
  if(o.incomeRecorded) return;
  state.finance.push({id:uid(),type:'income',amount:orderTotal(o),date:todayISO(),category:'Sales',note:'Order '+o.number+' ('+(o.items||[]).map(function(it){return it.name+'×'+it.qty;}).join(', ')+')',client:o.clientName||'',offer:'',account:accountForMethod(o.payMethod)});
  o.incomeRecorded=true;
  ensureClient(o);
}
function ensureClient(o){
  if(!o.clientName) return;
  var exists=state.clients.some(function(c){return (c.name||'').toLowerCase()===o.clientName.toLowerCase();});
  if(!exists){
    state.clients.push({id:uid(),name:o.clientName,status:'Active',contact:o.contact||'',value:0,note:'Added automatically from order '+o.number,createdAt:todayISO()});
  }
}

  } else {
    list.forEach(function(o){
      var d=daysUntil(o.deliveryDate);
      var late=o.status!=='Delivered'&&o.status!=='Cancelled'&&d!=null&&d<0;
      var prof=orderProfit(o);
      html+='<div class="list-row order-row" style="align-items:flex-start;gap:16px;padding:16px 4px">'+

        '<div style="flex:1.4;min-width:160px"><b class="mono" style="font-size:.8rem;color:var(--accent)">'+esc(o.number)+'</b>'+
          '<div style="font-weight:700">'+esc(o.clientName||'Walk-in')+'</div>'+
          (o.address?'<div style="font-size:.76rem;color:var(--text-3);white-space:pre-wrap">'+esc(o.address)+'</div>':'')+

    if(!items.length){ toast('Add at least one item with a product and quantity.','error'); return false; }
    var id=fv(form,'id');

      }

      data.id=uid(); data.status='Pending'; data.payStatus='Unpaid'; data.incomeRecorded=false; data.createdAt=todayISO();

/* ---------- custom module builder ---------- */
var CM_ICONS=['notes','box','clients','flag','spark','cash','truck','calc','metrics','goals'];
var CM_TYPES=[['text','Text'],['number','Number'],['money','Money'],['date','Date'],['select','Dropdown'],['check','Checkbox'],['image','Photo / file']];
function findModule(id){ return (state.customModules||[]).find(function(m){return m.id===id;}); }
function cmFormatCell(f,v){
  if(v==null||v==='') return '—';
  if(f.type==='image'){
    if(typeof v==='object'&&v&&v.data){
      if((v.data||'').indexOf('data:image')===0) return '<img class="img-thumb" src="'+esc(v.data)+'" alt="">';
      var safeHref=/^(data:|https?:|blob:)/i.test(v.data||'')?esc(v.data):'#';
      return '<a href="'+safeHref+'" download="'+esc(v.name||'file')+'" class="badge accent">📎 '+esc(v.name||'file')+'</a>';
    }
    if(String(v).indexOf('data:image')===0) return '<img class="img-thumb" src="'+esc(v)+'" alt="">';
    return '—';
  }
  if(f.type==='money') return fmtMoney(num(v));
  if(f.type==='number') return fmtNum(num(v));
  if(f.type==='date') return fmtDate(v);
  if(f.type==='check') return v?'<span class="badge good">'+icon('check')+' Yes</span>':'<span class="badge neutral">No</span>';
  return esc(String(v));
}
function viewCustomModule(id){
  var m=findModule(id);
  if(!m) return viewDashboard();
  var html=topbar(m.name,'Your custom module — your fields, your data.',
    '<button class="btn btn-ghost" data-action="custom-module-fields" data-id="'+m.id+'">'+icon('settings')+'<span class="btn-txt">Fields</span></button>'+
    '<button class="btn btn-primary" data-action="cm-record-new" data-id="'+m.id+'">'+icon('plus')+'<span class="btn-txt">Add record</span></button>');
  if(!(m.fields||[]).length){
    html+='<div class="card">'+emptyState('settings','Define your fields first','Add the columns this module should have — text, numbers, money, dates, dropdowns or checkboxes.','<button class="btn btn-sm btn-primary" data-action="custom-module-fields" data-id="'+m.id+'">'+icon('plus')+' Add fields</button>')+'</div>';
    html+=cmFooterHTML(m);
    return html;
  }
  var q=(ui.cmQ&&ui.cmQ[m.id])||'';
  html+='<div class="card"><div class="card-head">'+
    '<div class="searchbar">'+icon('search')+'<input class="input" placeholder="Search records…" value="'+esc(q)+'" data-action-input="cm-search" data-id="'+m.id+'"></div>'+
    '<span class="sub">'+(m.records||[]).length+' record'+((m.records||[]).length===1?'':'s')+'</span></div>';
  var records=(m.records||[]).filter(function(r){
    if(!q) return true;
    var hay=m.fields.map(function(f){return String(r[f.key]==null?'':r[f.key]);}).join(' ').toLowerCase();
    return hay.indexOf(q.toLowerCase())>=0;
  });
  if(!records.length){
    html+=emptyState(m.icon||'notes','No records'+(q?' match your search':' yet'),q?'Try a different search.':'Add your first record — totals for number and money columns are calculated automatically.','<button class="btn btn-sm btn-primary" data-action="cm-record-new" data-id="'+m.id+'">'+icon('plus')+' Add record</button>')+'</div>';
    html+=cmFooterHTML(m);
    return html;
  }
  html+='<div class="table-wrap"><table><thead><tr>'+m.fields.map(function(f){return '<th'+((f.type==='money'||f.type==='number')?' style="text-align:right"':'')+'>'+esc(f.label)+'</th>';}).join('')+'<th></th></tr></thead><tbody>';
  records.slice().reverse().forEach(function(r){
    html+='<tr>'+m.fields.map(function(f){
      return '<td'+((f.type==='money'||f.type==='number')?' class="num" style="text-align:right"':'')+'>'+cmFormatCell(f,r[f.key])+'</td>';
    }).join('')+
    '<td><div class="row-actions"><button class="btn-icon" data-action="cm-record-edit" data-id="'+m.id+'" data-rec="'+r.id+'">'+icon('edit')+'</button><button class="btn-icon danger" data-action="cm-record-delete" data-id="'+m.id+'" data-rec="'+r.id+'">'+icon('trash')+'</button></div></td></tr>';
  });
  // totals row for numeric fields
  var hasNumeric=m.fields.some(function(f){return f.type==='money'||f.type==='number';});
  if(hasNumeric){
    html+='</tbody><tfoot><tr>'+m.fields.map(function(f,i){
      if(f.type==='money') return '<td class="num" style="text-align:right;font-weight:800">'+fmtMoney(sum(records,function(r){return num(r[f.key]);}))+'</td>';
      if(f.type==='number') return '<td class="num" style="text-align:right;font-weight:800">'+fmtNum(sum(records,function(r){return num(r[f.key]);}))+'</td>';
      return '<td>'+(i===0?'<b>Total</b>':'')+'</td>';
    }).join('')+'<td></td></tr></tfoot>';
  } else html+='</tbody>';
  html+='</table></div></div>';
  html+=cmFooterHTML(m);
  return html;
}

function moduleBuilderModal(m){
  var isEdit=!!m;

  var body=
    '<input type="hidden" name="id" value="'+(m.id||'')+'">'+

  openModal(isEdit?'Edit module — '+m.name:'Create your own module',body,{wide:true,submitLabel:isEdit?'Save module':'Create module',onSubmit:function(form){

    var rows=form.querySelectorAll('#mb-rows .mb-row');
    var fields=[];
    var bad=false;
    rows.forEach(function(row){
      var label=row.querySelector('.mb-label').value.trim();
      var keyEl=row.querySelector('.mb-key');
      var type=row.querySelector('.mb-type').value;
      var opts=row.querySelector('.mb-opts').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      if(!label){ if(keyEl) bad=true; return; }
      var f={key:keyEl?keyEl.value:'f'+uid(),label:label,type:type};
      if(type==='select') f.options=opts;
      fields.push(f);
    });
    if(bad){ toast('Every existing field needs a name (or remove it with the ✕).','error'); return false; }
    if(!fields.length){ toast('Add at least one field — that becomes your first column.','error'); return false; }
    var id=fv(form,'id');
    if(id){
      var ex=findModule(id);
      if(!ex) return true;
      var newKeys={}; fields.forEach(function(f){ newKeys[f.key]=1; });
      var removed=ex.fields.filter(function(f){ return !newKeys[f.key]; });
      var hasData=removed.some(function(f){ return (ex.records||[]).some(function(r){ return r[f.key]!=null&&r[f.key]!==''; }); });
      if(removed.length&&hasData&&!confirm('You removed '+removed.length+' field(s) that contain data — their values will be deleted from all records. Continue?')) return false;
      if(removed.length) snapshotForUndo();
      removed.forEach(function(f){ (ex.records||[]).forEach(function(r){ delete r[f.key]; }); });
      ex.name=name; ex.icon=fv(form,'icon'); ex.fields=fields;
      toast('Module saved.'+(removed.length?' ('+removed.length+' field(s) removed)':''),removed.length?'warn':'good',removed.length?{undo:true}:undefined);

      var nm={id:uid(),name:name,icon:fv(form,'icon'),fields:fields,records:[]};

      toast('"'+name+'" is ready — add your first record!');

    }).join('');
  openModal((isEdit?'Edit':'New')+' — '+m.name,body,{onSubmit:function(form){

/* ---------- CSV export ---------- */
function downloadCSV(filename,rows){
  try{
    var csv=rows.map(function(r){
      return r.map(function(c){
        c=c==null?'':String(c);
        return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;
      }).join(',');
    }).join('\r\n');
    var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },2000);
    toast('CSV exported — opens in Excel / Google Sheets.');
  }catch(e){ toast('CSV export failed: '+e.message,'error'); }
}
function exportCSV(what,id){
  var today=todayISO();
  if(what==='finance'){
    var rows=[['Date','Type','Category','Amount','Note','Client']];
    // (invoice export gains currency below)
    state.finance.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');}).forEach(function(e){
      rows.push([e.date,e.type,e.category||'',e.amount,e.note||'',e.client||'']);
    });
    downloadCSV('finance-'+today+'.csv',rows);
  } else if(what==='products'){
    var attrs=productAttrs();
    var rows2=[['Name','SKU','Category'].concat(attrs).concat(['Price','Cost','Stock','Low-stock at','Notes'])];
    (state.products||[]).forEach(function(p){
      rows2.push([p.name,p.sku||'',p.category||''].concat(attrs.map(function(a){return (p.attrs||{})[a]||'';})).concat([p.price,p.cost||0,p.stock,p.lowStock!=null?p.lowStock:'',p.desc||'']));
    });
    downloadCSV('products-'+today+'.csv',rows2);
  } else if(what==='orders'){
    var rows3=[['Order #','Date','Customer','Contact','Address','Items','Total','Status','Payment','Deliver by','Note']];
    (state.orders||[]).forEach(function(o){
      rows3.push([o.number,o.orderDate,o.clientName,o.contact||'',o.address||'',(o.items||[]).map(function(it){return it.name+' x'+it.qty;}).join('; '),orderTotal(o),o.status,o.payStatus,o.deliveryDate||'',o.note||'']);
    });
    downloadCSV('orders-'+today+'.csv',rows3);
  } else if(what==='clients'){
    var rows4=[['Name','Status','Contact','Est. value/mo','Notes']];
    state.clients.forEach(function(c){ rows4.push([c.name,c.status,c.contact||'',c.value||0,c.note||'']); });
    downloadCSV('clients-'+today+'.csv',rows4);
  } else if(what==='module'){
    var m=findModule(id);
    if(!m) return;
    var rows5=[m.fields.map(function(f){return f.label;})];
    (m.records||[]).forEach(function(r){
      rows5.push(m.fields.map(function(f){
        var v=r[f.key];
        if(f.type==='check') return v?'Yes':'No';
        if(f.type==='image') return v?((v.name||'photo')):'';
        return v==null?'':v;
      }));
    });
    downloadCSV(m.name.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+today+'.csv',rows5);
  }
}

/* Compress images client-side so they fit in localStorage and
   sync cleanly to Firebase. Non-image files under 300KB are kept
   as downloadable attachments. */
function processUploadFile(file,cb){
  if(!file){ cb(null,null,'No file selected.'); return; }
  var isImage=/^image\//.test(file.type)||/\.(heic|heif)$/i.test(file.name||'');
  if(!isImage){
    if(file.size>300*1024){ cb(null,null,'Non-image files must be under 300 KB (browser storage is limited). For bigger files, keep a link in a text field instead.'); return; }
    var fr=new FileReader();
    fr.onload=function(){ cb(fr.result,file.name,null); };
    fr.onerror=function(){ cb(null,null,'Could not read the file.'); };
    fr.readAsDataURL(file);
    return;
  }
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      try{
        var max=720, w=img.width, h=img.height;
        var scale=Math.min(1,max/Math.max(w,h));
        var canvas=document.createElement('canvas');
        canvas.width=Math.max(1,Math.round(w*scale));
        canvas.height=Math.max(1,Math.round(h*scale));
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        var out=canvas.toDataURL('image/jpeg',0.72);
        if(out.length>900*1024){ out=canvas.toDataURL('image/jpeg',0.5); }
        cb(out,file.name,null);
      }catch(err){ cb(null,null,'Could not process this image: '+err.message); }
    };
    img.onerror=function(){ cb(null,null,'This browser cannot decode that format. HEIC only works in Safari — please convert to JPG or PNG (your phone’s share menu usually offers this).'); };
    img.src=reader.result;
  };
  reader.onerror=function(){ cb(null,null,'Could not read the file.'); };
  reader.readAsDataURL(file);
}

  processUploadFile(file,function(dataURL,name,err){

    if(hidden) hidden.value=dataURL;
    var nameHidden=wrap.querySelector('input[name$="__name"]');
    if(nameHidden) nameHidden.value=name||'';
    if(prev&&dataURL.indexOf('data:image')===0){ prev.src=dataURL; prev.style.display=''; }
    toast('File attached ('+Math.round(dataURL.length*0.75/1024)+' KB after compression). Click Save to keep it.');
  });
});

  if(action==='img-clear'){
    var wrap=el.parentElement;
    var hidden=wrap.querySelector('input[type="hidden"]');
    var prev=wrap.querySelector('.img-prev');
    if(hidden) hidden.value='';
    var nameHidden=wrap.querySelector('input[name$="__name"]');
    if(nameHidden) nameHidden.value='';
    if(prev){ prev.src=''; prev.style.display='none'; }
    el.style.display='none';
    toast('Photo removed — click Save to confirm.');
    return;
  }
  if(action==='product-duplicate'){
    var p=findProduct(el.getAttribute('data-id'));
    if(p){
      var copy=JSON.parse(JSON.stringify(p));
      delete copy.id;
      copy.name=p.name+' (variant)';
      copy.sku=p.sku?p.sku+'-2':'';
      copy.stock=0;
      productModal(copy);
      toast('Prefilled from "'+p.name+'" — change the scent/color, set stock, then Save.');
    }
    return;
  }
});

/* ============================================================
   v6: sandbox-proof saving — never rely on native form submission.
   Some viewers/in-app browsers block native <form> submit entirely
   (clicks land but no submit event fires). We intercept the click
   on any submit button ourselves and dispatch the submit event
   manually, with a duplicate-fire guard for normal browsers.
   ============================================================ */
function dispatchSubmit(form){
  var ev;
  try{ ev=new Event('submit',{bubbles:true,cancelable:true}); }
  catch(_){ ev=document.createEvent('Event'); ev.initEvent('submit',true,true); }
  form.dispatchEvent(ev);
}
/* every click on a submit button saves directly — no native submit needed */
document.addEventListener('click',function(e){
  var btn=e.target.closest('button');
  if(!btn||btn.disabled) return;
  if((btn.getAttribute('type')||'submit').toLowerCase()!=='submit') return;
  var form=btn.form||btn.closest('form');
  if(!form) return;
  e.preventDefault();
  dispatchSubmit(form);
});
/* Enter key in any form field saves too, same sandbox-proof path */
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter'||e.shiftKey||e.ctrlKey||e.altKey||e.metaKey) return;
  var t=e.target;
  if(!t||!t.form) return;
  if(t.tagName==='TEXTAREA'||t.tagName==='BUTTON') return;
  if(t.id==='palette-input') return;
  e.preventDefault();
  dispatchSubmit(t.form);
});
/* heads-up when running inside another app's preview frame */
(function(){
  try{
    if(window.top!==window.self){
      setTimeout(function(){
        toast('You are viewing this inside another app’s preview. If anything misbehaves, download the file and open it directly in Chrome, Safari, Edge or Firefox.','warn');
      },2200);
    }
  }catch(_){ /* cross-origin frame check can throw — that itself means we are framed */
    setTimeout(function(){
      toast('You are viewing this inside another app’s preview. For full reliability open the file directly in your browser.','warn');
    },2200);
  }
})();

/* ---------- materials & recipes ---------- */
function findMaterial(id){ return (state.materials||[]).find(function(m){return m.id===id;}); }
function canMake(p){
  if(!(p.bom||[]).length) return Infinity;
  var n=Infinity;
  p.bom.forEach(function(b){
    var m=findMaterial(b.materialId);
    if(!m||b.qty<=0){ return; }
    n=Math.min(n,Math.floor(m.stock/b.qty));
  });
  return n===Infinity?0:Math.max(0,n);
}
function consumeMaterials(p,units){
  (p.bom||[]).forEach(function(b){
    var m=findMaterial(b.materialId);
    if(m) m.stock=Math.round((m.stock-b.qty*units)*100)/100;
  });
}

}

function winBackList(){
  var last={};
  state.finance.forEach(function(e){
    if(e.type==='income'&&e.client){
      var k=e.client.toLowerCase();
      if(!last[k]||e.date>last[k]) last[k]=e.date;
    }
  });
  (state.orders||[]).forEach(function(o){
    if(o.status==='Cancelled'||!o.clientName) return;
    var k=o.clientName.toLowerCase();
    if(!last[k]||o.orderDate>last[k]) last[k]=o.orderDate;
  });
  var out=[];
  state.clients.forEach(function(c){
    if(c.status==='Churned') return;
    var k=(c.name||'').toLowerCase();
    if(!last[k]) return;
    var days=-daysUntil(last[k]);
    if(days>=45) out.push({name:c.name,contact:c.contact,days:days,lastDate:last[k]});
  });
  out.sort(function(a,b){ return a.days-b.days; });
  return out;
}

  var card=e.target.closest&&e.target.closest('.kb-card');

  dragOrderId=card.getAttribute('data-order-id');
  card.classList.add('dragging');
  if(e.dataTransfer){ e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain',dragOrderId); }catch(_){} }
});
document.addEventListener('dragend',function(e){
  var card=e.target.closest&&e.target.closest('.kb-card');
  if(card) card.classList.remove('dragging');
});
document.addEventListener('dragover',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  if(col&&dragOrderId){ e.preventDefault(); col.classList.add('drag-over'); }
});
document.addEventListener('dragleave',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  // only un-highlight when the pointer actually leaves the column — not when it
  // crosses onto a child element (which would otherwise flicker the outline)
  if(col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
});
document.addEventListener('drop',function(e){
  var col=e.target.closest&&e.target.closest('[data-drop-status]');
  if(!col||!dragOrderId) return;
  e.preventDefault();
  var o=state.orders.find(function(x){return x.id===dragOrderId;});
  dragOrderId=null;
  if(o){
    var newStatus=col.getAttribute('data-drop-status');
    if(o.status!==newStatus){
      o.status=newStatus;
      commit();
      if(newStatus==='Delivered') toast('📦 '+o.number+' delivered!'+(o.payStatus!=='Paid'?' Mark it paid once you collect.':''));
    }

function copyCatalogText(){

  });

  var text=lines.join('\n');

    catch(_){ toast('Could not copy automatically.','error'); }

  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast('Catalog copied — paste it into any chat. 📋'); },fallback);

/* ---------- v8 wiring ---------- */
document.addEventListener('click',function(e){
  // lightbox: any uploaded image thumbnail/preview
  var img=e.target.closest&&e.target.closest('img.img-thumb,img.img-thumb-lg');
  if(img&&img.getAttribute('src')){ openLightbox(img.getAttribute('src')); return; }
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');

  if(action==='close-lightbox'){ if(e.target===el||el.classList.contains('lb-close')) closeLightbox(); return; }
  if(action==='product-tab'){ ui.productTab=el.getAttribute('data-tab'); render(); return; }

  /* materials */
  if(action==='material-new'){ materialModal(); return; }
  if(action==='material-edit'){ var m=findMaterial(id); if(m) materialModal(m); return; }
  if(action==='material-restock'){ var m2=findMaterial(id); if(m2) materialRestockModal(m2); return; }
  if(action==='material-delete'){
    var m3=findMaterial(id);
    if(!m3) return;
    var usedIn=(state.products||[]).filter(function(p){return (p.bom||[]).some(function(b){return b.materialId===id;});});
    if(confirm('Delete material "'+m3.name+'"?'+(usedIn.length?' It is used in '+usedIn.length+' recipe(s) — it will be removed from them.':''))){
      snapshotForUndo();
      state.materials=state.materials.filter(function(x){return x.id!==id;});
      (state.products||[]).forEach(function(p){ if(p.bom) p.bom=p.bom.filter(function(b){return b.materialId!==id;}); });
      commit(); toast('Material deleted.','warn',{undo:true});
    }
    return;
  }
  if(action==='bom-add'){
    var box=document.getElementById('bom-rows');
    if(box) box.insertAdjacentHTML('beforeend',bomRowHTML());
    return;
  }
  if(action==='bom-del'){
    var row=el.closest('.bom-row');
    if(row) row.remove();
    return;
  }

  /* orders: view, bulk */
  if(action==='order-view'){ ui.orderView=el.getAttribute('data-val'); render(); return; }
  if(action==='bulk-clear'){ ui.selOrders={}; render(); return; }
  if(action==='bulk-status'){
    var val=el.getAttribute('data-val');
    selectedOrders().forEach(function(o){ if(o.status!=='Cancelled') o.status=val; });
    ui.selOrders={};
    commit(); toast('Selected orders moved to "'+val+'".');
    return;
  }
  if(action==='bulk-paid'){
    var sel=selectedOrders().filter(function(o){return o.payStatus!=='Paid'&&o.status!=='Cancelled';});
    if(!sel.length){ toast('No unpaid orders selected.','warn'); return; }
    if(confirm('Mark '+sel.length+' order(s) as PAID ('+fmtMoney(sum(sel,orderTotal))+' total)? Income is recorded for each.')){
      sel.forEach(function(o){ o.payStatus='Paid'; o.paidDate=todayISO(); recordOrderIncome(o); });
      ui.selOrders={};
      commit(); toast('💰 '+fmtMoney(sum(sel,orderTotal))+' collected across '+sel.length+' orders.');
    }
    return;
  }
  if(action==='bulk-print'){
    var sel2=selectedOrders();
    if(!sel2.length){ toast('Select orders first.','warn'); return; }
    printDoc(sel2.map(function(o){ return orderSlipDocHTML(o)+'<div class="pr-page-break"></div>'; }).join(''));
    return;
  }

  /* catalog */
  if(action==='print-catalog'){ printDoc(catalogDocHTML()); return; }
  if(action==='copy-catalog'){ copyCatalogText(); return; }

  /* presets in settings */
  if(action==='apply-preset'){
    var key=el.getAttribute('data-preset');
    if(confirm('Apply the "'+(BIZ_PRESETS[key]||{}).label+'" preset? This replaces your product categories and attributes (products keep their data).')) applyBizPreset(key);
    return;
  }
});

var ACCOUNT_TYPES=['Bank','E-wallet','Cash','Credit card','Other'];
function findAccount(id){ return (state.accounts||[]).find(function(a){return a.id===id;}); }
function accountBalance(a){
  var bal=a.opening||0;
  state.finance.forEach(function(e){
    if(e.account!==a.id) return;
    bal+=e.type==='income'?e.amount:-e.amount;
  });
  (state.transfers||[]).forEach(function(t){
    if(t.to===a.id) bal+=t.amount;
    if(t.from===a.id) bal-=t.amount;
  });
  (a.adjust||[]).forEach(function(adj){ bal+=adj.delta; });
  return Math.round(bal*100)/100;
}
function accountMonthFlow(a,mk){
  var inn=0,out=0;
  state.finance.forEach(function(e){
    if(e.account!==a.id||monthKey(e.date)!==mk) return;
    if(e.type==='income') inn+=e.amount; else out+=e.amount;
  });
  return {inn:inn,out:out};
}
function receivablesTotal(){
  var inv=sum((state.invoices||[]).filter(function(iv){return iv.status!=='Paid';}),function(iv){return iv.amount;});
  var ord=sum((state.orders||[]).filter(function(o){return o.payStatus!=='Paid'&&o.status!=='Cancelled';}),orderTotal);
  return inv+ord;
}

    var color=fv(form,'color')||brandColorFor(name);
    var logo=form.elements['logo']?form.elements['logo'].value:'';
    if(id){
      var ex=findAccount(id);

      toast('Account updated.');
    } else {
      state.accounts.push({id:uid(),name:name,type:fv(form,'type'),opening:num(fv(form,'opening')),note:fv(form,'note'),color:color,logo:logo,adjust:[]});
      toast('"'+name+'" added — assign entries to it to keep the balance live.');
    }
    return true;
  }});
}
function transferModal(){
  if((state.accounts||[]).length<2){ toast('You need at least two accounts to transfer between.','warn'); return; }
  var opts=state.accounts.map(function(a){return '<option value="'+a.id+'">'+esc(a.name)+' ('+fmtMoney(accountBalance(a))+')</option>';}).join('');
  var body=
    '<div class="form-row"><div class="field"><label>From</label><select class="input" name="from">'+opts+'</select></div>'+
    '<div class="field"><label>To</label><select class="input" name="to">'+opts+'</select></div></div>'+
    '<div class="form-row"><div class="field"><label>Amount ('+esc(state.settings.currency)+') *</label><input class="input" type="number" step="any" min="0.01" name="amount" required></div>'+
    '<div class="field"><label>Date</label><input class="input" type="date" name="date" value="'+todayISO()+'"></div></div>'+
    '<div class="field"><label>Note</label><input class="input" name="note" placeholder="e.g. weekly GCash sweep"></div>';
  openModal('Transfer between accounts',body,{submitLabel:'Transfer',onSubmit:function(form){
    var from=fv(form,'from'),to=fv(form,'to'),amount=num(fv(form,'amount'));
    if(from===to){ toast('Pick two different accounts.','error'); return false; }
    if(amount<=0){ toast('Enter an amount greater than zero.','error'); return false; }
    state.transfers.push({id:uid(),from:from,to:to,amount:amount,date:fv(form,'date')||todayISO(),note:fv(form,'note')});
    var ta=findAccount(to);
    toast(fmtMoney(amount)+' moved to '+(ta?ta.name:'account')+'.');
    return true;
  }});
}
function reconcileModal(a){
  var bal=accountBalance(a);
  var body='<input type="hidden" name="id" value="'+a.id+'">'+
    '<p style="font-size:.86rem;color:var(--text-2);margin-bottom:12px">Trakora thinks <b>'+esc(a.name)+'</b> holds <b>'+fmtMoney(bal)+'</b>. Check the real balance in your bank app / wallet and enter it below — the difference is recorded as an adjustment so the numbers match reality.</p>'+
    '<div class="field"><label>Actual balance right now ('+esc(state.settings.currency)+')</label><input class="input" type="number" step="any" name="actual" value="'+bal+'" required></div>';
  openModal('Reconcile — '+a.name,body,{submitLabel:'Reconcile',onSubmit:function(form){
    var acct=findAccount(fv(form,'id'));
    if(!acct) return true;
    var actual=num(fv(form,'actual'));
    var delta=Math.round((actual-accountBalance(acct))*100)/100;
    if(delta===0){ toast('Already matching — nothing to adjust. 🎯'); return true; }
    acct.adjust=acct.adjust||[];
    acct.adjust.push({id:uid(),delta:delta,date:todayISO(),note:'Reconciliation'});
    toast('Adjusted by '+(delta>0?'+':'')+fmtMoney(delta)+' — '+acct.name+' now matches reality.');
    return true;
  }});
}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');
  if(action==='acct-swatch'){
    var form=el.closest('form');
    if(form&&form.elements['color']){ form.elements['color'].value=el.getAttribute('data-color'); form.elements['color'].setAttribute('data-touched','1'); }
    return;
  }
  if(action==='account-new'){ accountModal(); return; }
  if(action==='account-edit'){ var a=findAccount(id); if(a) accountModal(a); return; }
  if(action==='account-reconcile'){ var a2=findAccount(id); if(a2) reconcileModal(a2); return; }
  if(action==='account-delete'){
    var a3=findAccount(id);
    if(a3&&confirm('Delete account "'+a3.name+'" ('+fmtMoney(accountBalance(a3))+')? Entries assigned to it become unassigned; its transfers are removed.')){
      snapshotForUndo();
      state.accounts=state.accounts.filter(function(x){return x.id!==id;});
      state.finance.forEach(function(en){ if(en.account===id) en.account=''; });
      state.transfers=(state.transfers||[]).filter(function(t){return t.from!==id&&t.to!==id;});
      commit(); toast('Account deleted.','warn',{undo:true});
    }
    return;
  }
  if(action==='transfer-new'){ transferModal(); return; }
  if(action==='transfer-delete'){
    if(confirm('Delete this transfer? Both account balances will update.')){
      state.transfers=state.transfers.filter(function(t){return t.id!==id;});
      commit(); toast('Transfer removed.','warn');
    }
    return;
  }
});

/* ---------- Today panel: what needs your attention right now ---------- */
function todayPanelHTML(){

  if(dueToday.length) items.push({cls:'info',icon:'truck',text:'<b>'+dueToday.length+'</b> deliver'+(dueToday.length>1?'ies':'y')+' today — '+esc(dueToday.map(function(o){return o.clientName;}).join(', ')),route:'orders'});

  if(tToday.length) items.push({cls:'info',icon:'tasks',text:'<b>'+tToday.length+'</b> task'+(tToday.length>1?'s':'')+' due today',route:'tasks'});

  if((state.accounts||[]).length){
    var cash=sum(state.accounts,accountBalance);
    items.push({cls:'good',icon:'bank',text:'Cash on hand: <b>'+fmtMoney(cash)+'</b> · true position <b>'+fmtMoney(cash+receivablesTotal())+'</b>',route:'accounts'});

/* ---------- storage meter ---------- */
function storageUsage(){
  var bytes=0;
  try{ bytes=(localStorage.getItem(LS_KEY)||'').length*2; }catch(_){ }
  var photoBytes=0, photoCount=0;
  function countImg(v){ if(v&&typeof v==='string'&&v.indexOf('data:')===0){ photoBytes+=v.length*2; photoCount++; } }
  (state.products||[]).forEach(function(p){ countImg(p.photo); });
  (state.accounts||[]).forEach(function(a){ countImg(a.logo); });
  state.finance.forEach(function(e){ countImg(e.receipt); });
  (state.customModules||[]).forEach(function(m){ (m.records||[]).forEach(function(r){ m.fields.forEach(function(f){ if(f.type==='image'&&r[f.key]&&r[f.key].data) countImg(r[f.key].data); }); }); });
  return {bytes:bytes,photoBytes:photoBytes,photoCount:photoCount,limit:5*1024*1024};
}
function storageCardHTML(){
  var u=storageUsage();
  var pct=clamp(u.bytes/u.limit*100,0,100);
  var cls=pct>=85?'risk':(pct>=65?'warn':'good');
  return '<div class="card"><div class="card-head"><h3>Storage health</h3><span class="spacer"></span><span class="badge '+cls+'">'+fmtNum(pct,0)+'% used</span></div>'+
    '<div class="progress thick"><div class="bar '+cls+'" style="width:'+pct+'%"></div></div>'+
    '<p style="font-size:.8rem;color:var(--text-2);margin-top:10px">'+fmtNum(u.bytes/1024,0)+' KB of ~5,120 KB browser storage. Photos: <b>'+u.photoCount+'</b> using '+fmtNum(u.photoBytes/1024,0)+' KB.'+
    (pct>=65?' <b style="color:var(--'+(pct>=85?'risk':'warn')+')">Getting full</b> — export a backup, then remove old receipt photos (the entries stay; only the images go).':' Plenty of room.')+'</p>'+
    '<button class="btn btn-sm btn-ghost" data-action="trim-receipts" style="margin-top:10px">'+icon('trash')+' Trim receipt photos older than 6 months</button></div>';
}
function storageWarnOnBoot(){
  var u=storageUsage();
  var pct=u.bytes/u.limit*100;
  if(pct>=65) setTimeout(function(){
    toast('Browser storage is '+fmtNum(pct,0)+'% full (mostly photos). Export a backup and trim old receipt images in Settings → Data & Sync.',pct>=85?'error':'warn');
  },2600);
}

  var years={};
  state.finance.forEach(function(e){ var y=(e.date||'').slice(0,4); if(y) years[y]=1; });

  var thisYear=todayISO().slice(0,4);
  if(yearList.indexOf(thisYear)<0) yearList.push(thisYear);

  if(yearList.indexOf(selected)<0) selected=yearList[yearList.length-1];
  var html=topbar('Reports','P&L summaries — print any of them or save as PDF.',
    '<button class="btn btn-primary" data-action="print-year-report" data-year="'+selected+'">'+icon('print')+'<span class="btn-txt">Print / Save PDF</span></button>');
  html+='<div class="card"><div class="card-head"><div class="seg">'+
    '<button data-action="report-period" data-val="month">Monthly</button>'+
    '<button class="active" data-action="report-period" data-val="year">Yearly</button></div>'+
    '<span class="spacer"></span>'+
    '<select class="input" style="width:auto" data-action-change="report-year">'+
    yearList.slice().reverse().map(function(y){return '<option value="'+y+'"'+(selected===y?' selected':'')+'>'+y+'</option>';}).join('')+'</select></div>';
  var yd=yearData(selected);
  html+='<div class="grid grid-4" style="margin-top:4px">'+
    statCard('Revenue '+selected,fmtMoney(yd.revenue),'','','arrowur')+
    statCard('Expenses',fmtMoney(yd.expenses),'','','arrowdr')+
    statCard('Net profit',fmtMoney(yd.profit),'<span class="stat-delta '+(yd.profit>=0?'up':'down')+'">'+(yd.revenue>0?fmtPct(yd.profit/yd.revenue*100,0)+' margin':'—')+'</span>','','wallet')+
    statCard('Best month',yd.bestMonth?monthLabel(yd.bestMonth):'—',yd.bestMonth?'<span class="stat-delta up">'+fmtMoney(yd.bestAmount)+' revenue</span>':'','','spark')+
  '</div></div>';
  html+='<div class="card mt"><div class="card-head"><h3>Month by month — '+selected+'</h3></div><div class="table-wrap"><table><thead><tr><th>Month</th><th style="text-align:right">Revenue</th><th style="text-align:right">Expenses</th><th style="text-align:right">Profit</th></tr></thead><tbody>'+
    yd.months.map(function(r){
      return '<tr><td style="font-weight:600">'+monthLabel(r.k)+'</td><td class="num" style="text-align:right;color:var(--income)">'+fmtMoney(r.rev)+'</td><td class="num" style="text-align:right;color:var(--expense)">'+fmtMoney(r.exp)+'</td><td class="num" style="text-align:right;font-weight:700;color:'+(r.rev-r.exp>=0?'var(--income)':'var(--expense)')+'">'+fmtMoney(r.rev-r.exp)+'</td></tr>';
    }).join('')+
    '</tbody></table></div></div>';
  html+='<div class="grid grid-2 mt">'+
    '<div class="card"><div class="card-head"><h3>Top income sources</h3></div>'+rankListHTML(yd.topIncomeCats)+'</div>'+
    '<div class="card"><div class="card-head"><h3>Top clients</h3></div>'+rankListHTML(yd.topClients)+'</div></div>';
  return html;
}
function yearData(year){
  var rev=0,exp=0,byMonth={},cats={},clients={};
  state.finance.forEach(function(e){
    if((e.date||'').slice(0,4)!==year) return;
    var mk=monthKey(e.date);
    byMonth[mk]=byMonth[mk]||{rev:0,exp:0};
    if(e.type==='income'){ rev+=e.amount; byMonth[mk].rev+=e.amount; cats[e.category||'Other']=(cats[e.category||'Other']||0)+e.amount; if(e.client) clients[e.client]=(clients[e.client]||0)+e.amount; }
    else { exp+=e.amount; byMonth[mk].exp+=e.amount; }
  });
  var months=Object.keys(byMonth).sort().map(function(k){ return {k:k,rev:byMonth[k].rev,exp:byMonth[k].exp}; });
  var best=null,bestAmt=0;
  months.forEach(function(m){ if(m.rev>bestAmt){ bestAmt=m.rev; best=m.k; } });
  function rank(map){ return Object.keys(map).sort(function(a,b){return map[b]-map[a];}).slice(0,6).map(function(k){return {label:k,value:map[k]};}); }
  return {revenue:rev,expenses:exp,profit:rev-exp,months:months,bestMonth:best,bestAmount:bestAmt,topIncomeCats:rank(cats),topClients:rank(clients)};
}
function rankListHTML(list){
  if(!list.length) return '<p style="font-size:.8rem;color:var(--text-3)">No data for this year.</p>';
  var max=list[0].value||1;
  return list.map(function(x){
    return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:.84rem"><span>'+esc(x.label)+'</span><b class="num">'+fmtMoney(x.value)+'</b></div>'+
      '<div class="progress" style="height:5px;margin-top:3px"><div class="bar" style="width:'+(x.value/max*100)+'%"></div></div></div>';
  }).join('');
}
function buildYearReportDoc(year){
  var yd=yearData(year);
  return '<div class="pr-doc"><h1>'+esc(state.settings.businessName)+'</h1>'+
    '<div class="pr-meta">Annual business report — '+year+' · generated '+fmtDate(todayISO())+'</div>'+
    '<h2>Summary</h2><table><tbody>'+
    '<tr><td>Revenue</td><td class="num">'+fmtMoney(yd.revenue)+'</td></tr>'+

/* ---------- receipt OCR (Tesseract.js, lazy-loaded from CDN) ---------- */
var tessPromise=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve(window.Tesseract);
  if(tessPromise) return tessPromise;
  tessPromise=new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=function(){ window.Tesseract?resolve(window.Tesseract):reject(new Error('OCR library loaded but unavailable.')); };
    s.onerror=function(){ tessPromise=null; reject(new Error('Could not download the OCR engine — check your internet connection.')); };
    document.head.appendChild(s);
  });
  return tessPromise;
}
function parseReceiptText(text){
  var lines=(text||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var out={amount:null,date:null,merchant:'',category:''};
  // amount: prefer lines mentioning total/amount due; take the largest number on them
  var totRe=/(grand\s*total|total\s*amount|amount\s*due|^total\b|\btotal\b)/i;
  var numRe=/\d{1,3}(?:[.,]\d{3})*[.,]\d{2}|\d+[.,]\d{2}/g;
  function parseNum(sv){ 
    sv=sv.replace(/[^0-9.,]/g,'');
    if(/,\d{2}$/.test(sv)&&sv.indexOf('.')<0) sv=sv.replace(',','.'); // euro-style decimals
    return parseFloat(sv.replace(/,/g,''));
  }
  var totalCands=[],allCands=[];
  lines.forEach(function(line){
    var nums=line.match(numRe);
    if(!nums) return;
    nums.forEach(function(nstr){
      var v=parseNum(nstr);
      if(!isFinite(v)||v<=0||v>10000000) return;
      allCands.push(v);
      if(totRe.test(line)&&!/sub\s*total|vat|tax|change|tender/i.test(line)) totalCands.push(v);
    });
  });
  if(totalCands.length) out.amount=Math.max.apply(null,totalCands);
  else if(allCands.length) out.amount=Math.max.apply(null,allCands);
  // date: mm/dd/yyyy, dd-mm-yyyy, "Jan 5, 2026" etc.
  var joined=lines.join(' ');
  var m=joined.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if(m){
    var a=+m[1],b=+m[2],y=+m[3]; if(y<100) y+=2000;
    var mo=a,da=b;
    if(a>12&&b<=12){ mo=b; da=a; }
    if(mo>=1&&mo<=12&&da>=1&&da<=31&&y>2000&&y<2100)
      out.date=y+'-'+String(mo).padStart(2,'0')+'-'+String(da).padStart(2,'0');
  }
  if(!out.date){
    var mn=joined.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2}),?\s+(\d{4})/i);
    if(mn){
      var months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      out.date=mn[3]+'-'+String(months.indexOf(mn[1].toLowerCase().slice(0,3))+1).padStart(2,'0')+'-'+String(+mn[2]).padStart(2,'0');
    }
  }
  // merchant: first line that looks like a name (letters, not receipt boilerplate)
  for(var i=0;i<Math.min(lines.length,6);i++){
    var L=lines[i];
    if(/receipt|invoice|official|tel|vat|tin|date|cashier|address/i.test(L)) continue;
    if((L.match(/[A-Za-z]/g)||[]).length>=3&&L.length<=48){ out.merchant=L.replace(/[^\w\s&.'-]/g,'').trim(); break; }
  }
  // category guess
  var lower=joined.toLowerCase();
  if(/grab|taxi|fare|gas|petron|shell|caltex|parking|toll/.test(lower)) out.category='Transport';
  else if(/grocery|supermarket|mart|hardware|supplies|wax|craft/.test(lower)) out.category='Inventory / Supplies';
  else if(/meralco|electric|water|internet|pldt|globe|converge|rent/.test(lower)) out.category='Rent & Utilities';
  else if(/facebook|meta|google|ads|boost/.test(lower)) out.category='Marketing & Ads';
  return out;
}
function scanReceipt(btn){
  var form=btn.closest('form');
  if(!form) return;
  var img=form.elements['receipt']?form.elements['receipt'].value:'';
  if(!img){ toast('Attach a receipt photo first, then scan.','warn'); return; }
  var origLabel=btn.innerHTML;
  btn.disabled=true;
  btn.textContent='Loading OCR engine…';
  loadTesseract().then(function(T){
    btn.textContent='Scanning… 0%';
    return T.recognize(img,'eng',{logger:function(m){
      if(m.status==='recognizing text') btn.textContent='Scanning… '+Math.round((m.progress||0)*100)+'%';
    }});
  }).then(function(res){
    var parsed=parseReceiptText(res&&res.data?res.data.text:'');
    var filled=[];
    if(parsed.amount&&form.elements['amount']&&!num(form.elements['amount'].value)){ form.elements['amount'].value=parsed.amount; filled.push('amount '+fmtMoney(parsed.amount)); }
    if(parsed.date&&form.elements['date']){ form.elements['date'].value=parsed.date; filled.push('date'); }
    if(parsed.merchant&&form.elements['note']&&!form.elements['note'].value.trim()){ form.elements['note'].value=parsed.merchant; filled.push('merchant "'+parsed.merchant+'"'); }
    if(parsed.category&&form.elements['category']){
      var sel=form.elements['category'];
      for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===parsed.category){ sel.value=parsed.category; filled.push('category'); break; } }
    }
    if(filled.length) toast('Scanned ✓ Prefilled: '+filled.join(', ')+'. Double-check before saving!');
    else toast('Scanned the photo but could not confidently read values — enter them manually.','warn');
  }).catch(function(err){
    toast('OCR failed: '+err.message,'error');
  }).then(function(){
    btn.disabled=false;
    btn.innerHTML=origLabel;
  });
}
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action="ocr-scan"]');
  if(el) scanReceipt(el);
});

/* ---------- utang / lista ---------- */
function utangBalance(u){
  return Math.max(0,Math.round((u.amount-sum(u.payments||[],function(p){return p.amount;}))*100)/100);
}
function utangTotals(){
  var open=(state.utang||[]).filter(function(u){return !u.settled&&utangBalance(u)>0;});
  var names={};
  open.forEach(function(u){ names[(u.clientName||'').toLowerCase()]=1; });
  return {total:sum(open,utangBalance),customers:Object.keys(names).length,open:open};
}
function utangOverdue(){
  var od=(state.utang||[]).filter(function(u){
    if(u.settled||utangBalance(u)<=0) return false;
    return -daysUntil(u.date)>=30;
  });
  return {count:od.length,total:sum(od,utangBalance)};
}
function viewUtang(){
  var ut=utangTotals();
  var od=utangOverdue();
  var mk=thisMonthKey();
  var collected=0;
  (state.utang||[]).forEach(function(u){ (u.payments||[]).forEach(function(p){ if(monthKey(p.date)===mk) collected+=p.amount; }); });
  var html=topbar('Customer Credit','The digital credit notebook — customer tabs, partial payments, nothing forgotten.',
    '<button class="btn btn-primary" data-action="utang-new">'+icon('plus')+'<span class="btn-txt">'+esc(tr('Add credit'))+'</span></button>');
  html+='<div class="grid grid-4">'+
    statCard('Total credit owed',fmtMoney(ut.total),'<span class="stat-delta flat">'+ut.customers+' customer'+(ut.customers===1?'':'s')+'</span>','','ledger')+
    statCard('30+ days old',fmtMoney(od.total),od.count?'<span class="stat-delta down">'+od.count+' to follow up</span>':'<span class="stat-delta up">nothing aging</span>','','clock')+
    statCard('Collected this month',fmtMoney(collected),'<span class="stat-delta up">recorded as income on payment</span>','','cash')+
    statCard('Settled all-time',String((state.utang||[]).filter(function(u){return u.settled||utangBalance(u)<=0;}).length),'','','check')+
  '</div>';
  var list=(state.utang||[]).slice().sort(function(a,b){
    var ba=utangBalance(a)>0&&!a.settled, bb=utangBalance(b)>0&&!b.settled;
    if(ba!==bb) return ba?-1:1;
    return (a.date||'').localeCompare(b.date||'');
  });
  html+='<div class="card mt-lg">';
  if(!list.length){
    html+=emptyState('ledger','No customer credit yet','When a regular customer says "I\'ll pay later," record it here. Track partial payments, and income is only counted when cash actually arrives — honest cash-basis bookkeeping.','<button class="btn btn-sm btn-primary" data-action="utang-new">'+icon('plus')+' '+esc(tr('Add credit'))+'</button>');
  } else {
    // group by customer
    var groups={};
    list.forEach(function(u){
      var k=(u.clientName||'?');
      (groups[k]=groups[k]||[]).push(u);
    });
    Object.keys(groups).sort(function(a,b){
      return sum(groups[b],utangBalance)-sum(groups[a],utangBalance);
    }).forEach(function(name){
      var entries=groups[name];
      var bal=sum(entries.filter(function(u){return !u.settled;}),utangBalance);
      html+='<div style="border-bottom:1px solid var(--border);padding:12px 2px">'+
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font-size:.95rem;flex:1">'+esc(name)+'</b>'+
        (bal>0?'<span class="badge '+(entries.some(function(u){return !u.settled&&-daysUntil(u.date)>=30;})?'warn':'accent')+'" style="font-size:.8rem">'+esc(tr('balance'))+': '+fmtMoney(bal)+'</span>':'<span class="badge good">'+icon('check')+' '+esc(tr('fully paid'))+'</span>')+'</div>';
      entries.forEach(function(u){
        var b=utangBalance(u);
        var done=u.settled||b<=0;
        var age=-daysUntil(u.date);
        html+='<div style="margin-top:8px;padding:8px 12px;background:var(--bg-sunken);border-radius:10px">'+
          '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
          '<span style="flex:1;font-size:.86rem;'+(done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(u.note||tr('Credit'))+'</span>'+
          (u.category?'<span class="badge neutral" style="font-size:.62rem">'+esc(u.category)+'</span>':'')+
          '<span style="font-size:.72rem;color:var(--text-3)">'+fmtDate(u.date)+
            (u.dueDate?' · expects '+fmtDate(u.dueDate)+(!done&&daysUntil(u.dueDate)<0?' <b style="color:var(--risk)">late</b>':''):
             (!done&&age>=30?' · <b style="color:var(--warn)">'+age+'d</b>':''))+'</span>'+
          '<b class="num" style="font-size:.9rem;'+(done?'color:var(--text-3)':'')+'">'+fmtMoney(u.amount)+'</b></div>';
        if((u.payments||[]).length){
          html+='<div style="margin-top:4px;font-size:.74rem;color:var(--text-2)">'+u.payments.map(function(p){
            return '↳ '+esc(tr('payment'))+' '+fmtMoney(p.amount)+' · '+fmtDate(p.date)+(p.note?' ('+esc(p.note)+')':'');
          }).join('<br>')+'</div>';
        }
        if(!done){
          html+='<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">'+
            '<span class="badge risk">'+esc(tr('balance'))+': '+fmtMoney(b)+'</span>'+
            '<button class="btn btn-sm btn-good" data-action="utang-paid-full" data-id="'+u.id+'">'+icon('check')+' Mark paid</button>'+
            '<button class="btn btn-sm btn-ghost" data-action="utang-pay" data-id="'+u.id+'" title="Record a partial payment">'+icon('cash')+' Partial</button>'+
            '<button class="btn-icon" data-action="utang-edit" data-id="'+u.id+'">'+icon('edit')+'</button>'+
            '<button class="btn-icon danger" data-action="utang-delete" data-id="'+u.id+'">'+icon('trash')+'</button></div>';
        } else {
          html+='<div style="display:flex;gap:6px;margin-top:6px"><button class="btn-icon danger" data-action="utang-delete" data-id="'+u.id+'">'+icon('trash')+'</button></div>';
        }
        html+='</div>';
      });
      html+='</div>';
    });
  }
  html+='</div>';
  html+='<p style="font-size:.74rem;color:var(--text-3);margin-top:10px">💡 Cash-basis: credit is not income yet. Income is recorded only when a payment is received — so your P&L always matches real money.</p>';
  return html;
}

/* ---------- PH seasonal radar ---------- */
function phSeasonalEvents(){
  var now=new Date();
  function nthSunday(year,month,n){
    var d=new Date(year,month,1);
    var first=1+((7-d.getDay())%7);
    return new Date(year,month,first+7*(n-1));
  }
  var evs=[];
  [now.getFullYear(),now.getFullYear()+1].forEach(function(y){
    evs.push({name:"Valentine's Day",date:new Date(y,1,14),tip:'Gifting peak — romantic scents, couple bundles, pre-orders one week ahead.'});
    evs.push({name:'Graduation season',date:new Date(y,2,20),tip:'March–April grads — congrats bundles and personalized keychains.'});
    evs.push({name:"Mother's Day",date:nthSunday(y,4,2),tip:'One of the biggest gifting days of the year — gift boxes and floral scents.'});
    evs.push({name:"Father's Day",date:nthSunday(y,5,3),tip:'Gifting bump — woody/masculine scents and keychains.'});
    evs.push({name:"'Ber months kickoff",date:new Date(y,8,1),tip:'Christmas season starts NOW in PH — begin holiday production and teasers.'});
    evs.push({name:'Christmas peak',date:new Date(y,11,15),tip:'Peak gifting week — last call for orders; ship/produce early.'});
  });
  evs=evs.filter(function(e){
    var diff=(e.date-now)/86400000;
    return diff>=0&&diff<=75;
  }).sort(function(a,b){ return a.date-b.date; });
  return evs;
}

/* ---------- receipt photo cleanup (storage longevity) ---------- */
function trimOldReceipts(){
  var cutoff=shiftMonth(thisMonthKey(),-6)+'-01';
  var targets=state.finance.filter(function(e){ return e.receipt&&e.date<cutoff; });
  if(!targets.length){ toast('No receipt photos older than 6 months — storage is clean. ✨','good'); return; }
  var bytes=sum(targets,function(e){return e.receipt.length;})*2;
  if(!confirm('Remove '+targets.length+' receipt photo'+(targets.length>1?'s':'')+' older than 6 months (frees ~'+fmtNum(bytes/1024,0)+' KB)? The entries and amounts stay — only the images are removed. Export a backup first if you need them for taxes.')) return;
  snapshotForUndo();
  targets.forEach(function(e){ e.receipt=''; });
  commit();
  toast(targets.length+' old receipt photos removed — ~'+fmtNum(bytes/1024,0)+' KB freed.','good',{undo:true});
}

var FX_CURRENCIES=['PHP','USD','EUR','GBP','AUD','CAD','SGD','AED','JPY'];
var FX_SYMBOLS={PHP:'₱',USD:'$',EUR:'€',GBP:'£',AUD:'A$',CAD:'C$',SGD:'S$',AED:'AED ',JPY:'¥'};
function fxRateFor(cur){
  if(!cur||cur==='PHP') return 1;
  var fx=state.settings.fx||{};
  var r=fx.phpPer&&fx.phpPer[cur];
  return (r&&r>0)?r:1; // display fallback; use fxRateValid() before recording money
}
function fxRateValid(cur){
  if(!cur||cur==='PHP') return true;
  var fx=state.settings.fx||{}, r=fx.phpPer&&fx.phpPer[cur];
  return !!(r&&r>0);
}
/* automatic rates: free open API, no key. Falls back to saved/manual rates offline. */
var fxFetching=false;
function fetchFxRates(manual){
  if(fxFetching) return;
  fxFetching=true;
  fetch('https://open.er-api.com/v6/latest/PHP')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(d){
      if(!d||!d.rates) throw new Error('no rates in response');
      var fx=state.settings.fx=state.settings.fx||{auto:true,phpPer:{}};
      fx.phpPer=fx.phpPer||{};
      FX_CURRENCIES.forEach(function(c){
        if(c!=='PHP'&&d.rates[c]) fx.phpPer[c]=Math.round((1/d.rates[c])*10000)/10000;
      });
      fx.updated=new Date().toISOString();
      save();
      if(manual){ toast('Exchange rates updated — ₱'+fmtNum(fx.phpPer.USD,2)+' per $1.'); render(); }
    })
    .catch(function(e){
      if(manual) toast('Could not fetch live rates ('+e.message+') — using your saved rates. You can edit them manually below.','warn');
    })
    .then(function(){ fxFetching=false; });
}
function fxAutoUpdateCheck(){
  var fx=state.settings.fx||{};
  if(fx.auto===false) return;
  var stale=!fx.updated||(Date.now()-new Date(fx.updated).getTime())>24*3600*1000;
  if(stale&&navigator.onLine!==false) setTimeout(function(){ fetchFxRates(false); },3000);
}

  return '<div class="card"><div class="card-head"><h3>Currency conversion</h3><span class="spacer"></span>'+

    '<p style="font-size:.8rem;color:var(--text-2);margin-bottom:12px">Used when an invoice is in a foreign currency — the peso equivalent shows on the invoice and your books record pesos. Rates auto-update daily when online (free public API); edit them manually anytime.</p>'+
    '<form data-form="fx-rates"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">'+
      FX_CURRENCIES.filter(function(c){return c!=='PHP';}).map(function(c){
        return '<div class="field" style="margin-bottom:0"><label>₱ per 1 '+c+'</label><input class="input" type="number" step="any" min="0" name="fx_'+c+'" value="'+(fx.phpPer&&fx.phpPer[c]!=null?fx.phpPer[c]:'')+'"></div>';
      }).join('')+'</div>'+
    '<label class="checkrow" style="margin:12px 0"><input type="checkbox" name="fxauto"'+(fx.auto!==false?' checked':'')+'> Auto-update rates daily when online</label>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    '<button class="btn btn-primary btn-sm" type="submit">'+icon('check')+' Save rates</button>'+
    '<button class="btn btn-ghost btn-sm" type="button" data-action="fx-update-now">'+icon('refresh')+' Update from live rates now</button>'+
    '</div></form></div>';
}
document.addEventListener('click',function(e){

});

  var form=e.target;

});

/* task view wiring */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var action=el.getAttribute('data-action');
  var id=el.getAttribute('data-id');
  if(action==='task-view'){ ui.taskView=el.getAttribute('data-val'); render(); return; }
  if(action==='cal-day-add'){
    taskModal({deadline:el.getAttribute('data-date'),priority:'Medium',bucket:'weekly'});
    return;
  }
  if(action==='task-cal-nav'){
    ui.taskCalMonth=shiftMonth(ui.taskCalMonth||thisMonthKey(),parseInt(el.getAttribute('data-dir'),10));
    render(); return;
  }
  if(action==='task-next-lane'){
    var t=state.tasks.find(function(x){return x.id===id;});
    if(t){
      var lanes=taskLanes();
      var i=lanes.indexOf(t.status||lanes[0]);
      if(i<lanes.length-1){ setTaskStatus(t,lanes[i+1]); commit(); if(t.done) toast('Nice — task done.'); }
    }
    return;
  }
  if(action==='task-lane-add'){
    var name=prompt('Name of the new lane: (it is inserted before "'+doneLane()+'")');
    if(name&&name.trim()){
      var lanes2=taskLanes().slice();
      if(lanes2.indexOf(name.trim())>=0){ toast('That lane already exists.','warn'); return; }
      lanes2.splice(lanes2.length-1,0,name.trim());
      state.settings.taskLanes=lanes2;
      commit(); toast('Lane "'+name.trim()+'" added.');
    }
    return;
  }
  if(action==='task-lane-rename'){
    var oldName=el.getAttribute('data-lane');
    var nn=prompt('Rename lane "'+oldName+'" to:',oldName);
    if(nn&&nn.trim()&&nn.trim()!==oldName){
      var lanes3=taskLanes().slice();
      if(lanes3.indexOf(nn.trim())>=0){ toast('That lane name already exists.','warn'); return; }
      lanes3[lanes3.indexOf(oldName)]=nn.trim();
      state.settings.taskLanes=lanes3;
      state.tasks.forEach(function(t){ if(t.status===oldName) t.status=nn.trim(); });
      commit(); toast('Lane renamed.');
    }
    return;
  }
  if(action==='task-lane-delete'){
    var lane=el.getAttribute('data-lane');
    var lanes4=taskLanes().slice();
    if(lanes4.length<=2){ toast('Keep at least two lanes.','warn'); return; }
    if(confirm('Delete lane "'+lane+'"? Its tasks move to "'+lanes4[0]+'".')){
      var moved=0;
      state.tasks.forEach(function(t){ if(t.status===lane){ setTaskStatus(t,lanes4[0]); moved++; } });
      state.settings.taskLanes=lanes4.filter(function(l){return l!==lane;});
      commit(); toast('Lane deleted'+(moved?' — '+moved+' task(s) moved.':'.'));
    }
    return;
  }
  if(action==='task-color'){
    var form=el.closest('form');
    if(form&&form.elements['color']){
      form.elements['color'].value=el.getAttribute('data-color')||'';
      form.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('active'); });
      el.classList.add('active');
    }
    return;
  }
});
