function fv(form,name){ var el=form.elements[name]; return el?el.value.trim():''; }

/* ---------- finance computations ---------- */
function financeTotals(entries){
  entries=entries||state.finance;
  var rev=0,exp=0;
  entries.forEach(function(e){ if(e.type==='income') rev+=num(e.amount); else exp+=num(e.amount); });
  return { revenue:rev, expenses:exp, profit:rev-exp,
    margin: rev>0 ? (rev-exp)/rev*100 : null,
    expenseRatio: rev>0 ? exp/rev*100 : (exp>0?Infinity:null) };
}
function monthlyMap(){
  var m={};
  state.finance.forEach(function(e){
    var k=monthKey(e.date); if(!k) return;
    if(!m[k]) m[k]={revenue:0,expenses:0};
    if(e.type==='income') m[k].revenue+=num(e.amount); else m[k].expenses+=num(e.amount);
  });
  return m;
}
function sortedMonths(){ return Object.keys(monthlyMap()).sort(); }
function lastNMonths(n){
  var out=[],k=thisMonthKey();
  for(var i=n-1;i>=0;i--) out.push(shiftMonth(k,-i));
  return out;
}
function categoryMap(type,monthFilter){
  var m={};
  state.finance.forEach(function(e){
    if(e.type!==type) return;
    if(monthFilter && monthKey(e.date)!==monthFilter) return;
    var c=e.category||'Other';
    m[c]=(m[c]||0)+num(e.amount);
  });
  return m;
}
function topCategory(type){
  var m=categoryMap(type), best=null;
  Object.keys(m).forEach(function(k){ if(!best||m[k]>m[best]) best=k; });
  return best?{name:best,amount:m[best]}:null;
}
function revenueGrowth(){
  var mm=monthlyMap(), cur=thisMonthKey(), prev=shiftMonth(cur,-1);
  var c=mm[cur]?mm[cur].revenue:0, p=mm[prev]?mm[prev].revenue:0;
  if(p<=0) return c>0?null:null;
  return (c-p)/p*100;
}
function avgMonthlyRevenue(n){
  var months=lastNMonths(n||3), mm=monthlyMap(), tot=0, cnt=0;
  months.forEach(function(k){ if(mm[k]){ tot+=mm[k].revenue; cnt++; } });
  return cnt?tot/cnt:0;
}
function goalProgress(g){
  var current=g.current||0;
  if(g.type==='revenue'||g.type==='profit'){
    var entries=state.finance.filter(function(e){
      if(g.startDate && e.date<g.startDate) return false;
      return true;
    });
    var t=financeTotals(entries);
    current=g.type==='revenue'?t.revenue:Math.max(0,t.profit);
  }
  var pct=g.target>0?clamp(current/g.target*100,0,100):0;
  return {current:current,pct:pct};
}
function goalStatus(g){
  if(g.done) return {label:'Completed',cls:'good'};
  var gp=goalProgress(g);
  var d=daysUntil(g.deadline);
  if(gp.pct>=100) return {label:'Target reached',cls:'good'};
  if(d!=null&&d<0) return {label:'Overdue',cls:'risk'};
  if(d!=null&&g.deadline){
    var totalDays=g.createdAt?Math.max(1,Math.round((new Date(g.deadline)-new Date(g.createdAt))/86400000)):null;
    if(totalDays){
      var elapsed=clamp((totalDays-d)/totalDays*100,0,100);
      if(gp.pct+12<elapsed) return {label:'At risk',cls:'warn'};
    }
    if(d<=7&&gp.pct<80) return {label:'At risk',cls:'warn'};
  }
  return {label:'On track',cls:'info'};
}

/* ---------- business health score (0–100) ---------- */
function healthScore(){
  var t=financeTotals();
  if(state.finance.length===0) return null;
  var parts=[];
  // margin (30 pts)
  var marginPts=0;
  if(t.margin!=null) marginPts=clamp(t.margin/40*30,0,30);
  parts.push({k:'Profit margin',pts:marginPts,max:30});
  // expense control (25 pts) — expense ratio under 70% is healthy
  var expPts=0;
  if(t.expenseRatio!=null&&isFinite(t.expenseRatio)) expPts=clamp((1-(t.expenseRatio-30)/70)*25,0,25);
  parts.push({k:'Expense control',pts:expPts,max:25});
  // growth (20 pts)
  var g=revenueGrowth(), gPts=10;
  if(g!=null) gPts=clamp(10+g/3,0,20);
  parts.push({k:'Revenue growth',pts:gPts,max:20});
  // consistency: months with positive cashflow (15 pts)
  var mm=monthlyMap(), keys=Object.keys(mm), pos=0;
  keys.forEach(function(k){ if(mm[k].revenue-mm[k].expenses>0) pos++; });
  var consPts=keys.length?pos/keys.length*15:0;
  parts.push({k:'Cash-flow consistency',pts:consPts,max:15});
  // execution: tasks not overdue (10 pts)
  var open=state.tasks.filter(function(x){ return !x.done; });
  var overdue=open.filter(function(x){ var d=daysUntil(x.deadline); return d!=null&&d<0; });
  var exPts=open.length?(1-overdue.length/open.length)*10:8;
  parts.push({k:'Execution (tasks on time)',pts:exPts,max:10});
  var total=Math.round(sum(parts,function(p){return p.pts;}));
  return {score:clamp(total,0,100),parts:parts};
}
function healthLabel(s){
  if(s>=80) return {label:'Excellent',cls:'good'};
  if(s>=60) return {label:'Healthy',cls:'good'};
  if(s>=40) return {label:'Needs attention',cls:'warn'};
  return {label:'At risk',cls:'risk'};
}

/* ---------- insights engine ---------- */
function buildInsights(){
  var out=[];
  var t=financeTotals();
  var hasData=state.finance.length>0;
  if(!hasData){
    out.push({sev:'info',title:'Start with your numbers',text:'Add income and expense entries in Finance — every dashboard number, chart and insight is generated from them.'});
    return out;
  }
  // expense ratio
  if(t.expenseRatio!=null&&isFinite(t.expenseRatio)){
    if(t.expenseRatio>=90) out.push({sev:'risk',title:'Expenses are eating your revenue',text:'Expenses are '+fmtPct(t.expenseRatio)+' of revenue. Your business needs more sales or lower costs — review the biggest expense category first.'});
    else if(t.expenseRatio>=70) out.push({sev:'warn',title:'Expenses are getting high',text:'Expenses are '+fmtPct(t.expenseRatio)+' of revenue. Aim to keep this under 70% to leave room for profit and reinvestment.'});
    else out.push({sev:'good',title:'Spending is under control',text:'Expenses are only '+fmtPct(t.expenseRatio)+' of revenue — a healthy ratio.'});
  } else if(t.expenses>0&&t.revenue===0){
    out.push({sev:'risk',title:'Spending with no revenue yet',text:'You have '+fmtMoney(t.expenses)+' in expenses and no recorded income. Prioritize your first sales.'});
  }
  // margin
  if(t.margin!=null){
    if(t.margin>=30) out.push({sev:'good',title:'Your margin is healthy',text:'Net margin is '+fmtPct(t.margin)+'. Margins above 30% give you a strong buffer.'});
    else if(t.margin>=10) out.push({sev:'info',title:'Margin is okay, but thin',text:'Net margin is '+fmtPct(t.margin)+'. Consider raising prices or trimming your top expense category to push past 30%.'});
    else if(t.margin>=0) out.push({sev:'warn',title:'Margin is very thin',text:'Net margin is only '+fmtPct(t.margin)+'. Your offers may need better pricing, or costs need a hard look.'});
    else out.push({sev:'risk',title:'You are operating at a loss',text:'Net profit is '+fmtMoney(t.profit)+'. Cut non-essential costs and focus on the offers with the best margins.'});
  }
  // growth
  var g=revenueGrowth();
  var mm=monthlyMap(), cur=mm[thisMonthKey()], prev=mm[shiftMonth(thisMonthKey(),-1)];
  if(g!=null){
    if(g>5) out.push({sev:'good',title:'Revenue is growing',text:'Revenue is up '+fmtPct(g)+' vs last month ('+fmtMoney(cur?cur.revenue:0)+' vs '+fmtMoney(prev?prev.revenue:0)+'). Double down on what is working.'});
    else if(g<-15) out.push({sev:'risk',title:'Revenue dropped sharply',text:'Revenue is down '+fmtPct(Math.abs(g))+' vs last month. Check your pipeline — your numbers suggest you need more leads or better conversion.'});
    else if(g<-5) out.push({sev:'warn',title:'Revenue is slipping',text:'Revenue is down '+fmtPct(Math.abs(g))+' vs last month. Worth investigating before the trend settles in.'});
  }
  // top expense category
  var topExp=topCategory('expense');
  if(topExp&&t.expenses>0){
    var share=topExp.amount/t.expenses*100;
    if(share>=40) out.push({sev:'warn',title:'"'+topExp.name+'" dominates your expenses',text:'It takes '+fmtPct(share)+' of all spending ('+fmtMoney(topExp.amount)+'). This category is the biggest lever if you need to cut costs.'});
    else out.push({sev:'info',title:'Biggest expense: '+topExp.name,text:fmtMoney(topExp.amount)+' ('+fmtPct(share)+' of total spending).'});
  }
  // cash flow risk: current month negative
  if(cur&&cur.revenue-cur.expenses<0){
    out.push({sev:'risk',title:'Cash-flow risk this month',text:'This month you have spent '+fmtMoney(cur.expenses-cur.revenue)+' more than you earned. Watch outgoing payments closely.'});
  }
  // goals
  state.goals.forEach(function(gl){
    if(gl.done) return;
    var gp=goalProgress(gl), st=goalStatus(gl);
    if(gp.pct>=100) out.push({sev:'good',title:'Goal reached: '+gl.title,text:'You hit '+fmtPct(gp.pct,0)+' of the target. Mark it complete and set the next one.'});
    else if(gp.pct>=80) out.push({sev:'good',title:'You are close to a goal',text:'"'+gl.title+'" is at '+fmtPct(gp.pct,0)+'. One strong push and it is done.'});
    else if(st.cls==='risk') out.push({sev:'risk',title:'Goal overdue: '+gl.title,text:'The deadline has passed at '+fmtPct(gp.pct,0)+' progress. Re-scope it or set a new realistic deadline.'});
    else if(st.cls==='warn') out.push({sev:'warn',title:'Goal at risk: '+gl.title,text:'Progress ('+fmtPct(gp.pct,0)+') is behind the timeline. Check the next action step.'});
    else if(st.cls==='info'&&gp.pct>0) out.push({sev:'info',title:'On track: '+gl.title,text:fmtPct(gp.pct,0)+' complete with '+(daysUntil(gl.deadline)!=null?daysUntil(gl.deadline)+' days left.':'no deadline set.')});
  });
  // monthly target
  if(state.settings.monthlyTarget>0&&cur){
    var pctT=cur.revenue/state.settings.monthlyTarget*100;
    if(pctT>=100) out.push({sev:'good',title:'Monthly revenue target hit',text:'You reached '+fmtPct(pctT,0)+' of your '+fmtMoney(state.settings.monthlyTarget)+' target this month.'});
    else {
      var dLeft=Math.max(0,new Date(thisMonthKey().split('-')[0],thisMonthKey().split('-')[1],0).getDate()-new Date().getDate());
      out.push({sev:pctT>=60?'info':'warn',title:'Monthly target: '+fmtPct(pctT,0)+' there',text:fmtMoney(Math.max(0,state.settings.monthlyTarget-cur.revenue))+' to go with '+dLeft+' days left this month.'});
    }
  }
  // metric-based insights
  var mv=function(k){ return state.metrics[k]?state.metrics[k].value:null; };
  var cac=mv('cac'), clv=mv('clv');
  if(cac!=null&&clv!=null&&cac>0){
    var ratio=clv/cac;
    if(ratio>=3) out.push({sev:'good',title:'Customer economics look strong',text:'Lifetime value is '+fmtNum(ratio,1)+'× your acquisition cost — a healthy ratio (3× or more is the benchmark).'});
    else if(ratio>=1) out.push({sev:'warn',title:'Acquisition cost is high vs lifetime value',text:'CLV is only '+fmtNum(ratio,1)+'× CAC. Improve retention, raise prices, or find cheaper acquisition channels.'});
    else out.push({sev:'risk',title:'You lose money on each customer',text:'Acquisition cost exceeds lifetime value. Pause paid acquisition until the economics improve.'});
  }
  var roas=mv('roas');
  if(roas!=null){
    if(roas>=3) out.push({sev:'good',title:'Ads are paying off',text:'ROAS of '+fmtNum(roas,1)+'× means every '+fmtMoney(1)+' on ads returns '+fmtMoney(roas)+'.'});
    else if(roas<1.5&&roas>0) out.push({sev:'warn',title:'Ad spend barely breaks even',text:'ROAS of '+fmtNum(roas,1)+'× is thin once costs are included. Test new creatives or audiences.'});
  }
  var churn=mv('churn');
  if(churn!=null&&churn>8) out.push({sev:'warn',title:'Churn is high',text:fmtPct(churn)+' monthly churn means you replace your whole customer base every '+Math.round(100/churn)+' months. Focus on retention.'});
  var conv=mv('conv');
  if(conv!=null&&conv<1&&conv>0) out.push({sev:'warn',title:'Conversion rate is low',text:'At '+fmtPct(conv)+', your current numbers suggest you need more qualified leads or a better offer/landing experience.'});
  // inventory & orders
  var low=(state.products||[]).filter(function(p){ return p.active!==false&&p.stock<=(p.lowStock!=null?p.lowStock:5); });
  if(low.length) out.push({sev:'warn',title:low.length+' product'+(low.length>1?'s':'')+' low on stock',text:'"'+low[0].name+'" has only '+low[0].stock+' left. Restock before orders stall.'});
  (state.accounts||[]).forEach(function(a){
    var bal=accountBalance(a);
    if(bal<0) out.push({sev:'risk',title:'"'+a.name+'" is negative',text:'This account shows '+fmtMoney(bal)+'. Reconcile it against the real balance, or check for entries assigned to the wrong account.'});
  });
  var lowMat=(state.materials||[]).filter(function(m){ return m.stock<=(m.lowStock!=null?m.lowStock:0); });
  if(lowMat.length) out.push({sev:'warn',title:'Raw materials running low',text:'"'+lowMat[0].name+'" is at '+fmtNum(lowMat[0].stock)+' '+(lowMat[0].unit||'units')+'. Reorder before production stops.'});
  var oldestUnpaid=null;
  (state.orders||[]).forEach(function(o){
    if(o.payStatus==='Paid'||o.status==='Cancelled') return;
    var d=-daysUntil(o.orderDate);
    if(d>=3&&(!oldestUnpaid||d>oldestUnpaid.d)) oldestUnpaid={o:o,d:d};
  });
  if(oldestUnpaid) out.push({sev:'warn',title:'Follow up on '+oldestUnpaid.o.number,text:oldestUnpaid.o.clientName+' has not paid for '+oldestUnpaid.d+' days ('+fmtMoney(orderTotal(oldestUnpaid.o))+'). A friendly nudge today usually does it.'});
  var ut=utangTotals();
  if(ut.total>0){
    var avgRev=avgMonthlyRevenue(3);
    if(avgRev>0&&ut.total>avgRev*0.3) out.push({sev:'warn',title:'Customer credit is piling up',text:fmtMoney(ut.total)+' is sitting in your credit ledger — that is '+fmtPct(ut.total/avgRev*100,0)+' of a typical month\'s revenue. Collect gently but consistently.'});
    else out.push({sev:'info',title:'Credit ledger balance: '+fmtMoney(ut.total),text:ut.customers+' customer'+(ut.customers>1?'s':'')+' with open credit. Payments are recorded as income only when cash actually arrives.'});
  }
  var evs=phSeasonalEvents();
  if(evs.length){
    var e0=evs[0];
    var d0=Math.ceil((e0.date-new Date())/86400000);
    var lastYearMK=shiftMonth(thisMonthKey(),-12);
    var lyRevenue=(monthlyMap()[lastYearMK]||{}).revenue;
    out.push({sev:'info',title:'📅 '+e0.name+' in '+d0+' days',text:e0.tip+(lyRevenue?' Last year this month you made '+fmtMoney(lyRevenue)+'.':'')});
  }
  var wb=winBackList();
  if(wb.length) out.push({sev:'info',title:wb.length+' customer'+(wb.length>1?'s':'')+' ready for a win-back message',text:wb[0].name+' last bought '+wb[0].days+' days ago. A candle burns out in ~6 weeks — perfect timing to say hi.'});
  var openOrders=(state.orders||[]).filter(function(o){ return o.status!=='Delivered'&&o.status!=='Cancelled'; });
  var unpaidOrders=(state.orders||[]).filter(function(o){ return o.payStatus!=='Paid'&&o.status!=='Cancelled'; });
  if(openOrders.length) out.push({sev:'info',title:openOrders.length+' order'+(openOrders.length>1?'s':'')+' to fulfill',text:(unpaidOrders.length?unpaidOrders.length+' still unpaid ('+fmtMoney(sum(unpaidOrders,orderTotal))+'). ':'')+'Keep deliveries moving — happy gifting customers reorder.'});
  // overdue tasks
  var overdue=state.tasks.filter(function(x){ var d=daysUntil(x.deadline); return !x.done&&d!=null&&d<0; });
  if(overdue.length>0) out.push({sev:'warn',title:overdue.length+' overdue task'+(overdue.length>1?'s':''),text:'Oldest: "'+overdue[0].title+'". Clear or reschedule overdue work to keep momentum honest.'});
  // blocked roadmap
  var blocked=[];
  allPhases().forEach(function(p){ (p.tasks||[]).forEach(function(tk){ if(tk.status==='Blocked') blocked.push(tk.title); }); });
  if(blocked.length) out.push({sev:'warn',title:blocked.length+' blocked roadmap item'+(blocked.length>1?'s':''),text:'"'+blocked[0]+'" is blocked. Unblocking it may unlock the rest of the phase.'});
  // suggested focus
  out.push(suggestedFocus(t));
  // sort: risk > warn > good > info
  var rank={risk:0,warn:1,good:2,info:3};
  out.sort(function(a,b){ return rank[a.sev]-rank[b.sev]; });
  return out;
}
function suggestedFocus(t){
  if(t.revenue===0) return {sev:'info',title:'Suggested focus: first revenue',text:'Nothing matters more right now than landing the first paying customers. Set a small revenue goal and 3 outreach tasks.'};
  if(t.margin!=null&&t.margin<10) return {sev:'info',title:'Suggested focus: profitability',text:'Revenue exists but profit is thin. Spend this week on pricing and cutting the top expense category.'};
  var g=revenueGrowth();
  if(g!=null&&g<0) return {sev:'info',title:'Suggested focus: pipeline',text:'Revenue is shrinking. Fill the top of your funnel — leads, follow-ups, and reactivating past clients.'};
  var openGoals=state.goals.filter(function(x){return !x.done;});
  if(openGoals.length===0) return {sev:'info',title:'Suggested focus: set a goal',text:'Your numbers are stable. Set a concrete revenue or profit goal with a deadline to aim at.'};
  return {sev:'info',title:'Suggested focus: consistent execution',text:'Numbers look stable. Keep shipping the roadmap and review your metrics weekly.'};
}

/* ---------- SVG charts ---------- */
function svgBarChart(months,mm,w,h){
  w=w||620;h=h||220;
  var pad={l:8,r:8,t:14,b:24};
  var iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
  var max=1;
  months.forEach(function(k){ var d=mm[k]||{revenue:0,expenses:0}; max=Math.max(max,d.revenue,d.expenses); });
  var n=months.length, slot=iw/n, bw=Math.min(20,slot*0.28);
  var bars='',labels='',grid='';
  for(var i=0;i<=3;i++){
    var gy=pad.t+ih-(ih*i/3);
    grid+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(w-pad.r)+'" y2="'+gy+'" stroke="var(--chart-grid)" stroke-width="1"/>';
  }
  months.forEach(function(k,idx){
    var d=mm[k]||{revenue:0,expenses:0};
    var cx=pad.l+slot*idx+slot/2;
    var rh=d.revenue/max*ih, eh=d.expenses/max*ih;
    bars+='<rect x="'+(cx-bw-2)+'" y="'+(pad.t+ih-rh)+'" width="'+bw+'" height="'+Math.max(rh,1.5)+'" rx="3" fill="var(--income)" opacity="0.9"><title>'+monthLabel(k)+' revenue: '+fmtMoney(d.revenue)+'</title></rect>';
    bars+='<rect x="'+(cx+2)+'" y="'+(pad.t+ih-eh)+'" width="'+bw+'" height="'+Math.max(eh,1.5)+'" rx="3" fill="var(--expense)" opacity="0.85"><title>'+monthLabel(k)+' expenses: '+fmtMoney(d.expenses)+'</title></rect>';
    labels+='<text x="'+cx+'" y="'+(h-6)+'" text-anchor="middle" font-size="10" fill="var(--text-3)" font-family="var(--font)">'+monthLabel(k).split(' ')[0]+'</text>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Monthly revenue vs expenses">'+grid+bars+labels+'</svg>';
}
function svgDonut(entries,size){
  size=size||150;
  var total=sum(entries,function(e){return e.value;});
  if(total<=0) return '';
  var r=size/2-12, c=size/2, circ=2*Math.PI*r, off=0;
  var palette=['#4653e8','#7c5cd6','#c2417f','#a85900','#0c7d5c','#2c69c8','#0f8b8b','#c05621','#8046c9','#5f6473'];
  var segs='';
  entries.forEach(function(e,i){
    var frac=e.value/total;
    var dash=Math.max(0,frac*circ-2);

function safeColor(c,fb){

/* designer's colour discipline: user-picked colours never hit the UI raw.
   Saturation is capped and lightness pinned per theme, so a pure red reads
   as muted brick and a pure blue as slate — decorative accents stay in the
   palette's register. (Sanitises via safeColor first.) */
function tameColor(c,fb){
  c=safeColor(c,fb||'#4653e8');
  var m=/^#([0-9a-f]{6})$/i.exec(c); if(!m){ var m3=/^#([0-9a-f]{3})$/i.exec(c); if(!m3) return c; m=[0,m3[1].replace(/(.)/g,'$1$1')]; }
  var n=parseInt(m[1],16), r=(n>>16&255)/255, g=(n>>8&255)/255, b=(n&255)/255;
  var mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2, d=mx-mn;
  var sat=d===0?0:d/(1-Math.abs(2*l-1));
  var h=0;
  if(d!==0){
    if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4;
    h*=60; if(h<0) h+=360;
  }
  sat=Math.min(sat,.52);
  var dark=document.documentElement.getAttribute('data-theme')==='dark';
  l=dark?Math.max(.58,Math.min(.7,l)):Math.max(.34,Math.min(.46,l));
  var c1=(1-Math.abs(2*l-1))*sat, x=c1*(1-Math.abs((h/60)%2-1)), mm=l-c1/2, rr,gg,bb;
  if(h<60){rr=c1;gg=x;bb=0}else if(h<120){rr=x;gg=c1;bb=0}else if(h<180){rr=0;gg=c1;bb=x}
  else if(h<240){rr=0;gg=x;bb=c1}else if(h<300){rr=x;gg=0;bb=c1}else{rr=c1;gg=0;bb=x}
  var hex=function(v){ v=Math.round((v+mm)*255); return ('0'+v.toString(16)).slice(-2); };
  return '#'+hex(rr)+hex(gg)+hex(bb);
}

/* Auto-label every table cell from its column header so tables can render as clean
   stacked rows on phones (CSS at ≤560px). Generic — no render site needs editing. */
function labelizeTables(root){
  if(!root||!root.querySelectorAll) return;
  Array.prototype.forEach.call(root.querySelectorAll('.table-wrap table'),function(t){
    var heads=Array.prototype.map.call(t.querySelectorAll('thead th'),function(th){ return (th.textContent||'').trim(); });
    if(!heads.length) return;
    Array.prototype.forEach.call(t.querySelectorAll('tbody tr'),function(tr){
      Array.prototype.forEach.call(tr.children,function(td,i){
        if(td.tagName!=='TD') return;
        var lbl=heads[i];
        var txt=(td.textContent||'').trim();
        if(lbl){
          td.setAttribute('data-label',lbl);
          // HYBRID: short scalar fields render inline (label … value on one row); long-text columns
          // (note/description/contact/client/product…) and any long value or stepper cell stay stacked (full width).
          var stack=/(note|description|address|contact|email|client|product|material|detail|title|item|reason|memo|message|win)/i.test(lbl);
          if(!stack && txt.length<=22 && !td.querySelector('button')) td.setAttribute('data-inline','');
          else td.removeAttribute('data-inline');
        }
        // mark empty / dash-only value cells so they can be hidden on mobile (declutters the cards)
        if(td.children.length===0 && (txt===''||/^[—–-]+$/.test(txt))) td.setAttribute('data-mobempty','');
        else td.removeAttribute('data-mobempty');
      });
    });
  });
}

    var lbl=f.querySelector(':scope>label'); if(!lbl||lbl.htmlFor) return;
    var ctl=f.querySelector('input,select,textarea'); if(!ctl) return;
    if(ctl.getAttribute('aria-label')||ctl.getAttribute('aria-labelledby')) return;
    if(!ctl.id) ctl.id='f_'+(++n)+'_'+Math.random().toString(36).slice(2,7);
    lbl.htmlFor=ctl.id;

  Array.prototype.forEach.call(root.querySelectorAll('button.btn-icon,button.nav-move-btn,button.nav-edit-step'),function(b){

    sc.items.push(r);

  var secOrder=state.settings.sectionOrder||[];
  if(secOrder.length) sections.sort(function(a,b){ var ia=secOrder.indexOf(a.name), ib=secOrder.indexOf(b.name); return (ia<0?999:ia)-(ib<0?999:ib); });

/* ---- data-safety: warn when real data lives only in this browser, unbacked ---- */
function dataRecordCount(){
  return state.finance.length+state.invoices.length+state.products.length+state.orders.length+
    state.clients.length+state.tasks.length+state.notes.length+state.goals.length;
}
function dataAtRisk(){
  var s=state.settings||{};
  if(dataRecordCount()<5) return false;
  var backedUp=s.lastBackup && (-daysUntil(s.lastBackup))<=14;
  var synced=s.sync && s.sync.enabled && s.sync.lastSync && (-daysUntil(String(s.sync.lastSync).slice(0,10)))<=7;
  return !backedUp && !synced;
}
function backupSafetyBannerHTML(){
  if(!dataAtRisk()) return '';
  var snz=state.settings.backupSnooze;
  if(snz && (-daysUntil(snz))<7) return ''; // snoozed within the last week
  var never=!state.settings.lastBackup;
  return '<div class="backup-banner" role="status"><span class="bb-icon">'+icon('shield')+'</span>'+
    '<div class="bb-text"><b>'+(never?'Your data isn’t backed up yet.':'Your last backup is over two weeks old.')+'</b> '+
      'Everything lives only in this browser — clearing site data or losing this device would erase it.</div>'+
    '<div class="bb-actions">'+
      '<button class="btn btn-sm btn-primary" data-action="export-data">'+icon('download')+' Back up now</button>'+
      '<button class="btn btn-sm btn-ghost" data-action="enable-autobackup">Auto-backup</button>'+
      '<button class="btn-icon bb-x" data-action="snooze-backup" aria-label="Dismiss for now" title="Dismiss for now">'+icon('x')+'</button>'+
    '</div></div>';
}

/* ---- natural-language parser (pure, no DOM, unit-tested) ---- */
function nlPad2(n){ return String(n).length<2?('0'+n):String(n); }
function nlIsoFrom(y,m,d){ return y+'-'+nlPad2(m+1)+'-'+nlPad2(d); }
function nlIsoToday(today){ return nlIsoFrom(today.getFullYear(),today.getMonth(),today.getDate()); }
function nlMonthIndex(name){
  var k=String(name).toLowerCase().replace(/[^a-z]/g,'').slice(0,3);
  return ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].indexOf(k);
}
function nlCleanName(s){
  s=String(s||'').replace(/\s+/g,' ').trim().replace(/^[\s,.;:-]+|[\s,.;:-]+$/g,'');
  s=s.replace(/^(?:a|an|the|my)\s+/i,'');
  return s.replace(/\b([a-z])/g,function(_,c){ return c.toUpperCase(); });
}
function nlApplyMult(numStr,suf){
  var n=parseFloat(String(numStr).replace(/,/g,''));
  if(isNaN(n)) return null;
  if(/k/i.test(suf)) n*=1000; else if(/m/i.test(suf)) n*=1000000;
  return Math.round(n*100)/100;
}
function nlParseDate(text, today){
  today=today||new Date();
  var low=' '+String(text).toLowerCase()+' ', m;
  m=low.match(/\b(\d{4})-(\d{1,2})-(\d{1,2})\b/);
  if(m && +m[2]>=1 && +m[2]<=12 && +m[3]>=1 && +m[3]<=31) return {iso:m[1]+'-'+nlPad2(+m[2])+'-'+nlPad2(+m[3]), source:m[0].trim()};
  var months='january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sept|sep|oct|nov|dec';
  m=low.match(new RegExp('\\b(\\d{1,2})(?:st|nd|rd|th)?\\s+(?:of\\s+)?('+months+')\\.?(?:,?\\s+(\\d{4}))?','i'));
  if(m){ var mi2=nlMonthIndex(m[2]), d2=+m[1], y2=m[3]?+m[3]:today.getFullYear();
    if(mi2>=0&&d2>=1&&d2<=31) return {iso:nlIsoFrom(y2,mi2,d2), source:m[0].trim()}; }
  m=low.match(new RegExp('\\b('+months+')\\.?\\s+(\\d{1,2})(?:st|nd|rd|th)?(?!\\d)(?:,?\\s+(\\d{4}))?','i'));
  if(m){ var mi=nlMonthIndex(m[1]), d=+m[2], y=m[3]?+m[3]:today.getFullYear();
    if(mi>=0&&d>=1&&d<=31) return {iso:nlIsoFrom(y,mi,d), source:m[0].trim()}; }
  m=low.match(/\b(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})\b/);
  if(m){ var a=+m[1], b=+m[2], yy=+m[3]; if(yy<100) yy+=2000; var mm,dd;
    if(a>12){ dd=a; mm=b-1; } else if(b>12){ mm=a-1; dd=b; } else { mm=a-1; dd=b; }
    if(mm>=0&&mm<12&&dd>=1&&dd<=31) return {iso:nlIsoFrom(yy,mm,dd), source:m[0].trim()}; }
  // calendar-day arithmetic (DST-safe — never milliseconds)
  function shift(n){ var x=new Date(today.getFullYear(),today.getMonth(),today.getDate()+n); return nlIsoFrom(x.getFullYear(),x.getMonth(),x.getDate()); }
  if(/\btoday\b/.test(low)) return {iso:nlIsoToday(today), source:'today'};
  if(/\btomorrow\b/.test(low)) return {iso:shift(1), source:'tomorrow'};
  if(/\byesterday\b/.test(low)) return {iso:shift(-1), source:'yesterday'};
  m=low.match(/\bin\s+(\d{1,2})\s+days?\b/); if(m) return {iso:shift(+m[1]), source:m[0].trim()};
  m=low.match(/\b(\d{1,2})\s+days?\s+from\s+now\b/); if(m) return {iso:shift(+m[1]), source:m[0].trim()};
  m=low.match(/\blast\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
  if(m){ var ds=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    var dl=(today.getDay()-ds.indexOf(m[1])+7)%7; if(dl===0) dl=7; return {iso:shift(-dl), source:m[0].trim()}; }
  m=low.match(/\b(?:next|this|on|by)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
  if(m){ var days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    var delta=(days.indexOf(m[1])-today.getDay()+7)%7; if(delta===0) delta=7; return {iso:shift(delta), source:m[1]}; }
  m=low.match(/\bin\s+(\d{1,2})\s+weeks?\b/); if(m) return {iso:shift((+m[1])*7), source:m[0].trim()};
  m=low.match(/\b(\d{1,2})\s+weeks?\s+from\s+now\b/); if(m) return {iso:shift((+m[1])*7), source:m[0].trim()};
  // spelled-out counts: "two weeks from now", "in three days"
  m=low.match(/\b(?:in\s+)?(one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)\s+(day|week)s?(?:\s+from\s+now)?\b/);
  if(m && NL_WORDNUM[m[1]]!=null) return {iso:shift(NL_WORDNUM[m[1]]*(m[2]==='week'?7:1)), source:m[0].trim()};
  if(/\bnext\s+week\b/.test(low)) return {iso:shift(7), source:'next week'};
  if(/\b(?:end\s+of\s+(?:the\s+)?month|month\s*end|eom)\b/.test(low)) return {iso:nlIsoFrom(today.getFullYear(),today.getMonth(),new Date(today.getFullYear(),today.getMonth()+1,0).getDate()), source:'end of month'};
  if(/\b(?:start|beginning)\s+of\s+(?:the\s+)?month\b/.test(low)) return {iso:nlIsoFrom(today.getFullYear(),today.getMonth(),1), source:'start of month'};
  if(/\bnext\s+month\b/.test(low)){ var nm=new Date(today.getFullYear(),today.getMonth()+1,Math.min(today.getDate(),new Date(today.getFullYear(),today.getMonth()+2,0).getDate())); return {iso:nlIsoFrom(nm.getFullYear(),nm.getMonth(),nm.getDate()), source:'next month'}; }
  return null;
}
/* quantity × unit price → the real total. Only multiplies when the wording means
   a per-unit price ("3 x 250", "2 @ 1500", "5 boxes at 120 each"); a bare "for"
   means a total ("3 candles for 900" = 900, not 2700). */
function nlQtyMul(m){ return Math.round(parseFloat(m[1])*parseFloat(m[2].replace(/,/g,''))*100)/100; }
function nlQtyMath(text){
  var s=' '+String(text).toLowerCase()+' ', m;
  m=s.match(/\b(\d+(?:\.\d+)?)\s*(?:x|×|\*|@)\s*[₱$]?\s*([\d,]+(?:\.\d+)?)\b/);          // 3 x 250, 2 @ 1500
  if(m) return nlQtyMul(m);
  m=s.match(/\b(\d+(?:\.\d+)?)\s+(?:[a-z]+\s+){1,3}at\s+[₱$]?\s*([\d,]+(?:\.\d+)?)\s*(?:each|per|ea|apiece)?\b/); // N units at PRICE [each]
  if(m) return nlQtyMul(m);
  m=s.match(/\b(\d+(?:\.\d+)?)\s+(?:[a-z]+\s+){1,3}(?:for\s+)?[₱$]?\s*([\d,]+(?:\.\d+)?)\s*(?:each|per|ea|apiece)\b/); // N units (for) PRICE each
  if(m) return nlQtyMul(m);
  m=s.match(/\b(\d+(?:\.\d+)?)\s+(?:pcs|pieces|units|boxes|items|pax|kg|kilos?)\b[^\d₱$]*[₱$]?\s*([\d,]+(?:\.\d+)?)\s*(?:each|per|ea)\b/);
  if(m) return nlQtyMul(m);
  return null;
}
/* spelled-out amounts: "two thousand", "five hundred", "fifteen thousand five hundred" */
var NL_WORDNUM={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
function nlWordsToNumber(text){
  var toks=String(text).toLowerCase().replace(/[,-]/g,' ').split(/\s+/).filter(Boolean);
  var total=0, cur=0, used=false;
  for(var i=0;i<toks.length;i++){
    var w=toks[i];
    if(NL_WORDNUM[w]!=null){ cur+=NL_WORDNUM[w]; used=true; }
    else if(w==='hundred'){ cur=(cur||1)*100; used=true; }
    else if(w==='thousand'){ total+=(cur||1)*1000; cur=0; used=true; }
    else if(w==='million'){ total+=(cur||1)*1000000; cur=0; used=true; }
    else if(w==='and'&&used){ /* skip */ }
    else { if(used) break; } // stop at the first non-number word once we've started
  }
  var n=total+cur;
  return (used&&n>0)?n:null;
}
function nlParseAmount(text){
  var s=' '+String(text)+' ', m;

/* ---- adaptive learning: remember which words map to which intent/category ----

var NL_STOP={the:1,a:1,an:1,my:1,for:1,on:1,to:1,of:1,and:1,with:1,from:1,is:1,was:1,at:1,in:1,me:1,it:1,this:1,that:1,paid:1,pay:1,spent:1,spend:1,bought:1,buy:1,got:1,received:1,create:1,add:1,new:1,today:1,yesterday:1,tomorrow:1,due:1,amount:1,total:1,invoice:1,bill:1,each:1,worth:1,sold:1,sale:1,sell:1,'na':1,'ng':1,'sa':1,'ko':1,'ako':1,'yung':1,'po':1};

  var out=[];
  (String(text).toLowerCase().match(/[a-z][a-z'-]{2,}/g)||[]).forEach(function(w){

function nlSplitClauses(text){

  if(/[₱$]|php|peso|usd|dollar|total|each|@|\bx\b/i.test(c)) return false;

  if(!accounts || !accounts.length) return '';
  var s=' '+String(text).toLowerCase()+' ';

/* ---- receipt scan: photo → OCR → line items → expense draft ---- */
function nlRcNum(sv){ sv=String(sv).replace(/[^0-9.,]/g,''); if(/,\d{2}$/.test(sv)&&sv.indexOf('.')<0) sv=sv.replace(',','.'); return parseFloat(sv.replace(/,/g,'')); }
function parseReceiptItems(text){
  var lines=(text||'').split('\n').map(function(s){return s.trim();}).filter(Boolean), items=[];
  lines.forEach(function(line){
    if(!/[a-z]/i.test(line)) return; // needs a product name
    if(/sub\s*total|grand\s*total|\btotal\b|\bvat\b|vat[- ]?able|vat[- ]?exempt|zero[- ]?rated|\btax\b|change|cash\b|tender|amount\s*due|balance|receipt|invoice|\btin\b|cashier|official|thank|discount|service\s*charge|gratuity|\btip\b|rounding|points?\b|loyalty|senior|pwd/i.test(line)) return;
    var pm=line.match(/(\d{1,3}(?:[.,]\d{3})*[.,]\d{2}|\d+[.,]\d{2})\s*[A-Za-z*]{0,3}\s*$/); // trailing money (opt. tax flag)
    if(!pm) return;
    var lineTotal=nlRcNum(pm[1]);
    if(!isFinite(lineTotal)||lineTotal<=0||lineTotal>1000000) return;
    var head=line.slice(0,pm.index).trim(), qty=1, name=head, unit=null, mm;
    if((mm=head.match(/^(.+?)\s+(\d{1,3})\s*@\s*([\d.,]+)$/))){ name=mm[1]; qty=+mm[2]; unit=nlRcNum(mm[3]); }        // "Coffee 3 @ 55"
    else if((mm=head.match(/^(\d{1,3})\s*[xX]?\s+(.+)$/)) && +mm[1]>=1 && +mm[1]<=999){ qty=+mm[1]; name=mm[2]; }     // "2 Milk"
    else if((mm=head.match(/^(.+?)\s*[xX]\s*(\d{1,3})$/))){ name=mm[1]; qty=+mm[2]; }                                   // "Milk x2"
    name=name.replace(/[^\w\s&.'\/-]/g,'').replace(/\s+/g,' ').trim();
    if(name.length<2) return;
    if(!unit||!isFinite(unit)) unit=Math.round(lineTotal/qty*100)/100;
    items.push({name:name.slice(0,40),qty:qty,unit:unit,total:lineTotal});
  });
  return items.slice(0,25);
}
/* build an expense draft from OCR text (+ the image) — pure, unit-tested */
function buildReceiptDraft(ocrText, dataURL){
  var base=parseReceiptText(ocrText||''), items=parseReceiptItems(ocrText||'');
  var sum=Math.round(items.reduce(function(a,it){ return a+(it.total||0); },0)*100)/100;
  // a printed total is authoritative (it includes tax); without one, sum the line
  // items rather than trust the largest single number parseReceiptText fell back to
  var hasTotal=/(grand\s*total|total\s*amount|amount\s*due|\btotal\b)/i.test(ocrText||'');
  var amount = hasTotal ? (base.amount!=null?base.amount:(sum>0?sum:null))
                        : (sum>0?sum:base.amount);
  var noteBits=[];
  if(base.merchant) noteBits.push(base.merchant);
  if(items.length) noteBits.push(items.map(function(it){ return it.name+(it.qty>1?' ×'+it.qty:''); }).join(', '));
  return { intent:'expense', type:'expense', amount:amount, date:base.date||todayISO(),
    category:base.category||'Other expense', note:noteBits.join(' — ').slice(0,180),
    account:'', receipt:dataURL||'', items:items };
}
function assistantAttachReceipt(){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,.heic,.heif';

  inp.click();

function assistantScanReceipt(file){
  state.chat=state.chat||[];

  state.chat.push({id:msgId,role:'bot',kind:'scanning',text:'Reading your receipt…',ts:Date.now()});

function assistantScanFail(msgId,msg){
  var m=assistantFindMsg(msgId); if(!m) return;
  m.kind=null; m.text='Couldn’t scan that receipt: '+msg+' You can still type it in, e.g. “spent 850 on groceries”.';
  assistantCommit();
}
function assistantScanProgress(msgId,txt){ var m=assistantFindMsg(msgId); if(m){ m.text=txt; assistantPaint(); } }
function assistantRunReceiptOcr(msgId,dataURL){
  if(typeof loadTesseract!=='function'){ assistantScanFail(msgId,'the OCR engine is unavailable.'); return; }
  loadTesseract().then(function(T){
    assistantScanProgress(msgId,'Scanning the text… 0%');
    return T.recognize(dataURL,'eng',{logger:function(m){ if(m&&m.status==='recognizing text') assistantScanProgress(msgId,'Scanning the text… '+Math.round((m.progress||0)*100)+'%'); }});
  }).then(function(res){
    var text=(res&&res.data)?res.data.text:'';
    var draft=buildReceiptDraft(text,dataURL);
    var m=assistantFindMsg(msgId); if(!m) return;
    if(draft.amount==null && !(draft.items&&draft.items.length)){
      m.kind=null; m.text='I scanned the photo but couldn’t read the amount clearly. Try a sharper photo, or type it — e.g. “spent 850 on groceries”.';
    } else {
      m.kind='preview'; m.parsed=draft; m.resolved=false; m.srcText='(receipt scan)';
      m.text=(draft.items&&draft.items.length)?('I read '+draft.items.length+' item'+(draft.items.length>1?'s':'')+' — review and confirm this expense:'):'I scanned your receipt — review and confirm this expense:';
    }
    assistantCommit();
  }).catch(function(e){ assistantScanFail(msgId,(e&&e.message)||'OCR failed.'); });
}

  if(!rows.length) return '';

  var yest=(function(){ var d=new Date(today+'T00:00:00'); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  function dayLabel(d){ if(!d) return 'Undated'; if(d===today) return 'Today'; if(d===yest) return 'Yesterday'; return fmtDate(d); }
  // rows are already sorted by date desc — group consecutive same-date entries
  var groups=[],cur=null;
  rows.forEach(function(e){ var d=e.date||''; if(!cur||cur.date!==d){ cur={date:d,items:[],inn:0,out:0}; groups.push(cur); } cur.items.push(e); if(e.type==='income') cur.inn+=(+e.amount||0); else cur.out+=(+e.amount||0); });
  var html='<div class="fin-timeline">';
  groups.forEach(function(g){
    var sum=(g.inn?'<span style="color:var(--income)">+'+fmtMoney(g.inn)+'</span>':'')+(g.inn&&g.out?' · ':'')+(g.out?'<span style="color:var(--expense)">−'+fmtMoney(g.out)+'</span>':'');
    html+='<div class="fin-day"><span class="fin-day-label">'+esc(dayLabel(g.date))+'</span><span class="fin-day-sum">'+sum+'</span></div>';
    g.items.forEach(function(e){
      var inc=e.type==='income';
      html+='<div class="fin-tl-row" data-type="'+esc(e.type||'expense')+'">'+
        '<span class="fin-tl-dot"></span>'+
        '<div class="fin-tl-main">'+
          '<div class="fin-tl-line"><span class="fin-tl-cat">'+esc(e.category||'Other')+'</span>'+
            '<span class="fin-tl-amt" style="color:'+(inc?'var(--income)':'var(--expense)')+'">'+(inc?'+':'−')+fmtMoney(e.amount)+'</span></div>'+
          '<div class="fin-tl-sub">'+
            (e.receipt?'<img class="img-thumb fin-tl-rcpt" src="'+esc(e.receipt)+'" alt="receipt" title="View receipt">':'')+
            '<span class="fin-tl-note">'+esc(e.note||'—')+(e.client?' · '+esc(e.client):'')+'</span>'+
            '<span class="fin-tl-actions"><button class="btn-icon" data-action="edit-entry" data-id="'+e.id+'" aria-label="Edit entry">'+icon('edit')+'</button>'+
              '<button class="btn-icon danger" data-action="delete-entry" data-id="'+e.id+'" aria-label="Delete entry">'+icon('trash')+'</button></span>'+
          '</div>'+
        '</div></div>';
    });
  });
  var net=ft.revenue-ft.expenses;
  html+='<div class="fin-tl-total"><span>Filtered total · '+totalCount+' entr'+(totalCount===1?'y':'ies')+'</span><span style="color:'+(net>=0?'var(--income)':'var(--expense)')+'">'+fmtMoney(net)+'</span></div>';
  html+='</div>';
  return html;
}

var CALC_SYN={
  breakeven:'break even breakeven units how many sales cover costs minimum quantity',
  pricing:'price pricing margin markup how much should i charge selling cost',
  tax:'tax vat withholding set aside bir reserve government dues',
  forecast:'forecast projection future revenue growth project months ahead next',
  target:'target goal quota daily weekly monthly how much per day need',
  peroffer:'revenue per offer product service goal each',
  expshare:'expense share category percentage spending ratio biggest cost',
  savings:'profit allocation savings owner pay reinvest split distribute take home',
  fx:'currency exchange fx convert forex dollar peso usd euro rate'
};
var CALC_TITLES={breakeven:'Break-even',pricing:'Pricing & margin',tax:'Tax set-aside',forecast:'Revenue forecast',target:'Monthly target',peroffer:'Revenue per offer',expshare:'Expense share',savings:'Profit allocation',fx:'Currency exchange'};
function calcCard(key,title,desc,iconName,fieldsHTML){
  var search=esc((title+' '+desc+' '+(CALC_SYN[key]||'')).toLowerCase());
  return '<div class="card calc-card" data-calc-key="'+esc(key)+'" data-calc-search="'+search+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'+
    '<span class="stat-icon">'+icon(iconName)+'</span>'+
    '<div style="flex:1;min-width:0"><b style="font-size:.94rem">'+esc(title)+'</b><div class="calc-desc">'+esc(desc)+'</div></div></div>'+
    '<form data-calc="'+key+'"><div class="calc-fields">'+fieldsHTML+'</div>'+
    '<div class="calc-result" id="calc-result-'+key+'"></div></form></div>';
}
function runCalculator(key,form){
  var g=function(n){ return num(form.elements[n]?form.elements[n].value:0); };
  var out='';
  if(key==='breakeven'){
    var fixed=g('fixed'),price=g('price'),vc=g('varcost');
    var cm=price-vc;
    if(cm<=0) out='Price must be higher than variable cost — right now you lose '+fmtMoney(Math.abs(cm))+' on every sale.<small>Raise the price or cut the unit cost.</small>';
    else { var units=Math.ceil(fixed/cm);
      out='Break-even: <b>'+fmtNum(units,0)+' sales/month</b> ('+fmtMoney(units*price)+' revenue).<small>Each sale contributes '+fmtMoney(cm)+' ('+fmtPct(cm/price*100,0)+' contribution margin). Every sale beyond '+fmtNum(units,0)+' is profit.</small>'; }
  } else if(key==='pricing'){
    var cost=g('cost'),tm=g('targetmargin'),cp=g('curprice');
    if(tm>=100) out='Target margin must be below 100%.';
    else { var rec=cost/(1-tm/100);
      out='Recommended price: <b>'+fmtMoney(rec)+'</b> for a '+fmtPct(tm,0)+' margin.';
      if(cp>0){ var curM=(cp-cost)/cp*100; out+='<small>Your current price '+fmtMoney(cp)+' gives a '+fmtPct(curM,1)+' margin — '+(curM>=tm?'already at or above target.':'that is '+fmtPct(tm-curM,1)+' below target; this offer may need better pricing.')+'</small>'; }
      else out+='<small>Markup over cost: '+fmtPct((rec-cost)/cost*100,0)+'.</small>'; }
  } else if(key==='tax'){
    var incv=g('income'),rate=g('rate')||state.settings.taxRate||8;
    var cnote=countryNote();
    out='Set aside <b>'+fmtMoney(incv*rate/100)+'</b> ('+fmtPct(rate,1)+').<small>Keep '+fmtMoney(incv*(1-rate/100))+' as spendable. Move the tax amount to a separate account the day you get paid.'+(cnote?' <b>'+esc(COUNTRIES[state.settings.country].flag+' '+COUNTRIES[state.settings.country].name)+':</b> '+esc(cnote):'')+'</small>';
  } else if(key==='forecast'){
    var base=g('base')||avgMonthlyRevenue(3),gr=g('growth'),mo=clamp(Math.round(g('months'))||6,1,36);
    var total=0,v=base,lines=[];
    for(var i=1;i<=mo;i++){ v=i===1?base:v*(1+gr/100); total+=v; if(i<=3||i===mo) lines.push('Month '+i+': '+fmtMoney(v)); }
    out='Projected total over '+mo+' months: <b>'+fmtMoney(total)+'</b><small>'+lines.join(' · ')+(mo>4?' (months in between grow at '+fmtPct(gr,1)+'/mo)':'')+'</small>';
  } else if(key==='target'){
    var goal=g('goal'),avg=g('avgsale'),done=g('done');
    var remaining=Math.max(0,goal-done);
    var now=new Date(); var daysInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    var daysLeft=Math.max(1,daysInM-now.getDate()+1);
    out='Remaining: <b>'+fmtMoney(remaining)+'</b> → '+fmtMoney(remaining/daysLeft)+'/day · '+fmtMoney(remaining/Math.max(1,Math.ceil(daysLeft/7)))+'/week.'+
      (avg>0?'<small>That is about '+fmtNum(Math.ceil(remaining/avg),0)+' more sales at '+fmtMoney(avg)+' each ('+fmtNum((remaining/avg/daysLeft),1)+' sales per day).</small>':'');
  } else if(key==='peroffer'){
    var tot=g('total'),offers=Math.max(1,Math.round(g('offers'))),op=g('offerprice');
    out='Each offer must produce <b>'+fmtMoney(tot/offers)+'</b>.'+
      (op>0?'<small>At '+fmtMoney(op)+' per sale that is '+fmtNum(Math.ceil(tot/offers/op),0)+' sales per offer ('+fmtNum(Math.ceil(tot/op),0)+' sales total).</small>':'');
  } else if(key==='expshare'){
    var ca=g('catamount'),te=g('totalexp')||financeTotals().expenses;
    if(te<=0) out='Enter your total expenses (no expense data found).';
    else { var sh=ca/te*100;
      out='This category is <b>'+fmtPct(sh,1)+'</b> of total spending.<small>'+(sh>=40?'Over 40% in one category is a concentration risk — it is your biggest cost lever.':sh>=25?'A significant share. Review it quarterly.':'A modest share of spending.')+'</small>'; }
  } else if(key==='savings'){
    var pa=g('profitamt'),owner=clamp(g('ownerpct')||50,0,100);
    var taxPct=Math.min(100-owner,state.settings.taxRate||8);
    var rest=100-owner-taxPct;
    var savePct=Math.round(rest/2), reinvest=rest-savePct;
    out='Owner pay: <b>'+fmtMoney(pa*owner/100)+'</b> ('+owner+'%)<small>Taxes: '+fmtMoney(pa*taxPct/100)+' ('+taxPct+'%) · Savings buffer: '+fmtMoney(pa*savePct/100)+' ('+savePct+'%) · Reinvest: '+fmtMoney(pa*reinvest/100)+' ('+reinvest+'%)</small>';
  }
  var resEl=byId('calc-result-'+key);
  if(resEl){
    if(!out) out='<span style="color:var(--text-3);font-weight:500">Fill in the values above to see the result.</span>';
    resEl.innerHTML=out;
    resEl.classList.add('show');
  }
}

function viewGoals(){/* goal cards align to their own height (no stretched hollows) */

  html+='<div class="grid grid-4">'+
    statCard('Active goals',String(open.length),'','','goals')+
    statCard('Completed',String(done.length),'','','check')+

  '</div>';
  html+='<div class="chips mt-lg">'+
    ['open','done','all'].map(function(k){
      var lbl={open:'Active ('+open.length+')',done:'Completed ('+done.length+')',all:'All'}[k];

    }).join('')+'</div>';
  var list=ui.goalFilter==='open'?open:(ui.goalFilter==='done'?done:state.goals);
  if(!list.length){
    html+='<div class="card mt">'+emptyState('goals','No goals here','Goals give every week a direction. Revenue and profit goals track themselves from your finance data.','<button class="btn btn-sm btn-primary" data-action="open-goal-modal">'+icon('plus')+' Create a goal</button>')+'</div>';
    return html;
  }
  html+='<div class="grid grid-2 mt" style="align-items:start">';

    html+=goalCardHTML(g);

function goalCardHTML(g){
  var gp=goalProgress(g), st=goalStatus(g);
  var d=daysUntil(g.deadline);
  var steps=g.steps||[];
  var nextStep=steps.filter(function(s){return !s.done;})[0];
  var prioCls={High:'risk',Medium:'warn',Low:'neutral'}[g.priority]||'neutral';
  var typeLbl={revenue:'Revenue goal · auto-tracked',profit:'Profit goal · auto-tracked',custom:'Custom goal'}[g.type]||'Goal';
  var html='<div class="card"><div class="card-head" style="margin-bottom:8px">'+
    '<div style="min-width:0;flex:1"><h3 style="'+(g.done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(g.title)+'</h3><span class="sub">'+typeLbl+(g.startDate&&g.type!=='custom'?' from '+fmtDate(g.startDate):'')+'</span></div>'+
    '<span class="badge '+st.cls+'">'+st.label+'</span></div>';
  html+='<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px"><b style="font-size:1.25rem;font-variant-numeric:tabular-nums">'+(g.type==='custom'&&g.unit?fmtNum(gp.current)+' '+esc(g.unit):fmtMoney(gp.current))+'</b><span style="color:var(--text-3);font-size:.85rem">of '+(g.type==='custom'&&g.unit?fmtNum(g.target)+' '+esc(g.unit):fmtMoney(g.target))+'</span></div>';
  html+='<div class="progress thick"><div class="bar '+(st.cls==='good'?'good':(st.cls==='risk'?'risk':(st.cls==='warn'?'warn':'')))+'" style="width:'+gp.pct+'%"></div></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:.76rem;color:var(--text-3);margin-top:4px"><span>'+fmtPct(gp.pct,0)+' complete</span><span>'+(d==null?'no deadline':(d>=0?d+' days left ('+fmtDate(g.deadline)+')':Math.abs(d)+' days overdue'))+'</span></div>';
  html+='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"><span class="badge '+prioCls+'">'+esc(g.priority||'Medium')+' priority</span>'+(steps.length?'<span class="badge neutral">'+steps.filter(function(s){return s.done;}).length+'/'+steps.length+' steps</span>':'')+'</div>';
  if(!g.done&&nextStep) html+='<div class="insight info" style="margin-top:12px;padding:8px 12px"><div class="i-icon" style="width:26px;height:26px">'+icon('flag')+'</div><div><b style="font-size:.8rem">Next action</b><p>'+esc(nextStep.text)+'</p></div></div>';
  else if(!g.done&&!steps.length) html+='<p style="font-size:.76rem;color:var(--text-3);margin-top:10px">Tip: add action steps so the goal always shows your next move.</p>';
  if(steps.length){
    html+='<div style="margin-top:10px">'+steps.map(function(s){
      return '<div class="wk-item" style="padding:6px 2px"><button class="task-check'+(s.done?' checked':'')+'" data-action="toggle-goal-step" data-goal="'+g.id+'" data-step="'+s.id+'">'+icon('check')+'</button><span style="font-size:.84rem;flex:1;'+(s.done?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(s.text)+'</span>'+
        '<button class="btn-icon danger" style="width:20px;height:20px;opacity:.4" data-action="delete-goal-step" data-goal="'+g.id+'" data-step="'+s.id+'">'+icon('x')+'</button></div>';
    }).join('')+'</div>';
  }
  if(!g.done){
    html+='<form data-form="goal-step-add" data-goal="'+g.id+'" style="display:flex;gap:6px;margin-top:8px">'+
      '<input class="input" name="text" placeholder="+ add an action step…" style="flex:1;padding:6px 10px;font-size:.82rem">'+
      '<button class="btn btn-ghost btn-sm" type="submit" style="padding:4px 10px">'+icon('plus')+'</button></form>';
  }
  html+='<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">'+
    (g.done?'<button class="btn btn-sm btn-ghost" data-action="reopen-goal" data-id="'+g.id+'">'+icon('refresh')+' Reopen</button>'
      :'<button class="btn btn-sm btn-good" data-action="complete-goal" data-id="'+g.id+'">'+icon('check')+' Mark complete</button>')+
    (g.type==='custom'&&!g.done?'<button class="btn btn-sm btn-ghost" data-action="update-goal-progress" data-id="'+g.id+'">'+icon('metrics')+' Update progress</button>':'')+
    '<button class="btn btn-sm btn-ghost" data-action="edit-goal" data-id="'+g.id+'">'+icon('edit')+' Edit</button>'+
    '<button class="btn btn-sm btn-danger" data-action="delete-goal" data-id="'+g.id+'">'+icon('trash')+' Delete</button>'+
  '</div></div>';
  return html;
}

var ROADMAP_STATUSES=['Not Started','In Progress','Blocked','Completed'];
function roadmapStats(rm){
  var total=0,done=0,blocked=0,late=0;
  ((rm&&rm.phases)||[]).forEach(function(p){
    (p.tasks||[]).forEach(function(t){
      total++;
      if(t.status==='Completed') done++;
      if(t.status==='Blocked') blocked++;
      var d=daysUntil(t.deadline);
      if(t.status!=='Completed'&&d!=null&&d<0) late++;
    });
  });
  return {total:total,done:done,blocked:blocked,late:late,pct:total?done/total*100:0};
}
function viewRoadmap(){
  var rms=state.roadmaps||[];
  var rm=currentRoadmap();
  var html=topbar('Roadmap','Plan as many roadmaps as you need — a launch, a quarter, a big idea — each with its own phases.',
    (rm?'<button class="btn btn-ghost" data-action="open-phase-modal">'+icon('plus')+'<span class="btn-txt">New phase</span></button>':'')+
    '<button class="btn btn-primary" data-action="roadmap-new">'+icon('plus')+'<span class="btn-txt">New roadmap</span></button>');
  // roadmap switcher
  if(rms.length){
    html+='<div class="chips" style="margin-bottom:16px">'+rms.map(function(r){
      var rs=roadmapStats(r);
      var rc=tameColor(r.color||sectionColorOf('Execution'),'#7c5cd6');
      return '<button class="chip rm-chip '+(rm&&rm.id===r.id?'active':'')+'" data-action="roadmap-switch" data-id="'+r.id+'" style="--rc:'+rc+'"><span class="chip-dot" style="background:'+rc+'"></span>'+esc(r.name)+' · '+fmtPct(rs.pct,0)+'</button>';
    }).join('')+
    (rm?'<button class="chip" data-action="roadmap-rename" data-id="'+rm.id+'" title="Edit name & color">'+icon('edit',11)+'</button>'+
        '<button class="chip" data-action="roadmap-delete" data-id="'+rm.id+'" title="Delete this roadmap" style="color:var(--risk)">'+icon('trash',11)+'</button>':'')+
    '</div>';
  }
  if(!rm){
    html+='<div class="card">'+emptyState('roadmap','No roadmaps yet','Create a roadmap for each big push — "Launch 1", "Q3 expansion", "Christmas collection" — then break it into phases with milestone tasks.','<button class="btn btn-sm btn-primary" data-action="roadmap-new">'+icon('plus')+' Create first roadmap</button>')+'</div>';
    return html;
  }
  var rs=roadmapStats(rm);
  html+='<div class="grid grid-4">'+
    statCard('Progress — '+rm.name,fmtPct(rs.pct,0),'','','roadmap')+
    statCard('Milestones',rs.done+' / '+rs.total,'','','flag')+
    statCard('Blocked',String(rs.blocked),rs.blocked?'<span class="stat-delta down">unblock these first</span>':'','','alert')+
    statCard('Delayed',String(rs.late),rs.late?'<span class="stat-delta down">past deadline</span>':'','','clock')+
  '</div>';
  if(rs.total>0) html+='<div class="card mt"><div class="progress thick"><div class="bar good" style="width:'+rs.pct+'%"></div></div><p style="font-size:.78rem;color:var(--text-3);margin-top:8px">'+fmtPct(rs.pct,0)+' of "'+esc(rm.name)+'" completed</p></div>';
  var phases=(rm.phases||[]);
  if(!phases.length){
    html+='<div class="card mt">'+emptyState('roadmap','"'+rm.name+'" has no phases yet','Break it into stages (e.g. "Prepare", "Launch", "Scale") and add milestone tasks under each.','<button class="btn btn-sm btn-primary" data-action="open-phase-modal">'+icon('plus')+' First phase</button>')+'</div>';
    return html;
  }
  html+='<div class="card mt" style="padding:24px 24px 6px">';
  phases.slice().sort(function(a,b){return (a.order||0)-(b.order||0);}).forEach(function(p){
    var tasks=p.tasks||[];
    var doneN=tasks.filter(function(t){return t.status==='Completed';}).length;
    var pct=tasks.length?doneN/tasks.length*100:0;
    var phaseState=tasks.length&&doneN===tasks.length?'done':(tasks.some(function(t){return t.status==='In Progress';})||doneN>0?'active':'');
    html+='<div class="phase"><div class="phase-dot '+phaseState+'">'+icon('check')+'</div>'+
      '<div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><b style="font-size:1.02rem">'+esc(p.name)+'</b>'+
      (p.desc?'<p style="font-size:.82rem;color:var(--text-2);margin-top:2px">'+esc(p.desc)+'</p>':'')+'</div>'+
      '<div style="display:flex;gap:4px"><button class="btn btn-sm btn-ghost" data-action="open-phase-task-modal" data-phase="'+p.id+'">'+icon('plus')+' Task</button>'+
      '<button class="btn-icon" data-action="edit-phase" data-id="'+p.id+'">'+icon('edit')+'</button>'+
      '<button class="btn-icon danger" data-action="delete-phase" data-id="'+p.id+'">'+icon('trash')+'</button></div></div>';
    if(tasks.length){
      html+='<div style="display:flex;align-items:center;gap:10px;margin-top:8px"><div class="progress" style="flex:1;height:6px"><div class="bar '+(pct===100?'good':'')+'" style="width:'+pct+'%"></div></div><span style="font-size:.74rem;color:var(--text-3);white-space:nowrap">'+doneN+'/'+tasks.length+'</span></div>';
      html+='<div style="margin-top:10px">';
      tasks.forEach(function(t){
        var d=daysUntil(t.deadline);
        var stCls={'Not Started':'neutral','In Progress':'info','Blocked':'risk','Completed':'good'}[t.status]||'neutral';
        var late=t.status!=='Completed'&&d!=null&&d<0;
        html+='<div class="list-row rm-task-row" style="padding:8px 0">'+
          '<select class="input rm-task-status" style="width:auto;padding:4px 28px 4px 8px;font-size:.76rem;font-weight:600" data-action-change="phase-task-status" data-phase="'+p.id+'" data-task="'+t.id+'">'+
            ROADMAP_STATUSES.map(function(s){return '<option'+(t.status===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select>'+
          '<div class="rm-task-main" style="flex:1;min-width:0"><span style="font-size:.88rem;font-weight:600;'+(t.status==='Completed'?'text-decoration:line-through;color:var(--text-3)':'')+'">'+esc(t.title)+'</span>'+
          '<div class="task-meta">'+(t.deadline?'<span class="badge '+(late?'risk':'neutral')+'">'+icon('clock')+' '+fmtDate(t.deadline)+(late?' · late':'')+'</span>':'')+
          (t.priority?'<span class="badge '+({High:'risk',Medium:'warn',Low:'neutral'}[t.priority]||'neutral')+'">'+esc(t.priority)+'</span>':'')+
          '<span class="badge '+stCls+'">'+esc(t.status)+'</span></div></div>'+
          '<div class="row-actions"><button class="btn-icon" data-action="edit-phase-task" data-phase="'+p.id+'" data-task="'+t.id+'">'+icon('edit')+'</button>'+
          '<button class="btn-icon danger" data-action="delete-phase-task" data-phase="'+p.id+'" data-task="'+t.id+'">'+icon('trash')+'</button></div></div>';
      });
      html+='</div>';
    } else {
      html+='<p style="font-size:.8rem;color:var(--text-3);margin-top:8px">No tasks in this phase yet.</p>';
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function viewTasks(){
  var open=state.tasks.filter(function(t){return !t.done;});
  var done=state.tasks.filter(function(t){return t.done;});
  var overdue=open.filter(function(t){ var d=daysUntil(t.deadline); return d!=null&&d<0; });
  var donePct=state.tasks.length?done.length/state.tasks.length*100:0;
  var html=topbar('Tasks & Actions','Daily, weekly and monthly actions that move the business forward.',
    '<button class="btn btn-primary" data-action="open-task-modal">'+icon('plus')+'<span class="btn-txt">New task</span></button>');
  html+='<div class="grid grid-4">'+
    statCard('Open tasks',String(open.length),'','','tasks')+
    statCard('Overdue',String(overdue.length),overdue.length?'<span class="stat-delta down">reschedule or do now</span>':'<span class="stat-delta up">all on time</span>','','clock')+
    statCard('Completed',String(done.length),'','','check')+
    statCard('Completion rate',fmtPct(donePct,0),'','','metrics')+
  '</div>';
  // quick add
  html+='<div class="card mt-lg"><form data-form="quick-task" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">'+
    '<input class="input" name="title" placeholder="Quick add: what needs to get done?" style="flex:2;min-width:200px" required>'+
    '<input class="input" type="date" name="deadline" style="width:auto">'+
    '<select class="input" name="priority" style="width:auto"><option>Medium</option><option>High</option><option>Low</option></select>'+
    '<select class="input" name="bucket" style="width:auto"><option value="daily">Daily</option><option value="weekly" selected>Weekly</option><option value="monthly">Monthly</option></select>'+
    '<button class="btn btn-primary" type="submit">'+icon('plus')+' Add</button></form></div>';
  // view switcher
  var tv=ui.taskView||'list';
  html+='<div style="display:flex;gap:16px;align-items:center;margin-top:16px;flex-wrap:wrap">'+taskViewSwitcherHTML()+'</div>';
  if(tv==='board') return html+taskBoardHTML();
  if(tv==='table') return html+taskTableHTML();
  if(tv==='calendar') return html+taskCalendarHTML();
  // filters
  var tf=ui.taskFilter;
  html+='<div class="task-filterbar">'+
    '<div class="chips">'+[['open','Open'],['overdue','Overdue'],['done','Done'],['all','All']].map(function(x){
      return '<button class="chip '+(tf.status===x[0]?'active':'')+'" data-action="task-filter-status" data-val="'+x[0]+'">'+x[1]+'</button>';}).join('')+'</div>'+
    '<span class="spacer"></span>'+
    '<select class="filter-sel" data-action-change="task-filter-priority" aria-label="Filter by priority">'+[['all','Any priority'],['High','High'],['Medium','Medium'],['Low','Low']].map(function(x){
      return '<option value="'+x[0]+'"'+(tf.priority===x[0]?' selected':'')+'>'+x[1]+'</option>';}).join('')+'</select>'+
    '<select class="filter-sel" data-action-change="task-filter-bucket" aria-label="Filter by cadence">'+[['all','Any cadence'],['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].map(function(x){
      return '<option value="'+x[0]+'"'+(tf.bucket===x[0]?' selected':'')+'>'+x[1]+'</option>';}).join('')+'</select></div>';
  var list=state.tasks.filter(function(t){
    if(tf.status==='open'&&t.done) return false;
    if(tf.status==='done'&&!t.done) return false;
    if(tf.status==='overdue'){ var d=daysUntil(t.deadline); if(t.done||d==null||d>=0) return false; }
    if(tf.priority!=='all'&&t.priority!==tf.priority) return false;
    if(tf.bucket!=='all'&&t.bucket!==tf.bucket) return false;
    return true;
  }).sort(function(a,b){
    if(a.done!==b.done) return a.done?1:-1;
    var pr={High:0,Medium:1,Low:2};
    return (a.deadline||'9999').localeCompare(b.deadline||'9999')||(pr[a.priority]||1)-(pr[b.priority]||1);
  });
  html+='<div class="card mt">';
  if(!list.length) html+=emptyState('tasks','No tasks here','Adjust the filters or add a task with the quick-add bar above.');
  else html+=list.map(taskRowHTML).join('');
  html+='</div>';
  // completed tasks stay visible (and editable) below the open list
  if(tf.status==='open'){
    var doneList=state.tasks.filter(function(t){return t.done;})
      .sort(function(a,b){ return (b.completedAt||'').localeCompare(a.completedAt||''); }).slice(0,8);
    if(doneList.length){
      html+='<div class="card mt"><div class="card-head"><h3>'+icon('check',16)+' Completed recently</h3><span class="sub">still editable — untick to reopen</span><span class="spacer"></span><button class="btn btn-sm btn-ghost" data-action="task-filter-status" data-val="done">All completed</button></div>'+
        doneList.map(taskRowHTML).join('')+'</div>';
    }
  }
  return html;
}
function taskRowHTML(t){
  var d=daysUntil(t.deadline);
  var late=!t.done&&d!=null&&d<0;
  var prioCls={High:'risk',Medium:'warn',Low:'neutral'}[t.priority]||'neutral';
  return '<div class="task-row'+(t.done?' done':'')+'" style="'+taskColorStyle(t)+'">'+
    '<button class="task-check'+(t.done?' checked':'')+'" data-action="toggle-task" data-id="'+t.id+'" aria-label="Toggle">'+icon('check')+'</button>'+
    '<div style="flex:1;min-width:0"><div class="task-title">'+esc(t.title)+'</div>'+
    '<div class="task-meta" style="gap:4px">'+
      (t.deadline?'<span class="badge '+(late?'risk':(d!=null&&d<=2?'warn':'neutral'))+'">'+icon('clock')+' '+(late?Math.abs(d)+'d overdue':(d===0?'Today':(d===1?'Tomorrow':fmtDate(t.deadline))))+'</span>':'')+
      '<select class="mini-sel sel-'+prioCls+'" data-action-change="task-priority" data-id="'+t.id+'" title="Priority">'+['High','Medium','Low'].map(function(p){return '<option'+((t.priority||'Medium')===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select>'+
      '<select class="mini-sel sel-accent" data-action-change="task-bucket" data-id="'+t.id+'" title="Cadence">'+[['daily','daily'],['weekly','weekly'],['monthly','monthly']].map(function(b){return '<option value="'+b[0]+'"'+((t.bucket||'weekly')===b[0]?' selected':'')+'>'+b[1]+'</option>';}).join('')+'</select>'+
      '<select class="mini-sel sel-neutral" data-action-change="task-status" data-id="'+t.id+'" title="Status">'+taskLanes().map(function(l){return '<option'+((t.status||taskLanes()[0])===l?' selected':'')+'>'+esc(l)+'</option>';}).join('')+'</select></div></div>'+
    '<div class="row-actions"><button class="btn-icon" data-action="edit-task" data-id="'+t.id+'">'+icon('edit')+'</button>'+
    '<button class="btn-icon danger" data-action="delete-task" data-id="'+t.id+'">'+icon('trash')+'</button></div></div>';
}

var CLIENT_STATUSES=['Lead','Active','Inactive','Churned'];
/* ===================== Manpower (employees) ===================== */
var HR_TYPES=['Regular','Part-time','Contractual','Probationary'];
var HR_BASIS=['Daily','Monthly','Hourly'];
var HR_CYCLES=['Daily','Weekly','Semi-monthly','Monthly'];
var HR_FIELD_TYPES=['text','number','money','date'];
function hrEmp(id){ return (state.employees||[]).find(function(e){return e.id===id;}); }
function hrMonthlyPay(e){ var r=num(e.payRate); if(e.payBasis==='Daily') return r*26; if(e.payBasis==='Hourly') return r*8*26; return r; }
function hrValeBalance(id){ return (state.hrAdvances||[]).filter(function(a){return a.employeeId===id;}).reduce(function(s,a){ return s+Math.max(0,num(a.amount)-num(a.repaid)); },0); }
function hrValeOutstanding(){ return (state.employees||[]).reduce(function(s,e){ return s+hrValeBalance(e.id); },0); }
function hrThirteenth(e){
  var yr=new Date().getFullYear();
  var paid=(state.hrPayouts||[]).filter(function(p){ return p.employeeId===e.id && String(p.date).slice(0,4)===String(yr); }).reduce(function(s,p){return s+num(p.gross);},0);

function hrPhotoPick(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=function(){
    var f=(inp.files||[])[0]; if(!f) return;
    if(f.size>2*1024*1024){ toast('Photo too large — keep it under 2 MB.','error'); return; }
    var r=new FileReader();
    r.onerror=function(){ toast('Could not read that image.','error'); };
    r.onload=function(){
      // Downscale to a small square so localStorage stays light (avatars never need full res).
      var img=new Image();
      img.onload=function(){
        try{
          var max=320, w=img.width, h=img.height, s=Math.min(1,max/Math.max(w,h));
          var cw=Math.round(w*s), ch=Math.round(h*s);
          var c=document.createElement('canvas'); c.width=cw; c.height=ch;
          c.getContext('2d').drawImage(img,0,0,cw,ch);
          hrPhotoSet(c.toDataURL('image/jpeg',0.85));
        }catch(e){ hrPhotoSet(r.result); } // tainted/odd format — fall back to original
      };
      img.onerror=function(){ hrPhotoSet(r.result); };
      img.src=r.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}
function hrDocUpload(empId){

    var emp=hrEmp(empId); if(!emp) return; emp.documents=emp.documents||[];
    var files=Array.prototype.slice.call(inp.files||[]); if(!files.length) return;
    var pending=files.length, tooBig=0;
    function done(){ if(--pending>0) return; save(); toast(tooBig?(tooBig+' file(s) skipped — keep each under 4 MB.'):'Document(s) uploaded.',tooBig?'warn':undefined); employeeDetail(emp); }
    files.forEach(function(f){
      if(f.size>4*1024*1024){ tooBig++; done(); return; }
      var r=new FileReader();
      r.onload=function(){ emp.documents.push({id:uid(),name:f.name,type:f.type,size:f.size,data:r.result,addedAt:todayISO()}); done(); };
      r.onerror=function(){ done(); };
      r.readAsDataURL(f);
    });
  };
  inp.click();

function sanitizeContractHTML(html){

    var BAD={script:1,style:1,iframe:1,object:1,embed:1,link:1,meta:1,base:1,form:1,svg:1,math:1};
    var URLA={href:1,src:1,'xlink:href':1,formaction:1,action:1,data:1,poster:1,background:1};
    (function walk(node){
      Array.prototype.slice.call(node.children||[]).forEach(function(el){
        if(BAD[String(el.tagName||'').toLowerCase()]){ el.remove(); return; } // case-insensitive — also kills SVG/MathML <script>
        Array.prototype.slice.call(el.attributes).forEach(function(at){
          var n=String(at.name).toLowerCase();
          if(/^on/.test(n) || n==='style' || (URLA[n] && /^\s*(javascript|data|vbscript):/i.test(at.value))) el.removeAttribute(at.name);

}

var _signDrew=false;
function initSignPad(){
  var cv=byId('sign-pad'); if(!cv||!cv.getContext) return; var ctx=cv.getContext('2d'); _signDrew=false;
  ctx.clearRect(0,0,cv.width,cv.height); ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#16182a';
  var drawing=false,last=null;
  function pos(e){ var r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)}; }
  function start(e){ drawing=true; last=pos(e); if(e.cancelable)e.preventDefault(); }
  function move(e){ if(!drawing)return; var p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; _signDrew=true; if(e.cancelable)e.preventDefault(); }
  function end(){ drawing=false; }
  // remove any prior window binding (Clear/re-open call this repeatedly) so it can't stack
  if(initSignPad._end) window.removeEventListener('mouseup',initSignPad._end);
  initSignPad._end=end;
  cv.addEventListener('mousedown',start); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  cv.addEventListener('touchstart',start,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',end);
}

function metricValue(def){
  var saved=state.metrics[def.key];
  if(saved&&saved.value!=null) return {value:saved.value,src:'saved',date:saved.updatedAt};
  if(def.auto){ var v=def.auto(); if(v!=null&&!isNaN(v)) return {value:v,src:'auto',date:null}; }
  return null;
}
function fmtMetric(def,v){
  if(v==null||isNaN(v)) return '—';
  if(def.unit==='money') return fmtMoney(v);
  if(def.unit==='%') return fmtPct(v);
  if(def.unit==='x') return fmtNum(v,2)+'×';
  return fmtNum(v);
}
function viewMetrics(){
  var html=topbar('Metrics & KPIs','Know your numbers. Each metric is explained in plain language with a health check.');
  var tracked=0,healthy=0,risky=0;
  METRIC_DEFS.forEach(function(d){ var mv=metricValue(d); if(mv){ tracked++; var st=d.evaluate(mv.value); if(st==='good')healthy++; if(st==='risk')risky++; } });
  html+='<div class="grid grid-4">'+
    statCard('Metrics tracked',tracked+' / '+METRIC_DEFS.length,'','','metrics')+
    statCard('Healthy',String(healthy),'','','check')+
    statCard('Risky',String(risky),risky?'<span class="stat-delta down">review below</span>':'','','alert')+
    statCard('Last updated',lastMetricUpdate()||'—','','','clock')+
  '</div>';
  html+='<div class="grid grid-3 mt-lg">';
  METRIC_DEFS.forEach(function(d){
    var mv=metricValue(d);
    var st=mv?d.evaluate(mv.value):null;
    var stBadge=mv?'<span class="badge '+(st==='good'?'good':(st==='warn'?'warn':'risk'))+'">'+(st==='good'?'Healthy':(st==='warn'?'Watch':'Risky'))+'</span>':'<span class="badge neutral">Not tracked</span>';
    html+='<div class="card metric-card"><div class="m-top"><div class="i-icon" style="width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center">'+icon(d.icon,16)+'</div>'+
      '<div style="flex:1;min-width:0"><b style="font-size:.92rem">'+esc(d.name)+'</b><div style="margin-top:2px">'+stBadge+(mv&&mv.src==='auto'?' <span class="badge accent">auto</span>':'')+'</div></div></div>'+
      '<div class="m-val">'+(mv?fmtMetric(d,mv.value):'—')+'</div>'+
      (mv&&mv.date?'<div style="font-size:.7rem;color:var(--text-3)">updated '+fmtDate(mv.date.slice(0,10))+'</div>':'')+
      '<div class="m-explain"><b style="font-size:.76rem">What it means:</b> '+esc(d.explain)+'<br><b style="font-size:.76rem">Healthy range:</b> '+esc(d.healthy)+'</div>';
    if(d.calc){
      html+='<details class="calc"><summary>Calculate & save</summary><div class="calc-body"><form data-metric-calc="'+d.key+'">'+
        d.calc.fields.map(function(f){ return '<div class="field"><label>'+esc(f[1])+'</label><input class="input" type="number" step="any" name="'+f[0]+'" required></div>'; }).join('')+
        '<button type="submit" class="btn btn-primary btn-sm">'+icon('calc')+' Calculate & save</button></form></div></details>';
    } else {
      html+='<details class="calc"><summary>Enter value manually</summary><div class="calc-body"><form data-metric-set="'+d.key+'">'+
        '<div class="field"><label>Value'+(d.unit==='%'?' (%)':(d.unit==='x'?' (×)':''))+'</label><input class="input" type="number" step="any" name="val" required></div>'+
        '<button type="submit" class="btn btn-primary btn-sm">'+icon('check')+' Save</button></form></div></details>';
    }
    if(state.metrics[d.key]) html+='<button class="btn btn-sm btn-ghost mt" data-action="clear-metric" data-key="'+d.key+'" style="margin-top:8px">'+icon('x')+' Clear saved value</button>';

  html+='</div>';

function lastMetricUpdate(){
  var latest=null;
  Object.keys(state.metrics).forEach(function(k){ var u=state.metrics[k].updatedAt; if(u&&(!latest||u>latest)) latest=u; });
  return latest?fmtDate(latest.slice(0,10)):null;
}

function isoWeek(){

}

function exportData(){
  try{
    var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='trakora-backup-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },2000);
    state.settings.lastBackup=todayISO();
    commit();
    toast('Backup exported — keep it somewhere safe.');
  }catch(e){ toast('Export failed: '+e.message,'error'); }
}
function importData(file){
  var reader=new FileReader();
  reader.onload=function(){
    try{
      var data=JSON.parse(reader.result);
      if(!data||typeof data!=='object'||!data.settings||(!Array.isArray(data.finance))) throw new Error('This file is not a Trakora backup.');
      state=deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)),data);
      state.settings.onboarded=true;
      commit();
      applyTheme();
      toast('Backup imported — '+state.finance.length+' finance entries restored.');
    }catch(e){
      toast('Import failed: '+e.message,'error');
    }
  };
  reader.onerror=function(){ toast('Could not read the file.','error'); };
  reader.readAsText(file);
}
function resetData(){
  var body='<p style="font-size:.88rem;color:var(--text-2);margin-bottom:12px">This permanently deletes <b>everything</b> — finance entries, goals, roadmap, tasks, notes, clients, metrics and reviews. There is no undo.</p>'+
    '<div class="field"><label>Type <b>DELETE</b> to confirm</label><input class="input" name="confirm" placeholder="DELETE" autocomplete="off"></div>';
  openModal('Reset all data',body,{submitLabel:'Erase everything',onSubmit:function(form){
    if(fv(form,'confirm')!=='DELETE'){ toast('Type DELETE (in capitals) to confirm.','warn'); return false; }
    var theme=state.settings.theme;
    state=JSON.parse(JSON.stringify(DEFAULT_STATE));
    state.meta.createdAt=todayISO();
    state.settings.theme=theme;
    toast('All data erased. Fresh start!','warn');
    return true;
  }});
}

function applyAccent(){
  var c=state.settings.accent;

document.addEventListener('submit',function(e){
  var form=e.target;
  e.preventDefault();

  /* form.getAttribute('id') — NOT form.id — because a control named "id"
     shadows the form's id property in real browsers (LegacyOverrideBuiltIns) */
  if(form.getAttribute('id')==='modal-form'){
    if(modalSubmitHandler){
      var ok;
      try{ ok=modalSubmitHandler(form); }
      catch(err){ console.error(err); toast('Save failed: '+(err&&err.message?err.message:'unexpected error')+'. Please report this.','error'); return; }
      if(ok!==false){ closeModal(); commit(); flashSaved(); }
    } else closeModal();
    return;
  }
  var calcKey=form.getAttribute('data-calc');
  if(calcKey){ runCalculator(calcKey,form); return; }

  var mCalc=form.getAttribute('data-metric-calc');
  if(mCalc){
    var def=METRIC_DEFS.find(function(d){return d.key===mCalc;});
    if(def&&def.calc){
      var g=function(n){ return num(form.elements[n]?form.elements[n].value:0); };
      var v=def.calc.fn(g);
      if(v==null||isNaN(v)||!isFinite(v)){ toast('Check the inputs — the result is not a valid number.','error'); return; }
      state.metrics[mCalc]={value:Math.round(v*100)/100,updatedAt:new Date().toISOString()};
      commit();
      toast(def.name+' saved: '+fmtMetric(def,v));
    }
    return;
  }
  var mSet=form.getAttribute('data-metric-set');
  if(mSet){
    var def2=METRIC_DEFS.find(function(d){return d.key===mSet;});
    var v2=num(form.elements['val'].value);
    state.metrics[mSet]={value:v2,updatedAt:new Date().toISOString()};
    commit();
    toast((def2?def2.name:'Metric')+' saved.');
    return;
  }

  var kind=form.getAttribute('data-form');
  if(kind==='goal-step-add'){
    var gsa=state.goals.find(function(x){return x.id===form.getAttribute('data-goal');});
    var stext=fv(form,'text');
    if(gsa&&stext){
      gsa.steps=gsa.steps||[];
      gsa.steps.push({id:uid(),text:stext,done:false});
      commit(); toast('Step added.');

/* ---------- recurring entries ---------- */
function processRecurring(){
  var posted=0, cur=thisMonthKey();
  (state.recurring||[]).forEach(function(r){
    if(!r.active) return;
    var m=r.lastPosted?shiftMonth(r.lastPosted,1):(r.startMonth||cur);
    var guard=0;
    while(m<=cur&&guard<36){
      var day=Math.min(r.day||1,daysInMonthKey(m));
      state.finance.push({id:uid(),type:r.type,amount:r.amount,date:m+'-'+String(day).padStart(2,'0'),category:r.category||'Other',note:(r.note||'Recurring')+' ↻',client:r.client||'',offer:r.offer||''});
      r.lastPosted=m; posted++; m=shiftMonth(m,1); guard++;
    }
  });
  if(posted){
    save();
    render();
    setTimeout(function(){ toast(posted+' recurring entr'+(posted>1?'ies':'y')+' posted automatically.'); },600);
  }
}

function receivablesSummary(){
  var unpaid=(state.invoices||[]).filter(function(iv){ return iv.status!=='Paid'; });
  var overdue=unpaid.filter(function(iv){ var d=daysUntil(iv.dueDate); return iv.status==='Sent'&&d!=null&&d<0; });
  return {
    count:unpaid.length,
    total:sum(unpaid,invPHP),
    overdueCount:overdue.length,
    overdueTotal:sum(overdue,invPHP),
    top:unpaid.slice().sort(function(a,b){return invPHP(b)-invPHP(a);}).slice(0,2)
  };

function invoiceBadge(iv){
  if(iv.status==='Paid') return '<span class="badge good">Paid'+(iv.paidDate?' '+fmtDate(iv.paidDate):'')+'</span>';

    var d=daysUntil(iv.dueDate);
    if(d!=null&&d<0) return '<span class="badge risk">Overdue '+Math.abs(d)+'d</span>';
    return '<span class="badge info">Sent · due '+(d===0?'today':(d!=null?d+'d':'—'))+'</span>';
  }
  return '<span class="badge neutral">Draft</span>';
}
function nextInvoiceNumber(){

}

/* auto-create invoices for recurring retainers/subscriptions, catching up missed months */
function processRecurringInvoices(){
  var made=0, cur=thisMonthKey();
  (state.recurringInvoices||[]).forEach(function(r){
    if(!r.active) return;
    var m=r.lastGenerated?shiftMonth(r.lastGenerated,1):(r.startMonth||cur), guard=0;
    while(m<=cur && guard<36){
      var day=Math.min(r.day||1,daysInMonthKey(m));
      var issue=m+'-'+String(day).padStart(2,'0');
      state.invoices.push({id:uid(),number:nextInvoiceNumber(),client:r.client,desc:(r.desc||'Monthly retainer')+' ↻',amount:r.amount,
        currency:r.currency||'PHP',fxRate:fxRateFor(r.currency||'PHP'),issueDate:issue,dueDate:addDaysISO(issue,r.netDays||14),
        status:'Sent',paidDate:null,createdAt:issue,recurringId:r.id});
      r.lastGenerated=m; made++; m=shiftMonth(m,1); guard++;
    }
  });
  if(made){ save(); render(); setTimeout(function(){ toast(made+' recurring invoice'+(made>1?'s':'')+' generated and marked Sent.'); },700); }
}
