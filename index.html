:root{
  color-scheme:light;
  --font:'Instrument Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-display:'Schibsted Grotesk',var(--font);
  --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;

  --bg:#f3f3ef;
  --bg-card:#ffffff;
  --bg-card-glass:rgba(255,255,255,.82);
  --bg-sunken:#efefeb;
  --bg-hover:rgba(70,83,232,.05);
  --bg-input:#ffffff;
  --bg-sidebar:#fbfbf9;
  --sidebar-border:#e6e6e1;
  --sidebar-text:#5d5f6a;
  --sidebar-text-active:#16171d;
  --sidebar-hover:rgba(22,23,29,.045);
  --sidebar-active:rgba(70,83,232,.08);

  --text:#16171d;
  --text-2:#4e5058;
  --text-3:#5d5f6a;

  --border:#ebebe6;
  --border-2:#d9d9d2;

  --accent:#4653e8;
  --accent-2:#3a43cf;
  --accent-cta:#4653e8;
  --accent-cta-ink:#ffffff;
  --accent-soft:rgba(70,83,232,.08);
  --accent-grad:linear-gradient(135deg,#4653e8,#3a43cf);

  --good:#0c7d5c;  --good-soft:rgba(12,125,92,.09);
  --warn:#a85900;  --warn-soft:rgba(168,89,0,.10);
  --risk:#cd352d;  --risk-soft:rgba(205,53,45,.08);
  --info:#2c69c8;  --info-soft:rgba(44,105,200,.09);

  --income:#0c7d5c; --expense:#cd352d;

  --r-sm:8px; --r:11px; --r-lg:14px; --r-xl:18px;

  --grid-gap:14px; /* one consistent gutter for the card grids */
  --shadow-sm:0 1px 2px rgba(22,23,29,.03),0 4px 14px rgba(22,23,29,.045);
  --shadow:0 2px 4px rgba(22,23,29,.04),0 10px 28px rgba(22,23,29,.07);
  --shadow-lg:0 2px 6px rgba(22,23,29,.05),0 24px 48px rgba(22,23,29,.13);
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-snappy:cubic-bezier(.25,.46,.45,.94);
  --chart-grid:#ecece7;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0e0f13;
  --bg-card:#17181d;
  --bg-card-glass:rgba(23,24,29,.82);
  --bg-sunken:#121317;
  --bg-hover:rgba(138,146,255,.07);
  --bg-input:#1c1d24;
  --bg-sidebar:#121317;
  --sidebar-border:#26272e;
  --sidebar-text:#9b9dad;
  --sidebar-text-active:#ededf3;
  --sidebar-hover:rgba(255,255,255,.05);
  --sidebar-active:rgba(138,146,255,.10);

  --text:#ededf3;
  --text-2:#a8aab8;
  --text-3:#9b9dad;

  --border:#26272e;
  --border-2:#33343d;

  --accent:#8a92ff;
  --accent-2:#6d76f5;
  --accent-cta:#5b63ee;
  --accent-cta-ink:#ffffff;
  --accent-soft:rgba(138,146,255,.12);
  --accent-grad:linear-gradient(135deg,#5b63ee,#4a51d6);

  --good:#3fce9c; --good-soft:rgba(63,206,156,.11);
  --warn:#e8a93d; --warn-soft:rgba(232,169,61,.11);
  --risk:#f37e72; --risk-soft:rgba(243,126,114,.10);
  --info:#6da5f2; --info-soft:rgba(109,165,242,.10);
  --income:#3fce9c; --expense:#f37e72;

  --shadow-sm:0 1px 2px rgba(0,0,0,.35);
  --shadow:0 2px 8px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.32);
  --shadow-lg:0 12px 24px rgba(0,0,0,.45),0 32px 64px rgba(0,0,0,.4);
  --chart-grid:#1f2026;
}

/* ============================================================
   base
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:"kern","liga","calt";
  transition:background .3s var(--ease),color .3s var(--ease);
  overflow-x:hidden;
}
h1,h2,h3{font-family:var(--font-display);letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:.95rem;color:var(--text)}
a{color:var(--accent);text-decoration:none}
::placeholder{color:var(--text-3)}
::selection{background:var(--accent-soft);color:var(--text)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;box-shadow:0 0 0 4px var(--accent-soft)}
.chip:focus-visible,.seg button:focus-visible,.nav-sec-toggle:focus-visible,.nav-item:focus-visible,[role="button"]:focus-visible,.btn-icon:focus-visible,.dash-handle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-icon:active{transform:scale(.92)}

/* scrollbars */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);border:2px solid transparent;background-clip:content-box}

/* ============================================================
   island top navigation (desktop) — floating command bar:
   brand island · menu island (dropdown per section, ink-filled
   active pill) · utility island. Hidden ≤860px (drawer + tab bar).
   ============================================================ */
.island-bar{position:fixed;top:0;left:0;right:0;z-index:70;display:none;align-items:center;gap:14px;
  padding:14px 22px 10px;pointer-events:none}
.island-bar>*{pointer-events:auto}
.isl-brand{display:flex;align-items:center;gap:9px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:999px;padding:7px 16px 7px 8px;box-shadow:var(--shadow-sm);cursor:pointer;flex-shrink:0}
.isl-brand .brand-logo{width:28px;height:28px;border-radius:999px}
.isl-brand b{font-family:var(--font-display);font-size:.95rem;letter-spacing:-.015em;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.island{display:flex;align-items:center;gap:2px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:999px;padding:5px;box-shadow:var(--shadow-sm);margin:0 auto;max-width:calc(100vw - 420px);overflow-x:auto;scrollbar-width:none}
.island::-webkit-scrollbar{display:none}
.isl-group{position:relative}
.isl-item{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;font-size:.88rem;font-weight:600;
  color:var(--text-2);white-space:nowrap;transition:background .15s,color .15s;cursor:pointer}
.isl-item:hover{background:var(--bg-sunken);color:var(--text)}
.isl-item.active{background:var(--text);color:var(--bg-card)}
.isl-item .isl-chev{display:inline-flex;transition:transform .18s var(--ease);opacity:.6}
.isl-item .isl-chev svg{width:11px;height:11px}
.isl-group.open .isl-chev{transform:rotate(180deg)}
.isl-drop{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);min-width:224px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  padding:6px;display:none;z-index:75}
.isl-group.open .isl-drop{display:block;animation:fadeUp .16s var(--ease)}
.isl-drop button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 12px;border-radius:10px;
  font-size:.88rem;font-weight:500;color:var(--text-2);transition:background .12s,color .12s}
.isl-drop button:hover{background:var(--bg-sunken);color:var(--text)}
.isl-drop button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.isl-drop button svg{width:15px;height:15px;opacity:.8;flex-shrink:0}
.isl-drop .isl-badge{margin-left:auto;background:var(--risk);color:#fff;font-size:.62rem;font-weight:700;padding:1px 7px;border-radius:99px}
.isl-right{display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:999px;padding:5px;box-shadow:var(--shadow-sm);flex-shrink:0}
.isl-icon{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;color:var(--text-2);transition:background .15s,color .15s}
.isl-icon:hover{background:var(--bg-sunken);color:var(--text)}
.isl-icon svg{width:16px;height:16px}
.isl-avatar{width:34px;height:34px;border-radius:999px;background:var(--accent-cta);color:var(--accent-cta-ink);
  display:grid;place-items:center;font-weight:700;font-size:.82rem;cursor:pointer}

/* ============================================================
   layout: sidebar + main
   ============================================================ */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden}
.sidebar{
  position:fixed;inset:0 auto 0 0;width:calc(248px*var(--nav-scale,1));z-index:60;
  background:var(--bg-sidebar);
  border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;
  padding:20px 12px;
  transition:transform .3s var(--ease);
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px}
.brand-logo{width:34px;height:34px;border-radius:9px;background:var(--accent-cta);display:grid;place-items:center;flex-shrink:0;box-shadow:var(--shadow-sm)}
.brand-logo svg{width:20px;height:20px}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:1.05rem;color:var(--sidebar-text-active);letter-spacing:-.018em}
.brand-sub{font-size:.66rem;color:var(--sidebar-text);text-transform:uppercase;letter-spacing:.14em;font-weight:600}

.nav{flex:1;overflow-y:auto;overscroll-behavior:contain;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:calc(.66rem*var(--nav-scale,1));font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--sidebar-text);padding:16px 12px 4px}
.nav-sec-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-radius:var(--r-sm);transition:opacity .15s}
.nav-sec-toggle:hover{opacity:1}
.nav-chev{transition:transform .2s var(--ease);display:inline-flex}
.nav-chev.closed{transform:rotate(-90deg)}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px;border-radius:var(--r-sm);
  color:var(--sidebar-text);font-size:calc(.9rem*var(--nav-scale,1));font-weight:500;
  transition:background .15s,color .15s,transform .1s;
  width:100%;text-align:left;position:relative;
}
.nav-item:not(.active){color:var(--sidebar-text)}
.nav-fav{margin-left:auto;width:20px;height:20px;display:grid;place-items:center;flex-shrink:0;opacity:0;color:var(--sidebar-text);transition:opacity .15s,color .15s,transform .15s}
.nav-item:hover .nav-fav{opacity:.55}
.nav-fav:hover{opacity:1;color:#fbbf24;transform:scale(1.15)}
.nav-fav.on{opacity:1;color:#fbbf24}
.nav-fav svg{width:14px;height:14px;fill:currentColor;stroke:none}
.nav-fav:not(.on) svg{fill:none;stroke:currentColor;stroke-width:1.7}
.app.nav-collapsed .nav-fav{display:none}
.nav-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active)}
/* .nav-item.active is defined once, later, as a single source of truth */
.nav-item.active::before{content:'';position:absolute;left:-12px;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-item svg{width:calc(17px*var(--nav-scale,1));height:calc(17px*var(--nav-scale,1));flex-shrink:0;opacity:.85}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--risk);color:#fff;font-size:.64rem;font-weight:700;padding:1px 8px;border-radius:99px;min-width:18px;text-align:center}

.sidebar-foot{padding:12px 10px 2px;border-top:1px solid var(--sidebar-border);margin-top:10px}
.biz-chip{display:flex;align-items:center;gap:8px;color:var(--sidebar-text);font-size:.8rem}
.biz-chip .avatar{width:30px;height:30px;border-radius:8px;background:var(--accent-cta);display:grid;place-items:center;color:var(--accent-cta-ink);font-weight:700;font-size:.8rem;flex-shrink:0}
.biz-chip b{color:var(--sidebar-text-active);display:block;font-size:.84rem;line-height:1.2;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main{flex:1;margin-left:calc(248px*var(--nav-scale,1));min-width:0;height:100vh;height:100dvh;overflow-y:auto;overscroll-behavior:contain;padding:20px 28px 60px;animation:fadeIn .35s var(--ease)}

/* topbar */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.page-title h1{font-size:var(--fs-2xl);font-weight:700;letter-spacing:-.028em;line-height:1.15}
.page-title p{color:var(--text-2);font-size:.88rem;margin-top:2px}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.topbar-more{display:none;width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);box-shadow:var(--shadow-sm);color:var(--text-2);align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.theme-toggle .btn-txt{display:none} /* search/theme stay icon-only except inside the mobile overflow menu */
.hamburger{display:none;width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.hamburger svg{width:19px;height:19px}
.scrim{display:none;position:fixed;inset:0;background:rgba(8,10,20,.55);z-index:55;backdrop-filter:blur(2px);animation:fadeIn .2s}

/* ============================================================
   buttons
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:10px;
  font-size:.88rem;font-weight:600;
  border:1px solid transparent;
  transition:transform .12s var(--ease-snappy),box-shadow .18s var(--ease),background .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease);
  white-space:nowrap;
}
.btn svg{width:15px;height:15px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent-cta);color:var(--accent-cta-ink)}
.btn-primary:hover{background:var(--accent-2)}
.btn-ghost{background:var(--bg-card);border-color:var(--border);color:var(--text);box-shadow:var(--shadow-sm)}
.btn-ghost:hover{background:var(--bg-sunken);border-color:var(--border-2)}
.btn-danger{background:var(--risk-soft);color:var(--risk)}
.btn-danger:hover{background:var(--risk);color:#fff}
.btn-good{background:var(--good-soft);color:var(--good)}
.btn-good:hover{background:var(--good);color:#fff}
.btn-sm{padding:4px 12px;font-size:.8rem;border-radius:8px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:var(--r-sm);color:var(--text-3);background:transparent}
.btn-icon:hover{background:var(--bg-hover);color:var(--accent)}
.btn-icon.danger:hover{background:var(--risk-soft);color:var(--risk)}
.btn-icon svg{width:15px;height:15px}
.btn-block{width:100%;justify-content:center}

/* theme toggle */
.theme-toggle{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:background .2s var(--ease),border-color .2s var(--ease),color .2s var(--ease),transform .2s var(--ease-snappy)}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent);transform:rotate(15deg)}
.theme-toggle svg{width:17px;height:17px}

/* ============================================================
   cards & grids
   ============================================================ */
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:19px 22px;box-shadow:var(--shadow-sm);
  transition:box-shadow .25s var(--ease),transform .25s var(--ease),border-color .25s;
  animation:fadeUp .4s var(--ease) backwards;
}
/* dark cards get a faint top inner highlight so they read as lit from above */
html[data-theme="dark"] .card,html[data-theme="dark"] .kb-card{box-shadow:var(--shadow-sm),inset 0 1px 0 rgba(255,255,255,.045)}
/* ONE consistent interactive state for every card surface: the hover stroke uses the
   single brand accent (--accent, set in Settings → Accent color) — the SAME colour on every
   section, never a per-section tint — with the same lift, shadow and press everywhere.
   Per-card overrides below were removed so nothing drifts. */
.card:hover,.kb-card:hover{border-color:var(--border-2);box-shadow:var(--shadow)}
.card:active,.kb-card:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.card-head h3{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.card-head .sub{font-size:.8rem;color:var(--text-3)}
.card-head .spacer{margin-left:auto}
.grid{display:grid;gap:var(--grid-gap)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-hero{grid-template-columns:1fr 1.7fr}
/* ----- Assistant (beta) chat ----- */
.asst-beta{font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:var(--accent-soft);color:var(--accent);padding:3px 9px;border-radius:999px;align-self:center}
.asst-wrap{display:flex;flex-direction:column;height:calc(100vh - 190px);min-height:430px}
.asst-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:6px 2px 10px}
.asst-log.asst-empty{justify-content:center}
.asst-msg{display:flex;gap:9px;max-width:88%}
.asst-msg.user{align-self:flex-end;flex-direction:row-reverse}
.asst-msg.bot{align-self:flex-start}
.asst-avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;background:var(--accent-soft);color:var(--accent);font-size:15px}
.asst-bubble{padding:11px 14px;border-radius:16px;font-size:.9rem;line-height:1.5;box-shadow:var(--shadow-sm);word-break:break-word}
.asst-msg.user .asst-bubble{background:var(--accent-grad);color:#fff;border-bottom-right-radius:5px}
.asst-msg.bot .asst-bubble{background:var(--bg-card);border:1px solid var(--border);border-bottom-left-radius:5px}
.asst-examples{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.asst-chip{padding:7px 11px;border-radius:999px;border:1px solid var(--border);background:var(--bg-sunken);font-size:.8rem;cursor:pointer;color:var(--text-2);transition:border-color .15s,color .15s;text-align:left}
.asst-chip:hover{border-color:var(--accent);color:var(--accent)}
.asst-hint{font-size:.72rem;color:var(--text-3);margin-top:10px}
.asst-preview{margin-top:10px;border:1px solid var(--border-2);border-radius:12px;padding:12px;background:var(--bg-sunken)}
.asst-pv-title{display:flex;align-items:center;gap:6px;font-weight:700;font-size:.85rem;margin-bottom:10px}
.asst-preview .field{margin-bottom:9px}
.asst-preview .field label{font-size:.74rem}
.asst-pv-actions{display:flex;gap:8px;margin-top:4px}
.asst-logged{display:flex;align-items:center;gap:6px;font-size:.86rem;color:var(--good);font-weight:600}
.asst-logged.cancel{color:var(--text-3);font-weight:500}
.asst-input-row{display:flex;gap:8px;align-items:flex-end;padding-top:12px;border-top:1px solid var(--border);margin-top:6px}
.asst-input-row textarea.input{flex:1;min-height:46px;max-height:150px;resize:none;line-height:1.4}
.asst-attach{flex-shrink:0;width:44px;height:44px;align-self:flex-end}
.asst-attach svg{width:19px;height:19px}
.asst-scan{display:flex;align-items:center;gap:9px;font-size:.88rem;color:var(--text-2)}
.asst-spin{width:16px;height:16px;border-radius:50%;border:2px solid var(--border-2,var(--border));border-top-color:var(--accent);animation:asstSpin .7s linear infinite;flex-shrink:0}
@keyframes asstSpin{to{transform:rotate(360deg)}}
.asst-rc{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.asst-rc-img{max-width:150px;max-height:130px;border-radius:10px;border:1px solid var(--border);object-fit:cover}
.asst-rc-cap{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--text-3)}
.asst-items{border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-bottom:10px;background:var(--bg-sunken);max-height:150px;overflow-y:auto}
.asst-item{display:flex;justify-content:space-between;gap:10px;font-size:.8rem;padding:3px 0}
.asst-item+.asst-item{border-top:1px dashed var(--border)}
.asst-item-n{color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asst-item-q{color:var(--text-3);font-weight:600}
.asst-item-p{font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
@media (prefers-reduced-motion:reduce){.asst-spin{animation-duration:2s}}
@media (max-width:560px){ .asst-wrap{height:calc(100vh - 220px)} .asst-msg{max-width:94%} }
.grid > .card:nth-child(2){animation-delay:.05s}
.grid > .card:nth-child(3){animation-delay:.1s}
.grid > .card:nth-child(4){animation-delay:.15s}
.grid > .card:nth-child(5){animation-delay:.2s}
.grid > .card:nth-child(6){animation-delay:.25s}
.mt{margin-top:12px}.mt-lg{margin-top:20px}

/* ============================================================================
   Tailwind-compatible atomic utility layer — authored IN-FILE (no CDN, no build).
   Same naming/scale as Tailwind so markup reads identically, but it ships inside
