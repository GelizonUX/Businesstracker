/* a small set of context-aware lines so the bubble feels like it is talking, not frozen on one line */
function advisorPrompts(){
  var out=[];
  try{
    var recv=receivablesSummary();
    if(recv&&recv.overdueTotal>0) out.push('You have '+fmtMoney(recv.overdueTotal)+' overdue — want the quick plan?');
    var cur=monthlyMap()[thisMonthKey()]||{revenue:0,expenses:0};
    if(cur.revenue>0) out.push('You have brought in '+fmtMoney(cur.revenue)+' this month so far.');
    if(cur.expenses>cur.revenue&&(cur.revenue||cur.expenses)) out.push('Spending is ahead of income this month — see what to do?');
    if(state.settings.monthlyTarget>0&&cur.revenue<state.settings.monthlyTarget) out.push('Want to see how close you are to your target?');
  }catch(_){ }
  ADVISOR_GENERIC.forEach(function(g){ out.push(g); });
  var seen={},res=[]; out.forEach(function(m){ if(m&&!seen[m]){ seen[m]=1; res.push(m); } });
  // keep it conversational: at least 3, at most 5 lines, context first
  return res.slice(0,5);
}
function updateAdvisorBubble(route){
  var root=byId('advisor-bubble'); if(!root) return;
  // "blocked" controls whether the bubble CONTENT exists (route/settings/lock/gate/empty app).
  var blocked=route==='insights'||route==='settings'||route==='assistant'||(state.settings&&state.settings.advisorBubbleOff)||(byId('lock-root')&&byId('lock-root').innerHTML)||(byId('gate-root')&&byId('gate-root').innerHTML)||!state.finance||!state.finance.length;
  // "suppressed" is a transient overlay (modal / onboarding carousel) — hide the bubble
  // WITHOUT rebuilding so it never re-pops or re-types just because a dialog opened/closed.
  var suppressed=(byId('modal-root')&&byId('modal-root').innerHTML)||(byId('lightbox-root')&&byId('lightbox-root').querySelector('.onb-card'));
  root.style.display=suppressed?'none':'';
  // only rebuild (and re-type) when the visible/hidden state actually changes — not on every render
  var key=blocked?'hidden':'shown';
  if(key===lastBubbleState && (blocked? root.innerHTML==='' : root.querySelector('.advisor-bubble'))) return;
  lastBubbleState=key;
  if(advisorTypeTimer){ clearTimeout(advisorTypeTimer); advisorTypeTimer=null; }
  if(blocked){ root.innerHTML=''; return; }
  var msgs=advisorPrompts();
  root.innerHTML='<button class="advisor-bubble" data-action="open-advisor" aria-label="Open your Advisor">'+

// Types each line, holds, erases, and moves on — cycles through the set ~twice
// then rests on the last line, so it feels like it is talking without nagging forever.
function typeAdvisor(msgs){
  if(!Array.isArray(msgs)) msgs=[msgs];
  if(!msgs.length) return;
  var mi=0, shown=0, MAX=msgs.length*2;
  function setText(t){ var e=byId('ab-text'); if(e){ e.textContent=t; return true; } advisorTypeTimer=null; return false; }
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce){
    if(!setText(msgs[0]) || msgs.length<2) return;
    var r=0;
    (function rotate(){ advisorTypeTimer=setTimeout(function(){ r++; mi=(mi+1)%msgs.length; if(setText(msgs[mi]) && r<MAX-1) rotate(); },4500); })();
    return;
  }
  function typeOne(){
    var msg=msgs[mi], i=0;
    (function type(){ if(!setText(msg.slice(0,i))) return; i++;
      if(i<=msg.length){ advisorTypeTimer=setTimeout(type,32); }
      else { shown++; if(msgs.length>1 && shown<MAX){ advisorTypeTimer=setTimeout(eraseOne,2600); } /* else rest on this line */ }
    })();
  }
  function eraseOne(){
    var msg=msgs[mi], i=msg.length;
    (function erase(){ if(!setText(msg.slice(0,i))) return; i--;
      if(i>=0){ advisorTypeTimer=setTimeout(erase,16); }
      else { mi=(mi+1)%msgs.length; advisorTypeTimer=setTimeout(typeOne,280); }
    })();
  }
  typeOne();
}

var CSV_MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
var csvCtx=null;

function csvPad(n){ return String(n).padStart(2,'0'); }
function csvNormHeader(h){ return String(h==null?'':h).toLowerCase().replace(/[^a-z0-9]/g,''); }
function csvTokens(s){ return String(s==null?'':s).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().split(/\s+/).filter(Boolean); }
function csvMatch(header,syns){
  var nh=csvNormHeader(header); if(!nh) return 0;
  var ht=csvTokens(header), best=0;
  for(var i=0;i<syns.length;i++){
    var ns=csvNormHeader(syns[i]); if(!ns) continue;
    if(nh===ns) return 1;                                                   // exact (normalized) header == synonym
    var st=csvTokens(syns[i]);
    if(st.length>1 && st.every(function(t){ return ht.indexOf(t)>-1; })){ best=Math.max(best,0.92); continue; } // all words of a multi-word synonym appear in the header
    if(st.length===1 && ht.indexOf(st[0])>-1){ best=Math.max(best,0.85); continue; }                            // a single-word synonym is one of the header's words
    if(nh.indexOf(ns)>-1||ns.indexOf(nh)>-1){ best=Math.max(best,0.6); continue; }                               // normalized substring (e.g. "amountphp" ⊇ "amount")
    for(var j=0;j<ht.length;j++){ var t=ht[j]; if(t.length>=3&&ns.length>=3&&(t.indexOf(ns)===0||ns.indexOf(t)===0)) best=Math.max(best,0.5); } // abbreviation / prefix on a single token
  }
  return best;
}
function csvMoney(v){
  if(v==null) return null;
  var raw=String(v).trim(); if(raw==='') return null;
  var neg=false;
  if(/^\(.*\)$/.test(raw)){ neg=true; raw=raw.slice(1,-1); }
  if(/-/.test(raw)) neg=true;
  var s=raw.replace(/[^\d.,]/g,''); if(s==='') return null;
  var commas=(s.match(/,/g)||[]).length, dots=(s.match(/\./g)||[]).length;
  if(commas&&dots){
    if(s.lastIndexOf(',')>s.lastIndexOf('.')){ s=s.replace(/\./g,'').replace(',','.'); }
    else { s=s.replace(/,/g,''); }
  } else if(commas){
    if(commas===1){ var after=s.split(',')[1]; s=(after.length===3)?s.replace(',',''):s.replace(',','.'); }
    else { s=s.replace(/,/g,''); }
  } else if(dots>1){ s=s.replace(/\./g,''); }
  var n=parseFloat(s); if(isNaN(n)) return null;
  return neg?-n:n;
}
function csvDate(v){
  if(v==null) return null;
  var s=String(v).trim(); if(s==='') return null;
  var m=s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
  if(m) return csvIso(+m[1],+m[2],+m[3]);
  m=s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{2,4})/);
  if(m){
    var a=+m[1],b=+m[2],y=+m[3]; if(y<100) y+=2000;
    var order=(csvCtx&&csvCtx.dateOrder)||'mdy', mo,da;
    if(a>12){ da=a; mo=b; } else if(b>12){ mo=a; da=b; }
    else if(order==='dmy'){ da=a; mo=b; } else { mo=a; da=b; }
    return csvIso(y,mo,da);
  }
  m=s.match(/^(\d{1,2})\s+([A-Za-z]{3,})\.?,?\s+(\d{2,4})$/);
  if(m){ var mo2=CSV_MONTHS[m[2].slice(0,3).toLowerCase()]; if(mo2) return csvIso(csvY(+m[3]),mo2,+m[1]); }
  m=s.match(/^([A-Za-z]{3,})\.?\s+(\d{1,2}),?\s+(\d{2,4})$/);
  if(m){ var mo3=CSV_MONTHS[m[1].slice(0,3).toLowerCase()]; if(mo3) return csvIso(csvY(+m[3]),mo3,+m[2]); }
  if(/^\d{5}$/.test(s)){ var nn=+s; if(nn>=20000&&nn<=60000){ return new Date(Date.UTC(1899,11,30)+nn*86400000).toISOString().slice(0,10); } }
  if(/\d{4}/.test(s)){ var d=new Date(s); if(!isNaN(d.getTime())) return d.getFullYear()+'-'+csvPad(d.getMonth()+1)+'-'+csvPad(d.getDate()); }
  return null;
}
function csvY(y){ return y<100?y+2000:y; }
function csvIso(y,mo,da){ if(!(mo>=1&&mo<=12&&da>=1&&da<=31)) return null; return y+'-'+csvPad(mo)+'-'+csvPad(da); }
function csvType(v,amount){
  var s=String(v==null?'':v).trim().toLowerCase();
  if(s){
    if(/^(income|in\b|credit|cr\b|sale|sales|revenue|deposit|received|inflow|earn|\+)/.test(s)) return 'income';
    if(/^(expense|exp\b|out\b|debit|dr\b|cost|purchase|paid|payment|withdraw|outflow|bill|spend|-)/.test(s)) return 'expense';
  }
  if(amount!=null&&amount<0) return 'expense';
  return null;
}
function csvParse(text){
  text=String(text||'').replace(/^\uFEFF/,'');
  var nl=text.indexOf('\n'); var firstLine=nl>-1?text.slice(0,nl):text;
  var delim=',',best=-1; [',',';','\t','|'].forEach(function(d){ var c=firstLine.split(d).length; if(c>best){best=c;delim=d;} });
  var rows=[],row=[],field='',i=0,inQ=false,n=text.length;
  while(i<n){
    var ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inQ=false; i++; continue; }
      field+=ch; i++; continue;
    }
    if(ch==='"'){ inQ=true; i++; continue; }
    if(ch===delim){ row.push(field); field=''; i++; continue; }
    if(ch==='\r'){ i++; continue; }
    if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
    field+=ch; i++;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  rows=rows.filter(function(r){ return r.some(function(c){ return String(c).trim()!==''; }); });
  if(!rows.length) return {headers:[],rows:[]};
  var headers=rows.shift().map(function(h){ return String(h).trim(); });
  rows=rows.map(function(r){ var o=r.slice(0,headers.length); while(o.length<headers.length) o.push(''); return o.map(function(c){ return String(c).trim(); }); });
  return {headers:headers,rows:rows};
}
function csvColStats(rows,ci){
  var dateN=0,numN=0,emailN=0,total=0;
  rows.slice(0,30).forEach(function(r){ var v=(r[ci]||'').trim(); if(!v) return; total++;
    if(csvDate(v)!=null) dateN++; if(csvMoney(v)!=null) numN++; if(/@/.test(v)) emailN++; });
  return {total:total,dateRatio:total?dateN/total:0,numRatio:total?numN/total:0,emailRatio:total?emailN/total:0};
}
function csvScoreEntity(ent,headers){
  var prof=IMPORT_ENTITIES[ent],score=0,reqHit=0;
  prof.fields.forEach(function(f){
    var b=0; headers.forEach(function(h){ b=Math.max(b,csvMatch(h,f.syn)); });
    score+=b*(f.required?2:1);
    if(f.required&&b>=0.55) reqHit++;
  });
  return score+reqHit*1.5;
}
function csvAutoMap(ent){
  var prof=IMPORT_ENTITIES[ent],headers=csvCtx.headers,rows=csvCtx.rows,map={},used={},pairs=[];
  prof.fields.forEach(function(f){ headers.forEach(function(h,ci){ var st=csvMatch(h,f.syn); if(st>0) pairs.push({f:f.key,ci:ci,st:st}); }); });
  pairs.sort(function(a,b){ return b.st-a.st; });
  pairs.forEach(function(p){ if(map[p.f]==null&&!used[p.ci]&&p.st>=0.5){ map[p.f]=p.ci; used[p.ci]=true; } });
  prof.fields.forEach(function(f){
    if(map[f.key]!=null) return;
    var wantDate=f.kind==='date', wantNum=(f.kind==='money'||f.kind==='int'||f.kind==='num'), wantEmail=f.key==='contact';
    if(!wantDate&&!wantNum&&!wantEmail) return;
    var bestCi=-1,bestR=0;
    headers.forEach(function(h,ci){ if(used[ci]) return; var st=csvColStats(rows,ci);
      var r=wantDate?st.dateRatio:wantEmail?st.emailRatio:st.numRatio; if(r>bestR){ bestR=r; bestCi=ci; } });
    if(bestCi>-1&&bestR>=0.6){ map[f.key]=bestCi; used[bestCi]=true; }
  });
  return map;
}
function csvDetectOrder(ci){
  var order='mdy';
  csvCtx.rows.slice(0,60).forEach(function(r){ var m=String(r[ci]||'').match(/^(\d{1,2})[-/.](\d{1,2})[-/.]/); if(m&&+m[1]>12) order='dmy'; });
  return order;
}
function csvCell(map,r,k){ return map[k]!=null?(r[map[k]]||''):''; }
function csvNormalizeRow(ent,prof,map,r){
  var g=function(k){ return String(csvCell(map,r,k)).trim(); };
  if(ent==='finance'){
    var amt=csvMoney(g('amount')), date=csvDate(g('date'));
    if(amt==null||date==null) return {ok:false};
    var type=csvType(g('type'),amt);
    if(!type){ var o=csvCtx.options.financeType; type=(o==='expense')?'expense':(o==='income')?'income':(amt<0?'expense':'income'); }
    var cat=g('category')||(type==='income'?'Sales':'Other expense');
    return {ok:true,val:{id:uid(),type:type,amount:Math.abs(amt),date:date,category:cat,note:g('note'),client:g('client'),offer:'',account:'',receipt:''}};
  }
  if(ent==='products'){
    var name=g('name'); if(!name) return {ok:false};
    return {ok:true,val:{id:uid(),name:name,category:g('category'),sku:g('sku'),price:csvMoney(g('price'))||0,cost:csvMoney(g('cost'))||0,
      stock:Math.round(csvMoney(g('stock'))||0),lowStock:Math.round(csvMoney(g('lowStock'))||0),attrs:{},desc:g('desc'),bom:[],photo:'',active:true}};
  }
  if(ent==='clients'){
    var cn=g('name'); if(!cn) return {ok:false};
    return {ok:true,val:{id:uid(),name:cn,status:g('status')||'Active',value:csvMoney(g('value'))||0,contact:g('contact'),note:g('note'),createdAt:todayISO()}};
  }
  if(ent==='materials'){
    var mn=g('name'); if(!mn) return {ok:false};
    return {ok:true,val:{id:uid(),name:mn,unit:g('unit'),cost:csvMoney(g('cost'))||0,stock:csvMoney(g('stock'))||0,lowStock:csvMoney(g('lowStock'))||0}};
  }
  return {ok:false};
}
function csvDedupeKey(ent,v){
  if(ent==='finance') return [v.date,Math.abs(v.amount).toFixed(2),v.type,(v.note||'').toLowerCase()].join('|');
  if(ent==='products') return v.sku?('sku:'+v.sku.toLowerCase()):('nm:'+v.name.toLowerCase());
  if(ent==='clients') return 'nm:'+v.name.toLowerCase()+'|'+(v.contact||'').toLowerCase();
  if(ent==='materials') return 'nm:'+v.name.toLowerCase();
  return JSON.stringify(v);
}
function csvExistingKeys(ent){
  var out={}; (state[IMPORT_ENTITIES[ent].store]||[]).forEach(function(x){ out[csvDedupeKey(ent,x)]=true; });
  return out;
}
function csvBuild(){
  var ent=csvCtx.entity,prof=IMPORT_ENTITIES[ent],map=csvCtx.map;
  var df=prof.fields.filter(function(f){ return f.kind==='date'; })[0];
  var fmt=csvCtx.options.dateFormat;
  if(fmt==='mdy'||fmt==='dmy') csvCtx.dateOrder=fmt;
  else if(df&&map[df.key]!=null) csvCtx.dateOrder=csvDetectOrder(map[df.key]);
  var ready=[],invalid=0,dupes=0,seen={},existing=csvExistingKeys(ent);
  csvCtx.rows.forEach(function(r){
    var rec=csvNormalizeRow(ent,prof,map,r);
    if(!rec.ok){ invalid++; return; }
    var key=csvDedupeKey(ent,rec.val);
    if(csvCtx.options.dedupe&&(existing[key]||seen[key])){ dupes++; return; }
    seen[key]=true; ready.push(rec.val);
  });
  return {ready:ready,invalid:invalid,dupes:dupes,total:csvCtx.rows.length};
}
function csvNoun(ent,n){ var m={finance:'transaction',products:'product',clients:'client',materials:'material'}; var w=m[ent]||'record'; return n===1?w:w+'s'; }
function csvConfidence(){
  var prof=IMPORT_ENTITIES[csvCtx.entity],reqTot=0,reqHit=0,optTot=0,optHit=0;
  prof.fields.forEach(function(f){ var mapped=csvCtx.map[f.key]!=null;
    if(f.required){ reqTot++; if(mapped) reqHit++; } else { optTot++; if(mapped) optHit++; } });
  var lvl=reqHit<reqTot?'needs your input':(optHit>=Math.ceil(optTot/2)?'high confidence':'looks good');
  return reqHit+'/'+reqTot+' required &amp; '+optHit+'/'+optTot+' optional columns mapped — <b>'+lvl+'</b>. Change anything that looks off.';
}
function openCsvImport(file){
  var reader=new FileReader();
  reader.onload=function(){
    var parsed=csvParse(String(reader.result||''));
    if(!parsed.headers.length){ toast('Could not read any columns — is this a valid CSV file?','error'); return; }
    var allRows=[parsed.headers.slice()].concat(parsed.rows);
    if(allRows.length<1){ toast('That file has no rows.','error'); return; }
    var capped=false;
    if(allRows.length>5001){ allRows=allRows.slice(0,5001); capped=true; }
    csvCtx={fileName:file.name,allRows:allRows,headers:[],rows:[],entity:null,map:{},dateOrder:'mdy',capped:capped,
      hasHeader:allRows.length>1,
      options:{financeType:'auto',dedupe:true,dateFormat:'auto'}};
    csvApplyHeaderMode();
    csvRedetect();
  };
  reader.onerror=function(){ toast('Could not read the file.','error'); };

/* delight: animate key figures counting up on page entrance. Non-destructive — the final
   frame restores the EXACT rendered text, so values are always pixel-correct afterwards. */
function animateCounts(scope){
  if(!scope||typeof requestAnimationFrame!=='function') return;
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var els=scope.querySelectorAll('.stat-value,.m-val,.acct-balance');
  Array.prototype.forEach.call(els,function(el){
    var finalText=el.textContent;
    var m=finalText.match(/-?[0-9][0-9,]*(\.[0-9]+)?/);
    if(!m) return;                                   // no number (e.g. "—") → leave as is
    var target=parseFloat(m[0].replace(/,/g,''));
    if(!isFinite(target)||Math.abs(target)<10) return; // skip tiny/zero — nothing to count
    var prefix=finalText.slice(0,m.index), suffix=finalText.slice(m.index+m[0].length);
    var dec=m[1]?m[1].length-1:0, neg=target<0?'-':'', abs=Math.abs(target);
    var dur=560, start=null;
    function step(ts){
      if(el.isConnected===false) return;              // view navigated away — stop
      if(start===null) start=ts;
      var p=(ts-start)/dur;
      if(p>=1){ el.textContent=finalText; return; }   // exact, canonical value
      var v=abs*(1-Math.pow(1-p,3));                   // easeOutCubic
      el.textContent=prefix+neg+v.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec})+suffix;
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

/* dashboard widgets: live drag-to-reorder — the picked-up card becomes a placeholder gap
   that follows the cursor while the others smoothly make room (FLIP); order saves on drop. */
var dashDragId=null, dashPhTimer=null, dashRaf=0, dashPtrX=0, dashPtrY=0;
var dashTouch={el:null,grabX:0,grabY:0,timer:null,startX:0,startY:0,active:false};
function dashTouchApplyTransform(px,py){
  var el=dashTouch.el; if(!el) return;
  el.style.transform=''; // measure the slot rect without our offset
  var r=el.getBoundingClientRect();
  el.style.transform='translate('+(px-dashTouch.grabX-r.left)+'px,'+(py-dashTouch.grabY-r.top)+'px) scale(1.04)';
}
function dashGridEl(){ return document.querySelector('.dash-grid'); }
function dashWidgetEls(g){ return (g||dashGridEl())? Array.prototype.slice.call((g||dashGridEl()).querySelectorAll('.dash-widget')) : []; }
function dashFlipRecord(g){ var m={}; dashWidgetEls(g).forEach(function(w){ m[w.getAttribute('data-widget')]=w.getBoundingClientRect(); }); return m; }
// smooth "make room": animate each card from its previous position to its new one with the Web
// Animations API. cancel+replace captures the card's CURRENT visual position, so rapid re-triggers
// glide instead of snapping/jittering (the old inline-FLIP re-read mid-animation rects and stuttered).
function dashFlip(g,prev,skip){
  dashWidgetEls(g).forEach(function(w){
    if(w===skip) return;
    var b=prev[w.getAttribute('data-widget')]; if(!b) return;
    var a=w.getBoundingClientRect(), dx=b.left-a.left, dy=b.top-a.top;
    if(!dx&&!dy) return;
    if(!w.animate) return; // graceful no-op where WAAPI is unavailable (e.g. test DOM)
    if(w._anim){ try{ w._anim.cancel(); }catch(_){ } }
    w._anim=w.animate([{transform:'translate('+dx+'px,'+dy+'px)'},{transform:'translate(0,0)'}],{duration:230,easing:'cubic-bezier(.2,.85,.25,1)'});
    w._anim.onfinish=function(){ w._anim=null; };
  });
}
function dashPersistOrder(){
  var g=dashGridEl(); if(!g) return;
  var ids=dashWidgetEls(g).map(function(w){ return w.getAttribute('data-widget'); }); if(!ids.length) return;
  state.settings.dashOrder=ids.concat(dashOrder().filter(function(id){ return ids.indexOf(id)<0; })); save();
}
function dashDragCleanup(){
  if(dashPhTimer){ clearTimeout(dashPhTimer); dashPhTimer=null; }
  if(dashRaf){ cancelAnimationFrame(dashRaf); dashRaf=0; }
  var g=dashGridEl();
  if(g){ g.classList.remove('is-dragging');
    dashWidgetEls(g).forEach(function(w){ if(w._anim){ try{ w._anim.cancel(); }catch(_){ } w._anim=null; } w.classList.remove('dragging','dash-lift','dash-press'); w.style.transition=''; w.style.transform=''; }); }
  document.body.classList.remove('dash-dragging');
  dashDragId=null;
}
// where should the dragged card land for a pointer at (x,y)? works anywhere in the grid —
// over a card OR over empty white space — by finding the nearest card centre in reading order.
function dashInsertRef(g,x,y,dragEl){
  var els=dashWidgetEls(g).filter(function(w){ return w!==dragEl; });
  if(!els.length) return null;
  var best=null,bestD=Infinity,after=false;
  els.forEach(function(el){
    var r=el.getBoundingClientRect(); var cx=r.left+r.width/2, cy=r.top+r.height/2;
    var d=(x-cx)*(x-cx)+(y-cy)*(y-cy);
    if(d<bestD){ bestD=d; best=el;
      after=(y>cy+r.height*0.3)||(Math.abs(y-cy)<=r.height*0.5&&x>cx); }
  });
  if(!best) return null;
  return after?best.nextElementSibling:best;
}
// run at most once per frame (dragover fires far faster) → no thrash, buttery reordering
function dashProcessReorder(){
  dashRaf=0;
  var g=dashGridEl(); if(!g) return;
  var dragEl=g.querySelector('.dash-widget.dragging')||(dashTouch&&dashTouch.el); if(!dragEl) return;
  var ref=dashInsertRef(g,dashPtrX,dashPtrY,dragEl);
  if(ref===dragEl||ref===dragEl.nextElementSibling) return; // already in place
  var prev=dashFlipRecord(g);
  g.insertBefore(dragEl,ref);
  dashFlip(g,prev,dragEl);
  if(dashTouch&&dashTouch.active&&dashTouch.el===dragEl) dashTouchApplyTransform(dashPtrX,dashPtrY); // keep under finger after re-slot
}
document.addEventListener('dragstart',function(e){
  var h=e.target.closest&&e.target.closest('[data-dh]'); if(!h) return;
  dashDragId=h.getAttribute('data-dh');
  var g=dashGridEl(), w=h.closest('.dash-widget'), card=w&&w.querySelector(':scope > .card');
  if(e.dataTransfer){ try{
    e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',dashDragId);
    // float the REAL card under the cursor (captured now, before it collapses to a placeholder)
    if(card&&e.dataTransfer.setDragImage){ var r=card.getBoundingClientRect(); e.dataTransfer.setDragImage(card,Math.max(0,Math.min(r.width,e.clientX-r.left)),Math.max(0,Math.min(r.height,e.clientY-r.top))); }
  }catch(_){ } }
  if(g) g.classList.add('is-dragging');
  // collapse the slot to a placeholder on the NEXT tick so the drag image is the full card
  if(w) dashPhTimer=setTimeout(function(){ dashPhTimer=null; if(dashDragId) w.classList.add('dragging'); },0);

document.addEventListener('dragover',function(e){
  if(!dashDragId) return;
  var g=dashGridEl(); if(!g) return;
  var gr=g.getBoundingClientRect();

  if(e.clientX<gr.left-60||e.clientX>gr.right+60||e.clientY<gr.top-80||e.clientY>gr.bottom+80) return;
  e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect='move';
  dashPtrX=e.clientX; dashPtrY=e.clientY;
  if(!dashRaf) dashRaf=requestAnimationFrame(dashProcessReorder);

document.addEventListener('drop',function(e){ if(dashDragId){ e.preventDefault(); } });
document.addEventListener('dragend',function(){
  if(!dashDragId && !(dashGridEl()&&dashGridEl().querySelector('.dash-widget.dragging'))) return;
  dashPersistOrder();

/* ---- touch long-press drag for dashboard widgets (mobile): hold ~480ms, then drag to reorder ---- */
function dashTouchReset(){
  if(dashTouch.timer){ clearTimeout(dashTouch.timer); dashTouch.timer=null; }
  if(dashTouch.el) dashTouch.el.classList.remove('dash-press');
  dashTouch.el=null; dashTouch.active=false;
}
document.addEventListener('pointerdown',function(e){
  if(e.pointerType!=='touch') return;
  if(!dashGridEl()) return;
  var w=e.target.closest&&e.target.closest('.dash-widget'); if(!w) return;
  if(e.target.closest('input,select,textarea')) return; // don't hijack real form fields
  dashTouchReset();
  dashTouch.el=w; dashTouch.startX=e.clientX; dashTouch.startY=e.clientY;
  var r=w.getBoundingClientRect(); dashTouch.grabX=e.clientX-r.left; dashTouch.grabY=e.clientY-r.top;
  w.classList.add('dash-press'); // subtle press-feedback while waiting for the hold
  dashTouch.timer=setTimeout(function(){
    dashTouch.timer=null; dashTouch.active=true; dashDragId=w.getAttribute('data-widget');
    w.classList.remove('dash-press'); w.classList.add('dash-lift'); w.style.transition='none';
    var g=dashGridEl(); if(g) g.classList.add('is-dragging'); document.body.classList.add('dash-dragging');
    if(navigator.vibrate){ try{ navigator.vibrate(18); }catch(_){ } }

document.addEventListener('pointermove',function(e){
  if(e.pointerType!=='touch') return;
  if(dashTouch.timer){ // still waiting for the hold — a real move means the user is scrolling
    if(Math.abs(e.clientX-dashTouch.startX)>9||Math.abs(e.clientY-dashTouch.startY)>9) dashTouchReset();
    return;
  }
  if(!dashTouch.active) return;
  if(e.cancelable) e.preventDefault(); // stop the page from scrolling while dragging
  dashPtrX=e.clientX; dashPtrY=e.clientY;
  dashTouchApplyTransform(e.clientX,e.clientY);
  if(!dashRaf) dashRaf=requestAnimationFrame(dashProcessReorder);
},{passive:false});
function dashTouchEnd(){
  if(dashTouch.timer){ clearTimeout(dashTouch.timer); dashTouch.timer=null; if(dashTouch.el) dashTouch.el.classList.remove('dash-press'); }
  if(dashTouch.active){
    dashPersistOrder(); dashDragCleanup();
    // a touch sequence fires a click after pointerup — swallow it so the drag doesn't also navigate
    document.addEventListener('click',function sup(ev){ ev.stopPropagation(); ev.preventDefault(); document.removeEventListener('click',sup,true); },true);
  }
  dashTouch.el=null; dashTouch.active=false;
}
document.addEventListener('pointerup',function(e){ if(e.pointerType==='touch') dashTouchEnd(); },{passive:true});
document.addEventListener('pointercancel',function(e){ if(e.pointerType==='touch'){ dashTouchReset(); dashDragCleanup(); } },{passive:true});

/* ============================================================
   App Lock — optional PIN gate (privacy). The PIN is stored only on
   this device as a salted PBKDF2 hash (never synced, never reversible).
   ============================================================ */
var LOCK_KEY='trakora.lock';
var sessionUnlocked=false, lockHiddenAt=null;
function getLock(){ try{ return JSON.parse(localStorage.getItem(LOCK_KEY)||'null'); }catch(_){ return null; } }
function setLockRec(o){ try{ if(o) localStorage.setItem(LOCK_KEY,JSON.stringify(o)); else localStorage.removeItem(LOCK_KEY); }catch(_){ } }
function hasLock(){ var l=getLock(); return !!(l&&l.hash); }
function lockHex(buf){ var a=new Uint8Array(buf),s=''; for(var i=0;i<a.length;i++) s+=('0'+a[i].toString(16)).slice(-2); return s; }
function lockRandHex(n){ var a=new Uint8Array(n); if(window.crypto&&window.crypto.getRandomValues) window.crypto.getRandomValues(a); else for(var i=0;i<n;i++) a[i]=Math.floor(Math.random()*256); return lockHex(a.buffer); }
function pinHash(pin,saltHex,iter){
  iter=iter||150000;
  if(window.crypto&&window.crypto.subtle&&typeof TextEncoder!=='undefined'){
    var salt=new Uint8Array(saltHex.match(/.{2}/g).map(function(h){return parseInt(h,16);}));
    return window.crypto.subtle.importKey('raw',new TextEncoder().encode(String(pin)),{name:'PBKDF2'},false,['deriveBits'])
      .then(function(k){ return window.crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:iter,hash:'SHA-256'},k,256); })
      .then(function(bits){ return lockHex(bits); });
  }
  return Promise.resolve((function(){ var s=String(pin)+'|'+saltHex,h=5381; for(var r=0;r<9000;r++){ for(var i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))>>>0; s=(h>>>0).toString(36)+'|'+saltHex; } return ('0000000'+(h>>>0).toString(16)).slice(-8)+saltHex; })());
}
function setPin(pin){ var salt=lockRandHex(16); return pinHash(pin,salt,150000).then(function(hx){ setLockRec({v:1,salt:salt,iter:150000,hash:hx,fails:0}); return true; }); }
function verifyPin(pin){ var l=getLock(); if(!l||!l.hash) return Promise.resolve(true); return pinHash(pin,l.salt,l.iter||150000).then(function(hx){ return hx===l.hash; }); }
function removeLock(){ setLockRec(null); }
/* ---- at-rest encryption (AES-GCM key derived from the PIN) ---- */
function encActive(){ var l=getLock(); return !!(l&&l.enc); }
function cryptoOK(){ return !!(window.crypto&&window.crypto.subtle&&typeof TextEncoder!=='undefined'&&typeof TextDecoder!=='undefined'); }
function deriveAesKey(pin,saltHex,iter){
  iter=iter||200000;
  if(!cryptoOK()) return Promise.reject(new Error('no-subtle'));
  var salt=new Uint8Array(saltHex.match(/.{2}/g).map(function(h){return parseInt(h,16);}));
  return window.crypto.subtle.importKey('raw',new TextEncoder().encode(String(pin)),{name:'PBKDF2'},false,['deriveKey'])
    .then(function(k){ return window.crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:iter,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); });
}
function encryptJSON(obj){
  var iv=window.crypto.getRandomValues(new Uint8Array(12));
  var data=new TextEncoder().encode(JSON.stringify(obj));
  return window.crypto.subtle.encrypt({name:'AES-GCM',iv:iv},cryptoKey,data).then(function(ct){
    return JSON.stringify({__enc:1,v:1,iv:lockHex(iv.buffer),ct:lockHex(ct)});
  });
}
function decryptBlob(blob,key){
  var iv=new Uint8Array(blob.iv.match(/.{2}/g).map(function(h){return parseInt(h,16);}));
  var ct=new Uint8Array(blob.ct.match(/.{2}/g).map(function(h){return parseInt(h,16);}));
  return window.crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct).then(function(buf){ return JSON.parse(new TextDecoder().decode(buf)); });
}
/* turn on encryption for the current (in-memory, plaintext) state, then persist it encrypted */
function enableEncryption(pin){
  var encSalt=lockRandHex(16);
  return deriveAesKey(pin,encSalt,200000).then(function(key){
    cryptoKey=key; var l=getLock()||{}; l.enc=true; l.encSalt=encSalt; l.encIter=200000; setLockRec(l);
    return save(); // resolves only after the encrypted snapshot is written
  });
}
function autoLockMins(){ return Math.max(0,parseInt((state.settings&&state.settings.autoLockMin)||0,10)||0); }
function lockNow(){ if(hasLock()){ sessionUnlocked=false; cryptoKey=null; /* drop the key from memory while locked */ if(byId('modal-root')) byId('modal-root').innerHTML=''; renderLockScreen(); } }
function renderLockScreen(){
  var root=byId('lock-root'); if(!root) return;
  var biz=esc((state.settings&&state.settings.businessName&&state.settings.businessName!=='My Business')?state.settings.businessName:'Trakora');
  root.innerHTML='<div class="gate"><div class="gate-card">'+
    '<div style="text-align:center;margin-bottom:6px">'+icon('shield',30)+'</div>'+
    '<h1>'+biz+' is locked</h1>'+
    '<p class="gate-sub">Enter your PIN to unlock your business data on this device.</p>'+
    '<form id="lock-form" autocomplete="off">'+
      '<div class="gate-field"><label>PIN</label><input class="gate-input key" id="lock-pin" type="password" inputmode="numeric" maxlength="12" placeholder="••••" autocomplete="off" spellcheck="false"></div>'+
      '<button class="gate-btn" id="lock-go" type="submit">Unlock →</button>'+
      '<div class="gate-msg" id="lock-msg"></div>'+
    '</form>'+
    '<div class="gate-foot">The PIN protects this device only — your data never leaves it unless you enable cloud sync.</div>'+
  '</div></div>';
  var pinEl=byId('lock-pin'), msg=byId('lock-msg'), btn=byId('lock-go');
  function showM(t,k){ msg.className='gate-msg show '+k; msg.textContent=t; }
  byId('lock-form').addEventListener('submit',function(e){
    e.preventDefault();
    var l=getLock(), fails=(l&&l.fails)||0;
    var delay=fails>=5?Math.min(20000,(fails-4)*2000):0;
    btn.disabled=true; btn.innerHTML='<span class="gate-spin"></span>'+(delay?'Please wait…':'Checking…');
    setTimeout(function(){
      verifyPin(pinEl.value).then(function(okv){
        if(okv){
          if(l){ l.fails=0; setLockRec(l); }
          var finish=function(){ root.innerHTML=''; sessionUnlocked=true; lockHiddenAt=null; bootApp(); };
          if(pendingEncBlob&&l&&l.enc){
            deriveAesKey(pinEl.value,l.encSalt,l.encIter||200000)
              .then(function(key){ return decryptBlob(pendingEncBlob,key).then(function(obj){ cryptoKey=key; applyLoaded(obj); pendingEncBlob=null; finish(); }); })
              .catch(function(){ btn.disabled=false; btn.innerHTML='Unlock →'; showM('Could not decrypt your data on this device. If this keeps happening, restore from a JSON backup.','err'); });
          } else if(l&&l.enc&&!cryptoKey){
            // mid-session re-lock dropped the key — re-derive it so saves stay encrypted
            deriveAesKey(pinEl.value,l.encSalt,l.encIter||200000).then(function(key){ cryptoKey=key; finish(); })
              .catch(function(){ btn.disabled=false; btn.innerHTML='Unlock →'; showM('Could not re-establish the encryption key — reload and try again.','err'); });
          } else { finish(); }
        }
        else { if(l){ l.fails=fails+1; setLockRec(l); } btn.disabled=false; btn.innerHTML='Unlock →';
          showM(fails+1>=5?'Wrong PIN. Extra delay added after repeated tries.':'Wrong PIN. Try again.','err'); pinEl.value=''; pinEl.focus(); }
      });
    },delay);
  });
  setTimeout(function(){ pinEl.focus(); },120);
}
document.addEventListener('visibilitychange',function(){
  if(!hasLock()||!autoLockMins()||!sessionUnlocked) return;
  if(document.hidden){ lockHiddenAt=Date.now(); }
  else if(lockHiddenAt && Date.now()-lockHiddenAt >= autoLockMins()*60000){ lockNow(); }
});
function pinModal(mode){
  var body, title, label;
  if(mode==='set'){ title='Set a privacy PIN'; body='<p style="font-size:.82rem;color:var(--text-2);margin-bottom:12px">Choose a 4–8 digit PIN. You’ll enter it each time you open Trakora on this device. <b>There is no recovery</b> — if you forget it you can still re-activate, but keep it safe.</p>'+
    '<div class="field"><label>New PIN</label><input class="input" name="newpin" type="password" inputmode="numeric" maxlength="8" autocomplete="new-password"></div>'+
    '<div class="field"><label>Confirm PIN</label><input class="input" name="confirmpin" type="password" inputmode="numeric" maxlength="8" autocomplete="new-password"></div>'+
    (cryptoOK()?'<label class="checkrow" style="margin-top:2px"><input type="checkbox" name="encrypt" checked> Also <b>encrypt my data</b> on this device (AES‑256)</label>'+
      '<p style="font-size:.72rem;color:var(--text-3);margin-top:4px">With encryption on, your saved data is unreadable without the PIN — even from the browser’s storage. Keep a JSON backup somewhere safe; a forgotten PIN means the encrypted data can’t be recovered. Cloud sync, if enabled, stores data in your own database (secure that separately).</p>':''); }
  else if(mode==='change'){ title='Change PIN'; body='<div class="field"><label>Current PIN</label><input class="input" name="curpin" type="password" inputmode="numeric" maxlength="8"></div>'+
    '<div class="field"><label>New PIN</label><input class="input" name="newpin" type="password" inputmode="numeric" maxlength="8"></div>'+
    '<div class="field"><label>Confirm new PIN</label><input class="input" name="confirmpin" type="password" inputmode="numeric" maxlength="8"></div>'; }
  else { title='Remove privacy lock'; body='<p style="font-size:.82rem;color:var(--text-2);margin-bottom:12px">Enter your current PIN to turn off the lock.</p><div class="field"><label>Current PIN</label><input class="input" name="curpin" type="password" inputmode="numeric" maxlength="8"></div>'; }
  openModal(title,body,{submitLabel:mode==='remove'?'Remove lock':'Save',onSubmit:function(form){
    if(mode==='remove'){
      var wasEnc=encActive();
      verifyPin(fv(form,'curpin')).then(function(ok){ if(!ok){ toast('That PIN is incorrect.','error'); return; }
        removeLock(); if(wasEnc){ cryptoKey=null; save(); } // decrypt back to plaintext on this device
        closeModal(); toast(wasEnc?'Lock & encryption removed — data stored normally again.':'Privacy lock removed.'); render(); });
      return false;
    }
    var np=fv(form,'newpin'), cp=fv(form,'confirmpin');
    if(!/^\d{4,8}$/.test(np)){ toast('PIN must be 4–8 digits.','error'); return false; }
    if(np!==cp){ toast('The PINs don’t match.','error'); return false; }
    if(mode==='change'){
      var wasEnc2=encActive();
      verifyPin(fv(form,'curpin')).then(function(ok){ if(!ok){ toast('Your current PIN is incorrect.','error'); return; }
        setPin(np).then(function(){
          if(wasEnc2){ enableEncryption(np).then(function(){ closeModal(); toast('PIN updated & data re-encrypted. 🔒'); render(); }).catch(function(){ closeModal(); toast('PIN updated.'); render(); }); }
          else { closeModal(); toast('PIN updated. 🔒'); render(); }
        }); });
      return false;
    }
    var wantEnc=!!(form.elements['encrypt']&&form.elements['encrypt'].checked);
    setPin(np).then(function(){
      if(wantEnc){ enableEncryption(np).then(function(){ closeModal(); toast('Privacy lock + encryption enabled. 🔒'); render(); })
        .catch(function(){ closeModal(); toast('PIN set. Encryption isn’t supported in this browser, so data isn’t encrypted.','warn'); render(); }); }
      else { closeModal(); toast('Privacy lock enabled. 🔒'); render(); }
    });
    return false;
  }});
}
function privacyLockCardHTML(){
  var on=hasLock(), enc=encActive();
  return '<div class="card"><div class="card-head"><h3>'+icon('shield',16)+' Privacy lock (PIN)</h3><span class="spacer"></span>'+
    (enc?'<span class="badge good">'+icon('shield',11)+' Encrypted</span>':(on?'<span class="badge good">On</span>':'<span class="badge neutral">Off</span>'))+'</div>'+
    '<p style="font-size:.84rem;color:var(--text-2);margin-bottom:12px">Require a PIN before your dashboard opens on this device — so a borrowed laptop or shared phone can’t peek at your numbers. The PIN is stored only here as a salted PBKDF2 hash; it never syncs and can’t be reversed.'+
    (enc?' <b>Your saved data is encrypted (AES‑256)</b> and unreadable without the PIN.':(on&&cryptoOK()?' Tip: remove & re-set the PIN to also turn on data encryption.':''))+'</p>'+
    (on?'<div class="field" style="max-width:240px"><label>Auto-lock after inactivity</label><select class="input" data-action-change="autolock-set">'+
        [[0,'Off'],[1,'1 minute'],[5,'5 minutes'],[15,'15 minutes'],[30,'30 minutes']].map(function(o){return '<option value="'+o[0]+'"'+(autoLockMins()===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select></div>':'')+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
    (on?'<button class="btn btn-ghost btn-sm" data-action="lock-now">'+icon('shield')+' Lock now</button>'+
        '<button class="btn btn-ghost btn-sm" data-action="pin-change">Change PIN</button>'+
        '<button class="btn btn-danger btn-sm" data-action="pin-remove">Remove lock</button>'
       :'<button class="btn btn-primary btn-sm" data-action="pin-set">'+icon('shield')+' Set a PIN</button>')+
    '</div></div>';
}

/* ---------- first-open greeting (time-based, animated) ---------- */
var greetShownThisSession=false;
function greetingTime(){
  var h=new Date().getHours();
  if(h<12) return {label:'Good morning',ico:'sun',part:'morning'};
  if(h<18) return {label:'Good afternoon',ico:'sun',part:'afternoon'};
  return {label:'Good evening',ico:'moon',part:'evening'};
}
function greetSubline(part){
  var m={morning:'A fresh day for your business — let’s make it count.',afternoon:'Hope the day’s going well. Here’s your business.',evening:'Winding down? Let’s see how today went.'};
  return m[part]||'Welcome back.';
}
function showGreeting(){
  var root=byId('greet-root'); if(!root) return;
  var nm=String((state.settings&&state.settings.displayName)||'').trim();
  var g=greetingTime();
  function greetAvatar(){
    var bl=state.settings&&state.settings.bizLogo;
    return bl?'<img class="greet-logo" src="'+esc(bl)+'" alt="">':'<span class="greet-logohint">Logo</span>';
  }
  if(!nm){
    root.innerHTML='<div class="greet-overlay greet-'+g.part+'" data-greet="setup">'+
      '<div class="greet-card">'+
        '<div class="greet-ico">'+greetAvatar()+'</div>'+
        '<h2 class="greet-hello">Hi there! <span class="greet-wave">👋</span></h2>'+
        '<p class="greet-sub">How would you like me to call you?</p>'+
        '<form id="greet-form" class="greet-form" autocomplete="off"><input id="greet-name" class="input" maxlength="40" placeholder="e.g. Ira" aria-label="Your name">'+
        '<button class="btn btn-primary" type="submit">'+icon('check')+' That’s me</button></form>'+
        '<button class="greet-skip" data-greet-skip type="button">Maybe later</button>'+
      '</div></div>';
    var inp=byId('greet-name'); if(inp) setTimeout(function(){ try{ inp.focus(); }catch(_){ } },90);
  } else {
    root.innerHTML='<div class="greet-overlay greet-'+g.part+'" data-greet="hello" data-greet-dismiss>'+
      '<div class="greet-card">'+
        '<div class="greet-ico">'+greetAvatar()+'</div>'+
        '<h2 class="greet-hello">'+esc(g.label)+', <span class="greet-name">'+esc(nm)+'</span>!</h2>'+
        '<p class="greet-sub">'+esc(greetSubline(g.part))+'</p>'+
        '<div class="greet-tap">tap anywhere to continue</div>'+
      '</div></div>';
  }
  document.body.classList.add('greeting-on');
}
function dismissGreeting(){
  var root=byId('greet-root'); document.body.classList.remove('greeting-on');
  if(!root) return; var ov=root.querySelector('.greet-overlay');
  if(ov){ ov.classList.add('greet-out'); setTimeout(function(){ if(byId('greet-root')) byId('greet-root').innerHTML=''; },300); }
  else root.innerHTML='';
}
function greetSaveName(){
  var inp=byId('greet-name'); var nm=inp?String(inp.value||'').trim().slice(0,40):'';
  state.settings.displayName=nm; state.settings.greetDone=true; save();
  if(nm) showGreeting(); else dismissGreeting(); // re-show as a personalised hello, or just close
}
function maybeGreet(){
  if(greetShownThisSession) return;
  if(typeof isActivated==='function' && !isActivated()) return;
  if(byId('lock-root')&&byId('lock-root').innerHTML) return;
  if(byId('gate-root')&&byId('gate-root').innerHTML) return;
  if(byId('modal-root')&&byId('modal-root').innerHTML) return;
  if(byId('lightbox-root')&&byId('lightbox-root').querySelector('.onb-card')) return; // onboarding is up — greet after
  greetShownThisSession=true;
  setTimeout(showGreeting,450);
}
document.addEventListener('submit',function(e){ if(e.target&&e.target.id==='greet-form'){ e.preventDefault(); greetSaveName(); } });
/* calculators: search-first live filter + recents */
function filterCalculators(q){
  q=String(q||'').trim().toLowerCase();
  var grid=byId('calc-grid'); if(!grid) return; var shown=0;
  var toks=q.split(/\s+/).filter(Boolean);
  Array.prototype.forEach.call(grid.querySelectorAll('[data-calc-search]'),function(el){
    var s=el.getAttribute('data-calc-search')||'';
    var match=!toks.length||toks.every(function(t){return s.indexOf(t)>=0;});
    el.classList.toggle('calc-hidden',!match); if(match) shown++;
  });
  var empty=byId('calc-empty'); if(empty) empty.style.display=shown?'none':'';
  var rec=byId('calc-recents'); if(rec) rec.style.display=q?'none':'';
}
document.addEventListener('input',function(e){ if(e.target&&e.target.id==='calc-search') filterCalculators(e.target.value); });
function recordCalcRecent(k){
  if(!k||!CALC_TITLES[k]) return;
  var r=state.settings.calcRecents=state.settings.calcRecents||[];
  var ix=r.indexOf(k); if(ix>=0) r.splice(ix,1); r.unshift(k); state.settings.calcRecents=r.slice(0,8); save();
}
document.addEventListener('change',function(e){
  if(!e.target||!e.target.closest) return;
  var f=e.target.closest('form[data-calc]'); if(f){ recordCalcRecent(f.getAttribute('data-calc')); return; }
  var fx=e.target.closest('[data-calc-key="fx"]'); if(fx) recordCalcRecent('fx'); // FX uses a non-form card
});
/* keep the contract editor's text selection when a formatting button is pressed */
document.addEventListener('mousedown',function(e){ if(e.target.closest&&e.target.closest('.doc-tool')) e.preventDefault(); });
document.addEventListener('click',function(e){
  if(!document.body.classList.contains('greeting-on')) return;
  if(e.target.closest&&e.target.closest('[data-greet-skip]')){ state.settings.greetDone=true; save(); dismissGreeting(); return; }
  if(e.target.closest&&e.target.closest('[data-greet-dismiss]')){ dismissGreeting(); return; }
},true);
function bootApp(){
  if(hasLock() && !sessionUnlocked){ applyTheme(); renderLockScreen(); return; }
  processRecurring();
  processRecurringInvoices();
  applyTheme();
  applyBrand();
  render();
  probeStorage();
  autoBackupCheck();
  maybeOnboard();
  maybeGreet();
  storageWarnOnBoot();
  fxAutoUpdateCheck();
  backupReminder();
}
/* backup reminder — once per session if data exists and backup is stale */
function backupReminder(){
  // the dashboard shows a persistent safety banner now; only nudge with a toast when
  // the user is NOT on the dashboard (so they still get one gentle heads-up), and never
  // when cloud sync is keeping them safe or they've snoozed it.
  if(!dataAtRisk()) return;
  var snz=state.settings.backupSnooze; if(snz && (-daysUntil(snz))<7) return;
  if(currentRoute()==='dashboard') return; // the banner already covers this
  var lb=state.settings.lastBackup;
  setTimeout(function(){
    toast(lb?'Your last backup is over two weeks old — export a fresh one, or turn on auto-backup in Settings.':'Tip: your data lives only in this browser. Export a backup (or turn on auto-backup) from Settings → Data.','warn');
  },1800);
}

loadState();
applyActivationStamp();
if(GATE.enabled && !isActivated()){
  applyTheme();
  renderGate();
} else {
  bootApp();
}
</script>
